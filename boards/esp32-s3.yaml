# ============================================
# HeatValve-6 Rev.2 : ESP32-S3 Super Mini Board Configuration
# ============================================
# Hardware: ESP32-S3 Super Mini + 6x DRV8215 Motor Driver (I2C)
# Motor control: I2C-based with integrated stall detection and IPROPI current sensing
#
# DRV8215 I2C addresses (7-bit):
#   Motor 1: 0x30 (A1=GND, A0=GND)
#   Motor 2: 0x31 (A1=GND, A0=Hi-Z)
#   Motor 3: 0x32 (A1=GND, A0=VCC)
#   Motor 4: 0x33 (A1=Hi-Z, A0=GND)
#   Motor 5: 0x34 (A1=Hi-Z, A0=Hi-Z)
#   Motor 6: 0x35 (A1=Hi-Z, A0=VCC)
#
# Shared GPIO:
#   nSLEEP_ALL (GPIO2) → all 6 DRV8215 nSLEEP pins
#   nFAULT_ALL (GPIO7) ← wired-OR from all 6 DRV8215 nFAULT pins
#   IPROPI_ADC (GPIO1) ← shared RIPROPI (5.1kΩ, all 6 IPROPI wire-OR)
#
# Current sensing: DRV8215 IPROPI (analog, via ESP32 ADC on GPIO1)
# Stall detection: DRV8215 hardware (FAULT_STATUS register poll or nFAULT interrupt)
#
# NOTE: Only ONE motor should run at a time (shared IPROPI, motor thermal design).

esphome:
  name: ${name}
  on_boot:
    - priority: 600  # Early boot - show blue LED
      then:
        - script.execute: led_status_boot
    - priority: -200  # Late boot - start maintenance
      then:
        - delay: ${onboot_valve_calibration_delay}
        - script.execute: valve_maintenance

  project:
    name: "birkemosen.heatvalve-6"
    version: "${revision}.dev"
  platformio_options:
    board_build.f_flash: 80000000L
    board_build.flash_mode: qio
    board_build.flash_size: 4MB

substitutions:
  # Board and compilation
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework: esp-idf

  # ============================================
  # DRV8215 Motor Driver Configuration
  # ============================================
  # I2C addresses (7-bit, derived from A0/A1 tri-level pins)
  drv8215_addr_motor1: "0x30"
  drv8215_addr_motor2: "0x31"
  drv8215_addr_motor3: "0x32"
  drv8215_addr_motor4: "0x33"
  drv8215_addr_motor5: "0x34"
  drv8215_addr_motor6: "0x35"

  # Shared control GPIO
  motor_nsleep_pin: GPIO2       # Shared nSLEEP (active HIGH, wakes all DRV8215)
  motor_nfault_pin: GPIO7       # Shared nFAULT (wired-OR, open-drain, active LOW on fault)
  motor_ipropi_pin: GPIO1       # Shared IPROPI ADC input (current sense)

  # ============================================
  # I2C Pins (SDA=GPIO8, SCL=GPIO9 → DRV8215 + expansion)
  # ============================================
  i2c_sda_pin: GPIO8          # I2C Data
  i2c_scl_pin: GPIO9          # I2C Clock

  # ============================================
  # Other Pins
  # ============================================
  onewire_pin: GPIO10         # Dallas 1-Wire bus
  status_led_pin: GPIO48      # WS2812 RGB LED

  # Freed GPIO (available for expansion):
  # GPIO3, GPIO4, GPIO5, GPIO6, GPIO11, GPIO12, GPIO13

esp32:
  board: ${board}
  variant: ${variant}
  framework:
    type: ${framework}
    version: recommended
    sdkconfig_options:
      CONFIG_COMPILER_OPTIMIZATION_SIZE: y

preferences:
  flash_write_interval: 0s  # Write to flash immediately on change

ota:
  - platform: esphome

safe_mode:

# ============================================
# Status LED (WS2812 RGB with status colors)
# ============================================
# Color codes:
#   GREEN (solid)     = Normal, connected to Home Assistant
#   GREEN (breathing) = Normal, standalone mode
#   BLUE (flashing)   = Booting / WiFi connecting
#   CYAN (solid)      = Motor running
#   YELLOW (solid)    = Warning (temp sensor offline)
#   ORANGE (flashing) = No 1-Wire sensors found
#   RED (solid)       = Error (API disconnected + standalone off)
#   RED (flashing)    = Critical error (motor stall/overcurrent)
#   PURPLE (solid)    = Calibration in progress
#   WHITE (flash)     = Command received

# Status tracking global
globals:
  - id: led_status_code
    type: int
    restore_value: no
    initial_value: '0'  # 0=boot, 1=ok, 2=standalone, 3=motor, 4=warning, 5=error, 6=critical, 7=calibrating

light:
  - platform: esp32_rmt_led_strip
    name: "${name} Status LED"
    id: ${id_prefix}status_led
    icon: "mdi:alarm-light"
    rgb_order: GRB
    pin: ${status_led_pin}
    num_leds: 1
    chipset: ws2812
    restore_mode: ALWAYS_OFF
    entity_category: config
    effects:
      - pulse:
          name: "Breathing"
          transition_length: 2s
          update_interval: 2s
          min_brightness: 10%
          max_brightness: 40%
      - strobe:
          name: "Fast Blink"
          colors:
            - state: true
              duration: 200ms
            - state: false
              duration: 200ms
      - strobe:
          name: "Slow Blink"
          colors:
            - state: true
              duration: 500ms
            - state: false
              duration: 500ms

# ============================================
# Status LED Control Scripts
# ============================================
script:
  # Boot/connecting - Blue flashing
  - id: led_status_boot
    then:
      - lambda: id(led_status_code) = 0;
      - light.turn_on:
          id: ${id_prefix}status_led
          brightness: 40%
          red: 0%
          green: 0%
          blue: 100%
          effect: "Fast Blink"

  # Normal connected - Green solid
  - id: led_status_ok
    then:
      - lambda: id(led_status_code) = 1;
      - light.turn_on:
          id: ${id_prefix}status_led
          brightness: 30%
          red: 0%
          green: 100%
          blue: 0%
          effect: "None"

  # Standalone mode - Green breathing
  - id: led_status_standalone
    then:
      - lambda: id(led_status_code) = 2;
      - light.turn_on:
          id: ${id_prefix}status_led
          brightness: 30%
          red: 0%
          green: 100%
          blue: 0%
          effect: "Breathing"

  # Motor running - Cyan solid
  - id: led_status_motor
    then:
      - lambda: id(led_status_code) = 3;
      - light.turn_on:
          id: ${id_prefix}status_led
          brightness: 50%
          red: 0%
          green: 100%
          blue: 100%
          effect: "None"

  # Warning - Yellow solid
  - id: led_status_warning
    then:
      - lambda: id(led_status_code) = 4;
      - light.turn_on:
          id: ${id_prefix}status_led
          brightness: 40%
          red: 100%
          green: 70%
          blue: 0%
          effect: "None"

  # Error - Red solid
  - id: led_status_error
    then:
      - lambda: id(led_status_code) = 5;
      - light.turn_on:
          id: ${id_prefix}status_led
          brightness: 50%
          red: 100%
          green: 0%
          blue: 0%
          effect: "None"

  # Critical error - Red flashing
  - id: led_status_critical
    then:
      - lambda: id(led_status_code) = 6;
      - light.turn_on:
          id: ${id_prefix}status_led
          brightness: 80%
          red: 100%
          green: 0%
          blue: 0%
          effect: "Fast Blink"

  # Calibration - Purple solid
  - id: led_status_calibrating
    then:
      - lambda: id(led_status_code) = 7;
      - light.turn_on:
          id: ${id_prefix}status_led
          brightness: 50%
          red: 80%
          green: 0%
          blue: 100%
          effect: "None"

  # Flash white (command received) - returns to previous state
  - id: led_flash_command
    then:
      - lambda: |-
          int prev = id(led_status_code);
      - light.turn_on:
          id: ${id_prefix}status_led
          brightness: 100%
          red: 100%
          green: 100%
          blue: 100%
          effect: "None"
      - delay: 100ms
      - script.execute: led_update_status

  # Update LED based on current system status
  - id: led_update_status
    then:
      - lambda: |-
          if (id(motor_turning)) {
            id(led_status_motor).execute();
            return;
          }
          
          bool wifi_ok = wifi::global_wifi_component->is_connected();
          bool api_ok = api_is_connected();
          
          if (!wifi_ok) {
            id(led_status_boot).execute();
            return;
          }
          
          if (!api_ok) {
            if (id(${id_prefix}standalone_mode).state) {
              id(led_status_standalone).execute();
            } else {
              id(led_status_error).execute();
            }
            return;
          }
          
          id(led_status_ok).execute();

# ============================================
# Status LED Update Interval
# ============================================
interval:
  - interval: 2s
    then:
      - script.execute: led_update_status

# ============================================
# I2C Bus (DRV8215 motor drivers + expansion)
# ============================================
i2c:
  sda: ${i2c_sda_pin}
  scl: ${i2c_scl_pin}
  scan: true

psram:
  mode: octal
  speed: 80MHz
