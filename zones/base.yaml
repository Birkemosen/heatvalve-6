# ============================================
# Zone Base Infrastructure (DRV8215)
# ============================================
# Common components for all control profiles.
# Uses DRV8215 motor driver with current-based endstop detection.
#
# Required vars:
#   zone_number: "1"             # 1-6
#   motor_number: "1"            # 1-6 (motor assigned to this zone)
#   id: "living"
#   friendly_name: "Living Room"
#
# Optional vars:
#   current_factor: "1.7"        # Multiplier for mean current (endstop detection)
#   zone_area_default: "15"
#   zone_max_opening_default: "90"

# ============================================
# Zone State Globals
# ============================================
globals:
  - id: ${id_prefix}zone_${zone_number}_state
    type: int
    initial_value: '-1'  # -1=unknown, 0=overheated, 1=satisfied, 2=demand
    
  - id: ${id_prefix}zone_${zone_number}_was_overheated
    type: bool
    initial_value: 'false'
    
  - id: ${id_prefix}zone_${zone_number}_hydraulic_factor
    type: float
    initial_value: '0.0'

  # Motor operation tracking for this zone
  - id: zone_${zone_number}_motor_running
    type: bool
    initial_value: 'false'

  - id: zone_${zone_number}_calibration_active
    type: bool
    initial_value: 'false'

  - id: zone_${zone_number}_calibration_success
    type: bool
    initial_value: 'false'

# ============================================
# Zone Parameters
# ============================================
number:
  - platform: template
    name: "${friendly_name} Area"
    id: ${id_prefix}zone_${zone_number}_area
    internal: ${zone_entities_internal}
    icon: "mdi:floor-plan"
    unit_of_measurement: "m²"
    optimistic: true
    min_value: 1
    max_value: 100
    step: 0.5
    restore_value: true
    initial_value: ${zone_area_default}
    web_server:
      sorting_group_id: sorting_group_zone_${zone_number}
    
  - platform: template
    name: "${friendly_name} Max Opening"
    id: ${id_prefix}zone_${zone_number}_max_opening
    internal: ${zone_entities_internal}
    icon: "mdi:valve-open"
    unit_of_measurement: "%"
    optimistic: true
    min_value: 50
    max_value: 100
    step: 5
    restore_value: true
    initial_value: ${zone_max_opening_default}
    web_server:
      sorting_group_id: sorting_group_zone_${zone_number}

  - platform: template
    name: "${friendly_name} Pipe Spacing"
    id: ${id_prefix}zone_${zone_number}_pipe_spacing
    icon: "mdi:arrow-expand-horizontal"
    unit_of_measurement: "mm"
    optimistic: true
    min_value: 100
    max_value: 300
    step: 50
    restore_value: true
    initial_value: 150
    entity_category: config
    web_server:
      sorting_group_id: sorting_group_zone_${zone_number}

  - platform: template
    name: "${friendly_name} Floor Cover Thickness"
    id: ${id_prefix}zone_${zone_number}_floor_cover_thickness
    icon: "mdi:layers"
    unit_of_measurement: "mm"
    optimistic: true
    min_value: 5
    max_value: 40
    step: 1
    restore_value: true
    initial_value: 15
    entity_category: config
    web_server:
      sorting_group_id: sorting_group_zone_${zone_number}

select:
  - platform: template
    name: "${friendly_name} Pipe Type"
    id: ${id_prefix}zone_${zone_number}_pipe_type
    icon: "mdi:pipe"
    optimistic: true
    restore_value: true
    entity_category: config
    options:
      - "PEX 12x2"
      - "PEX 14x2"
      - "PEX 16x2"
      - "PEX 17x2"
      - "PEX 18x2"
      - "PEX 20x2"
      - "AluPEX 16x2"
      - "AluPEX 20x2"
    initial_option: "PEX 16x2"
    web_server:
      sorting_group_id: sorting_group_zone_${zone_number}

  - platform: template
    name: "${friendly_name} Floor Type"
    id: ${id_prefix}zone_${zone_number}_floor_type
    icon: "mdi:floor-plan"
    optimistic: true
    restore_value: true
    entity_category: config
    options:
      - "Tile"
      - "Parquet"
      - "Oak/Beech"
      - "Carpet"
    initial_option: "Tile"
    web_server:
      sorting_group_id: sorting_group_zone_${zone_number}

# ============================================
# Valve Cover (endstop-based)
# ============================================
cover:
  - platform: endstop
    name: "CH${zone_number}"
    device_class: shutter
    id: CH${zone_number}_cover
    internal: ${zone_entities_internal}
    
    open_action:
      - script.execute: motor_zone_${zone_number}_open
          
    open_duration: 60s
    open_endstop: endstop_${zone_number}_sensor
    
    close_action:
      - script.execute: motor_zone_${zone_number}_close
          
    close_duration: 60s
    close_endstop: endstop_${zone_number}_sensor
    
    stop_action:
      - script.execute: motor_zone_${zone_number}_stop
      
    max_duration: 65s
    web_server:
      sorting_group_id: sorting_group_zone_${zone_number}

# ============================================
# Zone Motor Control Switches
# ============================================
switch:
  - platform: template
    name: "Run ${friendly_name} Check"
    internal: ${zone_entities_internal}
    turn_on_action:
      - script.execute: TH${zone_number}_check
    web_server:
      sorting_group_id: sorting_group_zone_${zone_number}

button:
  - platform: template
    name: "Self-test ${friendly_name} Valve"
    internal: ${zone_entities_internal}
    icon: "mdi:clipboard-check-outline"
    on_press:
      - script.execute: self_test_CH${zone_number}_valve
    web_server:
      sorting_group_id: sorting_group_zone_${zone_number}

# ============================================
# Stop Sensor (uses motor_supervisor stop_event)
# ============================================
binary_sensor:
  - platform: template
    id: endstop_${zone_number}_sensor
    name: "Endstop CH${zone_number}"
    internal: true
    lambda: |-
      // Only trigger when THIS zone's motor is running
      if (!id(zone_${zone_number}_motor_running)) {
        return false;
      }
      // Check stop event from motor supervisor
      return id(motor_supervisor_ctrl).stop_event();
    on_press:
      then:
        - lambda: |-
            auto cover = id(CH${zone_number}_cover);
            id(zone_${zone_number}_motor_running) = false;

            if (id(motor_supervisor_ctrl).endstop_event()) {
              ESP_LOGI("endstop", "CH${zone_number} endstop reached (motor ${motor_number})");

              // Update position only on confirmed endstop
              if (cover->current_operation == COVER_OPERATION_OPENING) {
                cover->position = 1.0;  // Fully open
                ESP_LOGI("endstop", "CH${zone_number} fully OPEN");
              } else if (cover->current_operation == COVER_OPERATION_CLOSING) {
                cover->position = 0.0;  // Fully closed
                ESP_LOGI("endstop", "CH${zone_number} fully CLOSED");
              }
            } else if (id(motor_supervisor_ctrl).fault_event()) {
              ESP_LOGW("endstop", "CH${zone_number} safety stop (motor ${motor_number}) code=%s raw=%d",
                       id(motor_supervisor_ctrl).get_current_fault_name(),
                       id(motor_supervisor_ctrl).get_current_fault_raw());
            } else {
              ESP_LOGW("endstop", "CH${zone_number} stop event without explicit reason (motor ${motor_number})");
            }

            cover->publish_state();

  - platform: template
    name: "CH${zone_number} Motor Blocked"
    id: ${id_prefix}zone_${zone_number}_motor_blocked
    internal: ${zone_entities_internal}
    entity_category: diagnostic
    lambda: |-
      return id(motor_supervisor_ctrl).is_motor_blocked(${motor_number});
    web_server:
      sorting_group_id: sorting_group_zone_${zone_number}

  - platform: template
    name: "CH${zone_number} Motor Present"
    id: ${id_prefix}zone_${zone_number}_motor_present
    internal: ${zone_entities_internal}
    entity_category: diagnostic
    lambda: |-
      return id(motor_supervisor_ctrl).is_motor_present(${motor_number});
    web_server:
      sorting_group_id: sorting_group_zone_${zone_number}

# ============================================
# Calculated Sensors
# ============================================
sensor:
  - platform: template
    name: "${friendly_name} Pipe Length"
    id: ${id_prefix}zone_${zone_number}_pipe_length
    internal: ${zone_entities_internal}
    icon: "mdi:ruler"
    unit_of_measurement: "m"
    accuracy_decimals: 1
    update_interval: 60s
    lambda: |-
      float area = id(${id_prefix}zone_${zone_number}_area).state;
      float spacing = id(${id_prefix}pipe_spacing).state / 1000.0;
      if (spacing > 0) return area / spacing;
      return 0;
    web_server:
      sorting_group_id: sorting_group_zone_${zone_number}

  - platform: template
    name: "CH${zone_number} Valve Deadzone"
    id: ${id_prefix}zone_${zone_number}_valve_deadzone_ms
    internal: ${zone_entities_internal}
    icon: "mdi:timer-sand"
    unit_of_measurement: "ms"
    accuracy_decimals: 0
    update_interval: 2s
    entity_category: diagnostic
    lambda: |-
      return id(motor_supervisor_ctrl).get_deadzone_ms(${motor_number});
    web_server:
      sorting_group_id: sorting_group_zone_${zone_number}

  - platform: template
    name: "CH${zone_number} Valve Drift"
    id: ${id_prefix}zone_${zone_number}_valve_drift_percent
    internal: ${zone_entities_internal}
    icon: "mdi:chart-line"
    unit_of_measurement: "%"
    accuracy_decimals: 1
    update_interval: 2s
    entity_category: diagnostic
    lambda: |-
      return id(motor_supervisor_ctrl).get_drift_percent(${motor_number});
    web_server:
      sorting_group_id: sorting_group_zone_${zone_number}

  - platform: template
    name: "CH${zone_number} Calibration Retries"
    id: ${id_prefix}zone_${zone_number}_calibration_retries
    internal: ${zone_entities_internal}
    icon: "mdi:restart-alert"
    accuracy_decimals: 0
    update_interval: 2s
    entity_category: diagnostic
    lambda: |-
      return id(motor_supervisor_ctrl).get_calibration_retries(${motor_number});
    web_server:
      sorting_group_id: sorting_group_zone_${zone_number}

# ============================================
# Motor Control Scripts for this Zone
# ============================================
script:
  # Open valve (motor direction = open)
  - id: motor_zone_${zone_number}_open
    then:
      - if:
          condition:
            lambda: |-
              if (id(motor_supervisor_ctrl).is_motor_blocked(${motor_number})) {
                ESP_LOGW("motor", "CH${zone_number} open denied: motor ${motor_number} is BLOCKED");
                return false;
              }
              if (!id(zone_${zone_number}_calibration_active) && id(motor_supervisor_ctrl).should_auto_relearn(${motor_number})) {
                ESP_LOGI("motor", "CH${zone_number} triggering auto-relearn before open");
                id(calibrate_CH${zone_number}_cover).execute();
                return false;
              }
              if (id(motor_supervisor_ctrl).is_motor_busy()) {
                ESP_LOGW("motor", "Cannot open CH${zone_number}: motor %d is running", id(motor_supervisor_ctrl).get_current_motor());
                return false;
              }
              ESP_LOGI("motor", "CH${zone_number} opening (motor ${motor_number})");
              id(zone_${zone_number}_motor_running) = true;
              return true;
          then:
            - script.execute:
                id: motor_start
                motor_num: ${motor_number}
                direction: 1  # Open

  # Close valve (motor direction = close)
  - id: motor_zone_${zone_number}_close
    then:
      - if:
          condition:
            lambda: |-
              if (id(motor_supervisor_ctrl).is_motor_blocked(${motor_number})) {
                ESP_LOGW("motor", "CH${zone_number} close denied: motor ${motor_number} is BLOCKED");
                return false;
              }
              if (!id(zone_${zone_number}_calibration_active) && id(motor_supervisor_ctrl).should_auto_relearn(${motor_number})) {
                ESP_LOGI("motor", "CH${zone_number} triggering auto-relearn before close");
                id(calibrate_CH${zone_number}_cover).execute();
                return false;
              }
              if (id(motor_supervisor_ctrl).is_motor_busy()) {
                ESP_LOGW("motor", "Cannot close CH${zone_number}: motor %d is running", id(motor_supervisor_ctrl).get_current_motor());
                return false;
              }
              ESP_LOGI("motor", "CH${zone_number} closing (motor ${motor_number})");
              id(zone_${zone_number}_motor_running) = true;
              return true;
          then:
            - script.execute:
                id: motor_start
                motor_num: ${motor_number}
                direction: 0  # Close

  # Stop valve motor
  - id: motor_zone_${zone_number}_stop
    then:
      - lambda: |-
          ESP_LOGI("motor", "CH${zone_number} stopping (motor ${motor_number})");
          id(zone_${zone_number}_motor_running) = false;
      - script.execute:
          id: motor_stop
          motor_num: ${motor_number}

  - id: self_test_CH${zone_number}_valve
    then:
      - if:
          condition:
            lambda: |-
              if (id(motor_supervisor_ctrl).is_motor_busy()) {
                ESP_LOGW("motor", "Self-test CH${zone_number} skipped: motor %d is running", id(motor_supervisor_ctrl).get_current_motor());
                return false;
              }
              id(zone_${zone_number}_motor_running) = true;
              return true;
          then:
            - script.execute:
                id: motor_presence_test
                motor_num: ${motor_number}
                direction: 1
            - wait_until:
                condition:
                  lambda: 'return !id(motor_supervisor_ctrl).is_motor_busy();'
                timeout: 12s
            - lambda: |-
                id(zone_${zone_number}_motor_running) = false;
                if (id(motor_supervisor_ctrl).is_motor_present(${motor_number})) {
                  ESP_LOGI("motor", "Self-test CH${zone_number}: motor present");
                } else {
                  ESP_LOGW("motor", "Self-test CH${zone_number}: motor absent/open-circuit");
                }

  # Calibration script (learn valve range)
  - id: calibrate_CH${zone_number}_cover
    then:
      - if:
          condition:
            lambda: |-
              if (id(motor_supervisor_ctrl).is_motor_busy()) {
                ESP_LOGW("motor", "Calibration CH${zone_number} skipped: motor %d is running", id(motor_supervisor_ctrl).get_current_motor());
                return false;
              }
              return true;
          then:
            - lambda: |-
                id(zone_${zone_number}_calibration_active) = true;
                id(zone_${zone_number}_calibration_success) = false;
                id(motor_supervisor_ctrl).begin_calibration_session(${motor_number});
            - script.execute: led_status_calibrating  # Purple LED
            - repeat:
                count: 12
                then:
                  - if:
                      condition:
                        lambda: |-
                          return id(zone_${zone_number}_calibration_success) || id(motor_supervisor_ctrl).is_motor_blocked(${motor_number});
                      then:
                        - delay: 10ms
                      else:
                        - lambda: |-
                            id(motor_supervisor_ctrl).begin_calibration_attempt(${motor_number});
                            ESP_LOGI("motor", "Calibrate CH${zone_number} attempt %u",
                                     id(motor_supervisor_ctrl).get_calibration_retries(${motor_number}) + 1);

                        - logger.log:
                            format: "Calibrate CH${zone_number} (${friendly_name}) - close"
                            tag: motor
                        - cover.close: CH${zone_number}_cover
                        - wait_until:
                            condition:
                              lambda: 'return !id(zone_${zone_number}_motor_running);'
                            timeout: 70s
                        - delay: 1200ms

                        - logger.log:
                            format: "Calibrate CH${zone_number} - open"
                            tag: motor
                        - cover.open: CH${zone_number}_cover
                        - wait_until:
                            condition:
                              lambda: 'return !id(zone_${zone_number}_motor_running);'
                            timeout: 70s
                        - delay: 1200ms

                        - logger.log:
                            format: "Calibrate CH${zone_number} - close (final)"
                            tag: motor
                        - cover.close: CH${zone_number}_cover
                        - wait_until:
                            condition:
                              lambda: 'return !id(zone_${zone_number}_motor_running);'
                            timeout: 70s
                        - delay: 1200ms

                        - lambda: |-
                            bool success = id(motor_supervisor_ctrl).finalize_calibration_attempt(${motor_number});
                            id(zone_${zone_number}_calibration_success) = success;
                            if (success) {
                              ESP_LOGI("motor", "Calibrate CH${zone_number}: attempt successful");
                            } else {
                              ESP_LOGW("motor", "Calibrate CH${zone_number}: attempt rejected (retries=%u blocked=%s)",
                                       id(motor_supervisor_ctrl).get_calibration_retries(${motor_number}),
                                       id(motor_supervisor_ctrl).is_motor_blocked(${motor_number}) ? "true" : "false");
                            }

            - lambda: |-
                id(motor_supervisor_ctrl).end_calibration_session(${motor_number});
                id(zone_${zone_number}_calibration_active) = false;

            - if:
                condition:
                  lambda: 'return id(zone_${zone_number}_calibration_success);'
                then:
                  - logger.log:
                      format: "Calibrate CH${zone_number} complete - mean current: %.1f mA"
                      tag: motor
                      args:
                        - id(motor_supervisor_ctrl).get_mean_current(${motor_number})
                else:
                  - logger.log:
                      format: "Calibrate CH${zone_number} failed or blocked"
                      tag: motor
            - script.execute: led_update_status  # Return to normal status
