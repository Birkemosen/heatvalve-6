# Minimal standalone config for DRV8215 I2C hardware testing
# Run: esphome run heatvalve-6-drv8215-test.yaml

esphome:
  name: heatvalve-6
  friendly_name: HeatValve DRV8215 Test

external_components:
  - source:
      type: local
      path: components
    components:
      - drv8215

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

substitutions:
  motor_nsleep_pin: GPIO2
  motor_nfault_pin: GPIO7
  motor_ipropi_pin: GPIO1
  i2c_sda_pin: GPIO8
  i2c_scl_pin: GPIO9

i2c:
  sda: ${i2c_sda_pin}
  scl: ${i2c_scl_pin}
  scan: true

logger:
  level: INFO

api:
  reboot_timeout: 30min

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.20.56
    gateway: 192.168.20.1
    subnet: 255.255.255.0
  ap:
    ssid: "UFH_Fallback"
    password: !secret fallback_password
  power_save_mode: none

captive_portal:

web_server:
  port: 80
  version: 3

packages:
  drv8215_test: !include core/drv8215_test.yaml
