api:
  reboot_timeout: ${api_reboot_timeout}

# ============================================
# WiFi Configuration
# ============================================
# Configure directly here or use: wifi: !include core/wifi.yaml
wifi:
  # Optional: `manual_ip` can be added/overridden in heatvalve-6-esphome.yaml
  # (top-level config merges into this block).
  networks:
    - ssid: ${wifi_ssid}
      password: ${wifi_password}
  # Additional networks (optional):
  # - ssid: !secret wifi_ssid_2
  #   password: !secret wifi_password_2
  #   priority: 2
  ap:
    ssid: "UFH_Fallback"
    password: ${fallback_password}
  
  # WiFi optimization for hardware interference
  power_save_mode: ${wifi_power_save_mode}          # Disable power saving for better stability
  output_power: ${wifi_output_power}             # Reduce TX power (default 20dB) - try 15dB or 12dB if issues persist
  # fast_connect: true           # Skip scanning, connect faster (requires static IP)
  # enable_btm: false            # Disable BSS Transition Management
  # enable_rrm: false            # Disable Radio Resource Management

captive_portal:

ota:
  platform: esphome
  password: ${ota_password}

# ============================================
# Valve Maintenance
# ============================================
script:
  - id: valve_maintenance
    then:
      - logger.log: "Valve maintenance"
      - script.execute: calibrate_CH1_cover
      - delay: 300s
      - script.execute: calibrate_CH2_cover
      - delay: 300s
      - script.execute: calibrate_CH3_cover
      - delay: 300s
      - script.execute: calibrate_CH4_cover
      - delay: 300s
      - script.execute: calibrate_CH5_cover
      - delay: 300s
      - script.execute: calibrate_CH6_cover
      - delay: 300s

# ============================================
# Packages
# ============================================
packages:
  # Board (ESP32-S3 Super Mini only)
  board: !include boards/esp32-s3.yaml
  
  # Core infrastructure
  core_settings: !include core/settings.yaml
  logger: !include core/logger.yaml
  motor_driver: !include core/motor_driver.yaml  # DRV8215 I2C motor control
  time: !include core/time.yaml

  # ============================================
  # Optional: OLED 1.54" display (SSD1306 128x64, I2C)
  # Comment out if display is not fitted.
  # ============================================
  display: !include core/display.yaml
  switch_others: !include core/switch_others.yaml
  sensor_others: !include core/sensor_others.yaml
  onewire: !include core/onewire.yaml

  # ============================================
  # Optional: Pump control via ESP-NOW
  # ============================================
  pump_control: !include
    file: optional/pump_control.yaml
    vars:
      pump_mac_address: ${pump_mac_address}
      circulation_check_interval: ${circulation_check_interval}
      circulation_run_duration: ${circulation_run_duration}

  # ============================================
  # Optional: MQTT Ecodan integration
  # ============================================
  # mqtt_ecodan: !include optional/mqtt_ecodan.yaml

  # ============================================
  # ZONES
  # ============================================
  # Control profile options (use same for all zones):
  #   zones/tanh.yaml   - Smooth tanh curve control
  #   zones/linear.yaml - Linear proportional control
  #   zones/pid.yaml    - PID control with auto-tune
  #   zones/remote.yaml - External/Home Assistant control
  #
  # Motor mapping (DRV8215 I2C):
  #   motor_number: 1-6 (maps to physical motor outputs)
  #     Motor 1: DRV8215 @ 0x30
  #     Motor 2: DRV8215 @ 0x31
  #     Motor 3: DRV8215 @ 0x32
  #     Motor 4: DRV8215 @ 0x33
  #     Motor 5: DRV8215 @ 0x34
  #     Motor 6: DRV8215 @ 0x35
  
  zone_1: !include
    file: zones/tanh.yaml
    # file: zones/linear.yaml
    # file: zones/pid.yaml
    # file: zones/remote.yaml
    vars:
      zone_number: "1"
      motor_number: ${zone_1_motor_number}
      id: wc
      friendly_name: "${zone_1_friendly_name}"
      temperature_sensor: ${zone_1_temperature_sensor}
      zone_area_default: ${zone_1_area_default}
      zone_max_opening_default: ${zone_1_max_opening_default}
      default_preset: ${zone_1_default_preset}
      preset_home_temp: "${zone_1_preset_home_temp}"
      preset_away_temp: "${zone_1_preset_away_temp}"
      preset_boost_temp: "${zone_1_preset_boost_temp}"
      check_interval: ${zone_1_check_interval}
      tanh_steepness: ${zone_1_tanh_steepness}

  zone_2: !include
    file: zones/tanh.yaml
    # file: zones/linear.yaml
    # file: zones/pid.yaml
    # file: zones/remote.yaml
    vars:
      zone_number: "2"
      motor_number: ${zone_2_motor_number}
      id: storage
      friendly_name: "${zone_2_friendly_name}"
      temperature_sensor: ${zone_2_temperature_sensor}
      zone_area_default: ${zone_2_area_default}
      zone_max_opening_default: ${zone_2_max_opening_default}
      default_preset: ${zone_2_default_preset}
      preset_home_temp: "${zone_2_preset_home_temp}"
      preset_away_temp: "${zone_2_preset_away_temp}"
      preset_boost_temp: "${zone_2_preset_boost_temp}"
      check_interval: ${zone_2_check_interval}
      tanh_steepness: ${zone_2_tanh_steepness}

  zone_3: !include
    file: zones/tanh.yaml
    # file: zones/linear.yaml
    # file: zones/pid.yaml
    # file: zones/remote.yaml
    vars:
      zone_number: "3"
      motor_number: ${zone_3_motor_number}
      id: living
      friendly_name: "${zone_3_friendly_name}"
      temperature_sensor: ${zone_3_temperature_sensor}
      zone_area_default: ${zone_3_area_default}
      zone_max_opening_default: ${zone_3_max_opening_default}
      default_preset: ${zone_3_default_preset}
      preset_home_temp: "${zone_3_preset_home_temp}"
      preset_away_temp: "${zone_3_preset_away_temp}"
      preset_boost_temp: "${zone_3_preset_boost_temp}"
      check_interval: ${zone_3_check_interval}
      tanh_steepness: ${zone_3_tanh_steepness}

  zone_4: !include
    file: zones/tanh.yaml
    # file: zones/linear.yaml
    # file: zones/pid.yaml
    # file: zones/remote.yaml
    vars:
      zone_number: "4"
      motor_number: ${zone_4_motor_number}
      id: dining
      friendly_name: "${zone_4_friendly_name}"
      temperature_sensor: ${zone_4_temperature_sensor}
      zone_area_default: ${zone_4_area_default}
      zone_max_opening_default: ${zone_4_max_opening_default}
      default_preset: ${zone_4_default_preset}
      preset_home_temp: "${zone_4_preset_home_temp}"
      preset_away_temp: "${zone_4_preset_away_temp}"
      preset_boost_temp: "${zone_4_preset_boost_temp}"
      check_interval: ${zone_4_check_interval}
      tanh_steepness: ${zone_4_tanh_steepness}

  zone_5: !include
    file: zones/tanh.yaml
    # file: zones/linear.yaml
    # file: zones/pid.yaml
    # file: zones/remote.yaml
    vars:
      zone_number: "5"
      motor_number: ${zone_5_motor_number}
      id: kitchen
      friendly_name: "${zone_5_friendly_name}"
      temperature_sensor: ${zone_5_temperature_sensor}
      zone_area_default: ${zone_5_area_default}
      zone_max_opening_default: ${zone_5_max_opening_default}
      default_preset: ${zone_5_default_preset}
      preset_home_temp: "${zone_5_preset_home_temp}"
      preset_away_temp: "${zone_5_preset_away_temp}"
      preset_boost_temp: "${zone_5_preset_boost_temp}"
      check_interval: ${zone_5_check_interval}
      tanh_steepness: ${zone_5_tanh_steepness}

  zone_6: !include
    file: zones/tanh.yaml
    # file: zones/linear.yaml
    # file: zones/pid.yaml
    # file: zones/remote.yaml
    vars:
      zone_number: "6"
      motor_number: ${zone_6_motor_number}
      id: office
      friendly_name: "${zone_6_friendly_name}"
      temperature_sensor: ${zone_6_temperature_sensor}
      zone_area_default: ${zone_6_area_default}
      zone_max_opening_default: ${zone_6_max_opening_default}
      default_preset: ${zone_6_default_preset}
      preset_home_temp: "${zone_6_preset_home_temp}"
      preset_away_temp: "${zone_6_preset_away_temp}"
      preset_boost_temp: "${zone_6_preset_boost_temp}"
      check_interval: ${zone_6_check_interval}
      tanh_steepness: ${zone_6_tanh_steepness}


# ============================================
# TEMPERATURE SENSORS
# ============================================
# Choose sensor type based on your setup.
# The sensor ID must match the zone's temperature_sensor variable.

sensor:
  # ============================================
  # Option 1: Home Assistant sensors (recommended)
  # ============================================
  - platform: homeassistant
    name: "Corridor Temperature"
    entity_id: ${ha_corridor_temp_entity}
    id: corridor_temp

  - platform: homeassistant
    name: "Storage Temperature"
    entity_id: ${ha_storage_temp_entity}
    id: storage_temp

  - platform: homeassistant
    name: "Living Room Temperature"
    entity_id: ${ha_living_temp_entity}
    id: living_temp

  - platform: homeassistant
    name: "Office Temperature"
    entity_id: ${ha_office_temp_entity}
    id: office_temp

  - platform: homeassistant
    name: "Bedroom Temperature"
    entity_id: ${ha_bedroom_temp_entity}
    id: bedroom_temp

  - platform: homeassistant
    name: "Bathroom Temperature"
    entity_id: ${ha_bathroom_temp_entity}
    id: bathroom_temp

  # ============================================
  # Option 2: Dallas/OneWire DS18B20 sensors
  # ============================================
  # - platform: dallas_temp
  #   index: 0
  #   name: "Living Room Temperature"
  #   id: living_temp

  # ============================================
  # Option 3: DHT22/DHT11 sensors
  # ============================================
  # - platform: dht
  #   model: DHT22
  #   pin: GPIO25
  #   temperature:
  #     name: "Living Room Temperature"
  #     id: living_temp

  # ============================================
  # Option 4: BLE Xiaomi sensors
  # ============================================
  # esp32_ble_tracker:
  # - platform: xiaomi_lywsdcgq
  #   mac_address: "58:2D:34:37:F1:10"
  #   temperature:
  #     name: "Living Room Temperature"
  #     id: living_temp

  # ============================================
  # Option 5: I2C sensors (SHT3x, BME280)
  # ============================================
  # - platform: sht3xd
  #   temperature:
  #     name: "Living Room Temperature"
  #     id: living_temp
