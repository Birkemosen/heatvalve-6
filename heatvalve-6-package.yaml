# ============================================
# HeatValve-6 - Package Base Config
# ============================================
# Base config intended for ESPHome remote_package usage.
# External components are provided by the entrypoint config.
#
# SETUP (with remote_package):
# heatvalve-6/
# |- heatvalve-6-package.yaml
#
# HARDWARE:
#   - ESP32-S3 Super Mini
#   - 6x DRV8215 I2C motor drivers (individual H-bridge per motor)
#   - 6x motor valves with current-based endstop detection
#
# For flashing: press BOOT button for 2-3 seconds before serial init
# After OTA update: press EN (reset) button to run firmware

# NOTE:
# - Keep this file free of `!secret` values for remote_package compatibility.
# - `external_components` must be defined in the top-level entrypoint YAML.

# ============================================
# General Configuration
# ============================================
# NOTE: Values below are package defaults.
# Override them in heatvalve-6-esphome.yaml by defining the same substitution key.
substitutions:
  name: heatvalve-6
  friendly_name: "HeatValve-6"
  id_prefix: "heating_"
  zone_entities_internal: "false"  # set true to hide zone entities from web_server/API
  revision: "1.0.0"
  wifi_ssid: "CHANGE_ME_WIFI_SSID"
  wifi_password: "CHANGE_ME_WIFI_PASSWORD"
  fallback_password: "CHANGE_ME_FALLBACK_PASSWORD"
  ota_password: "CHANGE_ME_OTA_PASSWORD"
   
  # Multi-controller configuration
  controller_id: "1"  # Change to "2" for second controller
  total_controllers: "2"  # Total number of controllers in the system
    
  #time
  TZ: "Europe/Zurich" #timezone
  reboot_days_of_week: "MON"
  reboot_hours: "5"
  reboot_minutes: "0"
  reboot_seconds: "0"
  onboot_valve_calibration_delay: "1min"
  
  # Valve maintenance (exercise valves to prevent sticking)
  # Set to "0s" to disable periodic maintenance
  valve_maintenance_interval: "7d"  # 7 days
  
  # DS18x20 sensors are auto-discovered on the 1-Wire bus.
  # Use the UI selects in the Settings group to map:
  #   - DS18x20 Select Input Sensor
  #   - DS18x20 Select Output Sensor
  #   - DS18x20 Select Extra Sensor
  
  adc_zero_calibration: "-0.075"
  pump_mac_address: "AA:BB:CC:DD:EE:FF"
  
  # INA219 current sensor I2C address (A0,A1 to GND = 0x40)
  ina219_address: 0x40

  # Web/API tuning
  web_server_port: "80"
  web_server_version: "3"
  web_server_log: "false"
  api_reboot_timeout: "30min"

  # WiFi radio tuning
  wifi_power_save_mode: "none"
  wifi_output_power: "17dB"

  # Pump control timing
  circulation_check_interval: "24h"
  circulation_run_duration: "5min"

  # Home Assistant entity mapping (room temperatures)
  ha_corridor_temp_entity: "sensor.corridor_temperature"
  ha_storage_temp_entity: "sensor.storage_temperature"
  ha_living_temp_entity: "sensor.living_room_temperature"
  ha_office_temp_entity: "sensor.office_temperature"
  ha_bedroom_temp_entity: "sensor.bedroom_temperature"
  ha_bathroom_temp_entity: "sensor.bathroom_temperature"

  # Zone defaults (advanced tuning)
  zone_1_motor_number: "1"
  zone_1_friendly_name: "WC"
  zone_1_temperature_sensor: "corridor_temp"
  zone_1_area_default: "4"
  zone_1_max_opening_default: "90"
  zone_1_default_preset: "HOME"
  zone_1_preset_home_temp: "21 °C"
  zone_1_preset_away_temp: "19 °C"
  zone_1_preset_boost_temp: "23 °C"
  zone_1_check_interval: "15min"
  zone_1_tanh_steepness: "0.70"

  zone_2_motor_number: "2"
  zone_2_friendly_name: "Storage"
  zone_2_temperature_sensor: "storage_temp"
  zone_2_area_default: "6"
  zone_2_max_opening_default: "90"
  zone_2_default_preset: "HOME"
  zone_2_preset_home_temp: "21 °C"
  zone_2_preset_away_temp: "19 °C"
  zone_2_preset_boost_temp: "23 °C"
  zone_2_check_interval: "16min"
  zone_2_tanh_steepness: "0.70"

  zone_3_motor_number: "3"
  zone_3_friendly_name: "Living Room"
  zone_3_temperature_sensor: "living_temp"
  zone_3_area_default: "25"
  zone_3_max_opening_default: "90"
  zone_3_default_preset: "HOME"
  zone_3_preset_home_temp: "21 °C"
  zone_3_preset_away_temp: "19 °C"
  zone_3_preset_boost_temp: "23 °C"
  zone_3_check_interval: "17min"
  zone_3_tanh_steepness: "0.70"

  zone_4_motor_number: "4"
  zone_4_friendly_name: "Dining Room"
  zone_4_temperature_sensor: "living_temp"
  zone_4_area_default: "15"
  zone_4_max_opening_default: "90"
  zone_4_default_preset: "HOME"
  zone_4_preset_home_temp: "21 °C"
  zone_4_preset_away_temp: "19 °C"
  zone_4_preset_boost_temp: "23 °C"
  zone_4_check_interval: "18min"
  zone_4_tanh_steepness: "0.70"

  zone_5_motor_number: "5"
  zone_5_friendly_name: "Kitchen"
  zone_5_temperature_sensor: "living_temp"
  zone_5_area_default: "12"
  zone_5_max_opening_default: "90"
  zone_5_default_preset: "HOME"
  zone_5_preset_home_temp: "21 °C"
  zone_5_preset_away_temp: "19 °C"
  zone_5_preset_boost_temp: "23 °C"
  zone_5_check_interval: "15min"
  zone_5_tanh_steepness: "0.70"

  zone_6_motor_number: "6"
  zone_6_friendly_name: "Office"
  zone_6_temperature_sensor: "office_temp"
  zone_6_area_default: "10"
  zone_6_max_opening_default: "90"
  zone_6_default_preset: "HOME"
  zone_6_preset_home_temp: "21 °C"
  zone_6_preset_away_temp: "19 °C"
  zone_6_preset_boost_temp: "23 °C"
  zone_6_check_interval: "16min"
  zone_6_tanh_steepness: "0.70"
  
  # ============================================
  # CONTROL PROFILE
  # ============================================
  # NOTE: ESPHome does not support substitutions in !include paths.
  # To change control profile, manually replace the path in all zone includes below.
  # Options:
  #   zones/tanh.yaml   (default)
  #   zones/linear.yaml
  #   zones/pid.yaml
  #   zones/remote.yaml

# ============================================
# Web Server
# ============================================
web_server:
  port: ${web_server_port}
  version: ${web_server_version}
  log: ${web_server_log}  # Disable for better performance
  sorting_groups:
    # Zone groups (one per zone)
    - id: sorting_group_zone_1
      name: "Zone 1: ${zone_1_friendly_name}"
      sorting_weight: 10
    - id: sorting_group_zone_2
      name: "Zone 2: ${zone_2_friendly_name}"
      sorting_weight: 11
    - id: sorting_group_zone_3
      name: "Zone 3: ${zone_3_friendly_name}"
      sorting_weight: 12
    - id: sorting_group_zone_4
      name: "Zone 4: ${zone_4_friendly_name}"
      sorting_weight: 13
    - id: sorting_group_zone_5
      name: "Zone 5: ${zone_5_friendly_name}"
      sorting_weight: 14
    - id: sorting_group_zone_6
      name: "Zone 6: ${zone_6_friendly_name}"
      sorting_weight: 15
    - id: sorting_group_zone_7
      name: "Zone 7: Bedroom"
      sorting_weight: 16
    - id: sorting_group_zone_8
      name: "Zone 8: Bathroom"
      sorting_weight: 17
    # System groups
    - id: sorting_group_settings
      name: "Settings"
      sorting_weight: 80
    - id: sorting_group_status
      name: "Status"
      sorting_weight: 81
    - id: sorting_group_debug
      name: "Debug"
      sorting_weight: 90

