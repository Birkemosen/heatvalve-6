# ============================================
# HeatValve-6 - ESPHome Server Entrypoint (No local clone)
# ============================================
# Use this file in Home Assistant/ESPHome when your config lives in /config
# and you want all firmware YAML/components fetched from GitHub.
#
# Copy this file to /config/heatvalve-6-<device>.yaml and adjust substitutions.

substitutions:
  # These keys override same-named substitutions in heatvalve-6-package.yaml.
  # Edit these in ESPHome UI per device.

  # Device identity
  name: heatvalve-6-stue
  friendly_name: "HeatValve-6"

  # General settings
  id_prefix: "heating_"
  zone_entities_internal: "false"
  revision: "1.0.0"

  # Multi-controller configuration
  controller_id: "1"
  total_controllers: "2"

  # Time + maintenance
  TZ: "Europe/Zurich"
  reboot_days_of_week: "MON"
  reboot_hours: "5"
  reboot_minutes: "0"
  reboot_seconds: "0"
  onboot_valve_calibration_delay: "1min"
  valve_maintenance_interval: "7d"

  # Hardware parameters
  adc_zero_calibration: "-0.075"
  pump_mac_address: "AA:BB:CC:DD:EE:FF"
  ina219_address: "0x40"

  # Web/API tuning
  web_server_port: "80"
  web_server_version: "3"
  web_server_log: "false"
  api_reboot_timeout: "30min"

  # WiFi radio tuning
  wifi_power_save_mode: "none"
  wifi_output_power: "17dB"

  # Optional manual IP values (disabled by default; see wifi block below)
  manual_ip_static_ip: "192.168.20.56"
  manual_ip_gateway: "192.168.20.1"
  manual_ip_subnet: "255.255.255.0"

  # Pump control timing
  circulation_check_interval: "24h"
  circulation_run_duration: "5min"

  # Home Assistant entity mapping (room temperatures)
  ha_corridor_temp_entity: "sensor.corridor_temperature"
  ha_storage_temp_entity: "sensor.storage_temperature"
  ha_living_temp_entity: "sensor.living_room_temperature"
  ha_office_temp_entity: "sensor.office_temperature"
  ha_bedroom_temp_entity: "sensor.bedroom_temperature"
  ha_bathroom_temp_entity: "sensor.bathroom_temperature"

  # Zone defaults (advanced tuning)
  zone_1_motor_number: "1"
  zone_1_friendly_name: "WC"
  zone_1_temperature_sensor: "corridor_temp"
  zone_1_area_default: "4"
  zone_1_max_opening_default: "90"
  zone_1_default_preset: "HOME"
  zone_1_preset_home_temp: "21 °C"
  zone_1_preset_away_temp: "19 °C"
  zone_1_preset_boost_temp: "23 °C"
  zone_1_check_interval: "15min"
  zone_1_tanh_steepness: "0.70"

  zone_2_motor_number: "2"
  zone_2_friendly_name: "Storage"
  zone_2_temperature_sensor: "storage_temp"
  zone_2_area_default: "6"
  zone_2_max_opening_default: "90"
  zone_2_default_preset: "HOME"
  zone_2_preset_home_temp: "21 °C"
  zone_2_preset_away_temp: "19 °C"
  zone_2_preset_boost_temp: "23 °C"
  zone_2_check_interval: "16min"
  zone_2_tanh_steepness: "0.70"

  zone_3_motor_number: "3"
  zone_3_friendly_name: "Living Room"
  zone_3_temperature_sensor: "living_temp"
  zone_3_area_default: "25"
  zone_3_max_opening_default: "90"
  zone_3_default_preset: "HOME"
  zone_3_preset_home_temp: "21 °C"
  zone_3_preset_away_temp: "19 °C"
  zone_3_preset_boost_temp: "23 °C"
  zone_3_check_interval: "17min"
  zone_3_tanh_steepness: "0.70"

  zone_4_motor_number: "4"
  zone_4_friendly_name: "Dining Room"
  zone_4_temperature_sensor: "living_temp"
  zone_4_area_default: "15"
  zone_4_max_opening_default: "90"
  zone_4_default_preset: "HOME"
  zone_4_preset_home_temp: "21 °C"
  zone_4_preset_away_temp: "19 °C"
  zone_4_preset_boost_temp: "23 °C"
  zone_4_check_interval: "18min"
  zone_4_tanh_steepness: "0.70"

  zone_5_motor_number: "5"
  zone_5_friendly_name: "Kitchen"
  zone_5_temperature_sensor: "living_temp"
  zone_5_area_default: "12"
  zone_5_max_opening_default: "90"
  zone_5_default_preset: "HOME"
  zone_5_preset_home_temp: "21 °C"
  zone_5_preset_away_temp: "19 °C"
  zone_5_preset_boost_temp: "23 °C"
  zone_5_check_interval: "15min"
  zone_5_tanh_steepness: "0.70"

  zone_6_motor_number: "6"
  zone_6_friendly_name: "Office"
  zone_6_temperature_sensor: "office_temp"
  zone_6_area_default: "10"
  zone_6_max_opening_default: "90"
  zone_6_default_preset: "HOME"
  zone_6_preset_home_temp: "21 °C"
  zone_6_preset_away_temp: "19 °C"
  zone_6_preset_boost_temp: "23 °C"
  zone_6_check_interval: "16min"
  zone_6_tanh_steepness: "0.70"

  # Provide secrets locally (remote packages must not use !secret)
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  fallback_password: !secret fallback_password
  ota_password: !secret ota_password

external_components:
  - source:
      type: local
      path: components
    components:
      - heatvalve_dashboard
      - drv8215

packages:
  base: !include heatvalve-6-package.yaml

# Optional static IP override.
# Keep commented to use DHCP (default behavior from package config).
# Uncomment to enable manual IP:
# wifi:
#   manual_ip:
#     static_ip: ${manual_ip_static_ip}
#     gateway: ${manual_ip_gateway}
#     subnet: ${manual_ip_subnet}
