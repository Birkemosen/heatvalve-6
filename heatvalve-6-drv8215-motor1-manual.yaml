# DRV8215 motor-1 only manual test profile
# Run: esphome run heatvalve-6-drv8215-motor1-manual.yaml

esphome:
  friendly_name: HeatValve DRV8215 M1 Manual Test

external_components:
  - source:
      type: local
      path: components
    components:
      - drv8215

substitutions:
  name: heatvalve-6-drv8215-m1
  id_prefix: "heating_"
  revision: "1.0.0"
  onboot_valve_calibration_delay: "0s"

  # Pin mapping from attached ESP32-S3 Supermini schematic
  # nFAULT_BUS -> GPIO4, nSLEEP_BUS -> GPIO6, IPROPI -> GPIO7
  motor_nsleep_pin: GPIO6
  motor_nfault_pin: GPIO4
  motor_ipropi_pin: GPIO7
  i2c_sda_pin: GPIO8
  i2c_scl_pin: GPIO9
  drv_m1_addr: "0x30"

switch:
  - platform: template
    name: "Standalone Mode (Stub)"
    id: ${id_prefix}standalone_mode
    optimistic: true
    restore_mode: ALWAYS_OFF
    internal: true

script:
  - id: valve_maintenance
    then:
      - logger.log:
          tag: drvtest
          level: DEBUG
          format: "valve_maintenance stub (disabled in motor-1 manual test)"

logger:
  level: INFO

api:
  reboot_timeout: 30min

ota:
  platform: esphome
  password: !secret ota_password

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.20.56
    gateway: 192.168.20.1
    subnet: 255.255.255.0
  ap:
    ssid: "UFH_Fallback"
    password: !secret fallback_password
  power_save_mode: none

captive_portal:

web_server:
  port: 80
  version: 3

packages:
  board: !include boards/esp32-s3.yaml
  drv8215_test_motor1_manual: !include core/drv8215_test_motor1_manual.yaml
