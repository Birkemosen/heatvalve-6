# Minimal standalone config for DRV8837 hardware testing
# Run: esphome run config_drv8837_basic.yaml

esphome:
  name: heatvalve-6
  friendly_name: HeatValve DRV Test

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

substitutions:
  motor_mux_pin: GPIO2
  motor_dir1_pin: GPIO6
  motor_dir2_pin: GPIO5
  motor_ena0_pin: GPIO11
  motor_ena1_pin: GPIO3
  motor_ena2_pin: GPIO4

logger:
  level: INFO

api:
  reboot_timeout: 30min

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.20.56
    gateway: 192.168.20.1
    subnet: 255.255.255.0
  ap:
    ssid: "UFH_Fallback"
    password: !secret fallback_password
  power_save_mode: none

captive_portal:

web_server:
  port: 80
  version: 3

packages:
  drv8837_basic_test: !include core/drv8837_basic_test.yaml
