# Home Assistant dashboard: Motor 1 test and diagnostics
#
# Usage:
# 1) In Home Assistant, go to Settings → Dashboards → Add dashboard.
# 2) Choose "Empty dashboard", then open the raw config editor (⋮ → Edit in YAML).
# 3) Paste this entire file.
#
# Entity IDs follow the ESPHome naming convention for:
#   friendly_name: "HeatValve-6 UFH Controller"
# All IDs are prefixed:  heatvalve_6_ufh_controller_

title: HeatValve-6 Motor 1 Test
views:
  - title: Motor 1 Test
    icon: mdi:engine
    cards:
      - type: vertical-stack
        cards:
          - type: entities
            title: HeatValve-6 Motor 1 Test Controls
            show_header_toggle: false
            entities:
              - entity: switch.heatvalve_6_ufh_controller_motor_drivers_enabled
                name: Motor Drivers Enabled (ARM)
              - entity: button.heatvalve_6_ufh_controller_motor_1_self_learn
                name: Motor 1 Self-Learn
              - entity: number.heatvalve_6_ufh_controller_motor_1_target_position
                name: Motor 1 Target Position
              - type: buttons
                entities:
                  - entity: button.heatvalve_6_ufh_controller_motor_1_open_100
                    name: Open 100%
                  - entity: button.heatvalve_6_ufh_controller_motor_1_close_0
                    name: Close 0%
                  - entity: button.heatvalve_6_ufh_controller_motor_1_stop_now
                    name: Stop Now

          - type: history-graph
            title: Motor 1 Live Diagnostics (30 min)
            hours_to_show: 0.5
            refresh_interval: 5
            entities:
              - entity: sensor.heatvalve_6_ufh_controller_motor_current
                name: Current (mA)
              - entity: sensor.heatvalve_6_ufh_controller_motor_1_ripple_count
                name: Ripple Count

          - type: entities
            title: Motor 1 Calibration Diagnostics
            show_header_toggle: false
            entities:
              - entity: sensor.heatvalve_6_ufh_controller_motor_1_learned_open_ripples
                name: Learned Open Ripples
              - entity: sensor.heatvalve_6_ufh_controller_motor_1_learned_close_ripples
                name: Learned Close Ripples

          - type: gauge
            entity: number.heatvalve_6_ufh_controller_motor_1_target_position
            name: Motor 1 Target Position
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 60
              red: 90
