esphome:
  platformio_options:
    platform: platformio/espressif32@6.12.0
    platform_packages:
      - platformio/toolchain-xtensa-esp-elf@14.2.0+20251107
    board_build.flash_mode: qio
    board_build.psram_type: qio
    board_build.extra_flags:
      - -DBOARD_HAS_PSRAM

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 4MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESPTOOLPY_FLASHSIZE_4MB: "y"
      CONFIG_SPIRAM: "y"
      CONFIG_SPIRAM_MODE_QUAD: "y"
      # Prefer PSRAM for large networking/crypto/BLE allocations to keep
      # internal heap available for the HTTP(S) client tasks (Helios/Asgard/
      # forecast) and the dashboard web server.
      CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP: "y"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      # mDNS is disabled; Helios HTTP uses a 3s socket timeout so 15s is
      # sufficient headroom for DNS + connect + transfer on weak WiFi.
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "15"
      CONFIG_LWIP_MAX_LISTENING_TCP: "5"
      CONFIG_HTTPD_MAX_URI_LEN: "128"
      # loopTask (ESPHome main loop) runs every component loop() plus the BLE
      # advertise lambda. The 3584 B default left only ~672 B headroom, risking
      # stack overflow during BLE bursts; 8 KB gives comfortable margin. RAM use
      # is ~16%, so the extra few KB is free.
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "8192"
      # FreeRTOS runtime stats — lets the dashboard report per-core CPU load and
      # per-task CPU% / stack headroom (uxTaskGetSystemState) so a task that
      # saturates a core or starves the loop can be pinpointed. The stats-
      # formatting helper functions are deliberately NOT enabled (we compute the
      # percentages ourselves) to keep the flash cost to a few KB.
      CONFIG_FREERTOS_USE_TRACE_FACILITY: "y"
      CONFIG_FREERTOS_GENERATE_RUN_TIME_STATS: "y"

# Enable the ESPHome `psram:` component so the debug platform can expose a
# Free PSRAM sensor. The IDF sdkconfig above already enables SPIRAM at the
# kernel level; this block is purely for ESPHome runtime visibility.
psram:
  mode: quad
  speed: 80MHz
