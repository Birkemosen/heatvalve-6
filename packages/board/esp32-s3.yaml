esphome:
  platformio_options:
    platform: platformio/espressif32@6.12.0
    platform_packages:
      - platformio/toolchain-xtensa-esp-elf@14.2.0+20251107
    board_build.flash_mode: qio
    board_build.psram_type: qio
    board_build.extra_flags:
      - -DBOARD_HAS_PSRAM

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 4MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESPTOOLPY_FLASHSIZE_4MB: "y"
      CONFIG_SPIRAM: "y"
      CONFIG_SPIRAM_MODE_QUAD: "y"
      # Prefer PSRAM for large networking/crypto/BLE allocations to keep
      # internal heap available for MQTT write paths and mDNS allocations.
      CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP: "y"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      # ESPHome's http_request component is synchronous and blocks loopTask
      # during DNS resolution + HTTP exchange. The default 5s WDT is too tight
      # when an endpoint is unreachable (mDNS timeouts can take 10–30s).
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "30"
      CONFIG_LWIP_MAX_LISTENING_TCP: "5"
      CONFIG_HTTPD_MAX_URI_LEN: "128"

# Enable the ESPHome `psram:` component so the debug platform can expose a
# Free PSRAM sensor. The IDF sdkconfig above already enables SPIRAM at the
# kernel level; this block is purely for ESPHome runtime visibility.
psram:
  mode: quad
  speed: 80MHz
