# BLE passive scanning for BTHome temperature sensors (Shelly BLU H&T, etc.)
# Sensors feed into the zone controller's external temperature slot via on_value.
# Configure MAC address per zone in Settings > Zone X BLE MAC.
#
# To use: set zone temp source to "BLE Sensor" and enter the device MAC address.
# The MAC is printed on the device label (e.g. "AA:BB:CC:DD:EE:FF").

esp32_ble_tracker:
  scan_parameters:
    # Active scanning sends scan requests so devices reply with their scan
    # response, which carries the local name (Shelly BLU H&T put the name there,
    # not in the primary advertisement). Costs a little extra battery on the
    # sensors; set to false if that matters and you only need MAC-based pairing.
    active: true
    # ~9% listen duty cycle (window/interval). High enough to reliably catch
    # BTHome advertisements from Shelly BLU H&T (which broadcast every few
    # seconds) while keeping radio/heap pressure modest alongside the HTTP(S)
    # client tasks. A much lower duty cycle (e.g. 30ms/3000ms) misses most
    # advertisements and leaves the discovery cache empty.
    interval: 320ms
    window: 30ms
  on_ble_advertise:
    then:
      - lambda: |-
          // BTHome v2 service data UUID: 0xFCD2
          for (const auto &sd : x.get_service_datas()) {
            if (sd.uuid != esphome::esp32_ble_tracker::ESPBTUUID::from_uint16(0xFCD2))
              continue;
            if (sd.data.size() < 3)
              continue;

            // Get source MAC as string
            char mac_buf[18];
            auto addr_raw = x.address();
            snprintf(mac_buf, sizeof(mac_buf), "%02X:%02X:%02X:%02X:%02X:%02X",
                     addr_raw[0], addr_raw[1], addr_raw[2], addr_raw[3], addr_raw[4], addr_raw[5]);

            // Rate-limit EVERY BTHome device to one update per MAC per 30 s.
            // Throttle here, before any per-MAC work, so an unconfigured device
            // being discovered is not reprocessed on every advertisement. Uses a
            // fixed-size cache (no heap) to avoid fragmentation.
            struct LastSeen {
              char mac[18];
              uint32_t ts;
              bool used;
            };
            static LastSeen last_update[16] = {};
            uint32_t now = millis();
            int slot = -1;
            for (int i = 0; i < 16; i++) {
              if (last_update[i].used && memcmp(last_update[i].mac, mac_buf, 18) == 0) {
                slot = i;
                break;
              }
            }
            if (slot >= 0 && (now - last_update[slot].ts) < 30000)
              continue;
            if (slot < 0) {
              // Claim a free slot, else evict the least-recently-updated one.
              int oldest = 0;
              uint32_t oldest_ts = UINT32_MAX;
              for (int i = 0; i < 16; i++) {
                if (!last_update[i].used) { oldest = i; break; }
                if (last_update[i].ts < oldest_ts) { oldest_ts = last_update[i].ts; oldest = i; }
              }
              slot = oldest;
              memcpy(last_update[slot].mac, mac_buf, 18);
              last_update[slot].used = true;
            }
            last_update[slot].ts = now;

            // Parse BTHome v2 payload for temperature
            // Object IDs: 0x02 = temperature 0.01°C, 0x45 = temperature 0.1°C
            const auto &data = sd.data;
            size_t pos = 1;  // Skip device info byte
            float temperature = NAN;

            while (pos < data.size()) {
              uint8_t obj_id = data[pos];
              // Determine data length for BTHome v2 object IDs.
              // Binary sensors (0x0F–0x2D) are all uint8 = 1 byte.
              uint8_t dlen = 0;
              if (obj_id >= 0x0F && obj_id <= 0x2D) {
                dlen = 1;  // all binary sensor IDs
              } else {
                switch (obj_id) {
                  case 0x00: dlen = 1; break;  // packet_id
                  case 0x01: dlen = 1; break;  // battery
                  case 0x02: dlen = 2; break;  // temperature (0.01 °C)
                  case 0x03: dlen = 2; break;  // humidity (0.01 %)
                  case 0x04: dlen = 3; break;  // pressure (uint24)
                  case 0x05: dlen = 3; break;  // illuminance (uint24)
                  case 0x06: dlen = 2; break;  // mass kg
                  case 0x07: dlen = 2; break;  // mass lb
                  case 0x08: dlen = 2; break;  // dewpoint
                  case 0x09: dlen = 1; break;  // count (uint8)
                  case 0x0A: dlen = 3; break;  // energy (uint24)
                  case 0x0B: dlen = 3; break;  // power (uint24)
                  case 0x0C: dlen = 2; break;  // voltage
                  case 0x0D: dlen = 2; break;  // pm2.5
                  case 0x0E: dlen = 2; break;  // pm10
                  case 0x2E: dlen = 1; break;  // humidity (uint8)
                  case 0x2F: dlen = 2; break;  // moisture (uint16)
                  case 0x3A: dlen = 1; break;  // button event
                  case 0x3C: dlen = 1; break;  // dimmer event
                  case 0x3D: dlen = 2; break;  // count (uint16)
                  case 0x3E: dlen = 4; break;  // count (uint32)
                  case 0x40: dlen = 2; break;  // distance mm
                  case 0x41: dlen = 2; break;  // distance m
                  case 0x42: dlen = 3; break;  // duration
                  case 0x43: dlen = 2; break;  // current
                  case 0x44: dlen = 2; break;  // speed
                  case 0x45: dlen = 2; break;  // temperature (0.1 °C)
                  case 0x46: dlen = 2; break;  // UV index
                  case 0x47: dlen = 4; break;  // volume litre (uint32)
                  case 0x48: dlen = 2; break;  // volume mL
                  case 0x49: dlen = 2; break;  // volume flow rate
                  case 0x4A: dlen = 2; break;  // voltage (0.1V)
                  case 0x4B: dlen = 3; break;  // gas (uint24)
                  case 0x4C: dlen = 4; break;  // gas (uint32)
                  case 0x4D: dlen = 4; break;  // energy (uint32)
                  case 0x4E: dlen = 4; break;  // volume (uint32)
                  case 0x4F: dlen = 2; break;  // water
                  case 0x50: dlen = 4; break;  // timestamp
                  case 0x51: dlen = 2; break;  // acceleration
                  case 0x52: dlen = 2; break;  // gyroscope
                  default: dlen = 1; break;    // fallback: assume 1
                }
              }

              if (pos + 1 + dlen > data.size())
                break;
              if (obj_id == 0x02) {
                int16_t raw = static_cast<int16_t>(data[pos + 1] | (data[pos + 2] << 8));
                temperature = raw * 0.01f;
              } else if (obj_id == 0x45) {
                int16_t raw = static_cast<int16_t>(data[pos + 1] | (data[pos + 2] << 8));
                temperature = raw * 0.1f;
              }
              pos += 1 + dlen;
            }

            // Record EVERY BTHome device in the discovery cache (even when this
            // packet had no parseable temperature) so the dashboard lists all
            // nearby sensors for tap-to-assign. The advertised local name (from
            // the scan response — requires active scanning) is shown when known.
            const std::string &dev_name = x.get_name();
            id(hv6_zones).report_ble_sensor_seen(mac_buf, temperature,
                                                  static_cast<int8_t>(x.get_rssi()),
                                                  dev_name.empty() ? nullptr : dev_name.c_str());

            // Only the zone-temperature assignment below needs a valid reading.
            if (std::isnan(temperature))
              continue;

            // Match against configured zone MACs without copying the whole
            // DeviceConfig (match_ble_mac copies only the 18-byte MAC fields).
            int8_t mz = id(hv6_zones).match_ble_mac(mac_buf);
            if (mz >= 0) {
              uint8_t z = static_cast<uint8_t>(mz);
              ESP_LOGI("ble_temp", "Zone %d BLE temp: %.1f°C (%s)", z + 1, temperature, mac_buf);
              id(hv6_zones).set_zone_external_temperature(z, temperature);
              switch (z) {
                case 0: id(ble_temp_zone_1).publish_state(temperature); break;
                case 1: id(ble_temp_zone_2).publish_state(temperature); break;
                case 2: id(ble_temp_zone_3).publish_state(temperature); break;
                case 3: id(ble_temp_zone_4).publish_state(temperature); break;
                case 4: id(ble_temp_zone_5).publish_state(temperature); break;
                case 5: id(ble_temp_zone_6).publish_state(temperature); break;
              }
            }
          }

sensor:
  - platform: template
    name: "Zone 1 BLE Temperature"
    id: ble_temp_zone_1
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    entity_category: diagnostic
    icon: "mdi:bluetooth-transfer"

