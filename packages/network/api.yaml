api:
  encryption:
    key: !secret api_key
  services:
    - service: motor_reset_fault
      variables:
        zone: int
      then:
        - lambda: |-
            if (zone < 0 || zone >= 6) { ESP_LOGW("hv6_svc", "reset_fault: invalid zone %d", zone); return; }
            if (!id(hv6_valves).reset_fault(static_cast<uint8_t>(zone)))
              ESP_LOGW("hv6_svc", "Zone %d reset fault rejected (controller busy)", zone + 1);
    - service: motor_reset_and_relearn
      variables:
        zone: int
      then:
        - lambda: |-
            if (zone < 0 || zone >= 6) { ESP_LOGW("hv6_svc", "reset_and_relearn: invalid zone %d", zone); return; }
            if (!id(hv6_valves).reset_and_relearn(static_cast<uint8_t>(zone)))
              ESP_LOGW("hv6_svc", "Zone %d reset+relearn rejected (drivers disabled or busy)", zone + 1);
    - service: motor_reset_learned_factors
      variables:
        zone: int
      then:
        - lambda: |-
            if (zone < 0 || zone >= 6) { ESP_LOGW("hv6_svc", "reset_learned_factors: invalid zone %d", zone); return; }
            id(hv6_valves).reset_learned_factors(static_cast<uint8_t>(zone));

web_server:
  port: 80
  version: 2
  css_url: ""
  js_url: ""
  # Embed custom dashboard directly into ESPHome's web_server (served at /)
  # Alternative: serve separately like asgard's heatvalve_dashboard/ component (served at /dashboard)
  # ESPHome-only approach chosen for simplicity in heatvalve-6; keep these includes active.
  css_include: "web/dashboard.css"
  js_include: "web/dashboard.js"
