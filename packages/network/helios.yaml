# =============================================================================
# Helios-3 Integration — HeatValve-6 client
# =============================================================================
# All HTTP I/O is performed by the C++ component `hv6_helios_client` from a
# FreeRTOS task pinned to Core 1 (loopTask's core). Core 0 — which runs lwIP,
# wifi and the IDF webserver — is left entirely untouched, and the task body
# spends >99% of its wall-clock time blocked on socket I/O so it cooperatively
# yields the CPU back to loopTask. This keeps MQTT keepalive healthy even on
# weak WiFi and prevents the dashboard / web_server from hanging.
#
# Stability gates inside the component delay the first poll until WiFi has
# been stable for 10 s and MQTT for 30 s after a 30 s post-boot warmup.
# =============================================================================

hv6_helios_client:
  id: hv6_helios
  zone_controller_id: hv6_zones
  config_store_id: hv6_config
  # time_id: ha_time   # optional — wire an SNTP time component for epoch use
