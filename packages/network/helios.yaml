# =============================================================================
# Helios-3 Integration — HeatValve-6 HTTP client
# =============================================================================
# Configure connection in secrets.yaml or override helios_host/port here.
# The client sends a state snapshot to Helios every poll_interval_s seconds
# and collects optimizer commands (setpoint offsets + preheat windows).
#
# Configuration is stored in NVS and can be updated at runtime via the
# dashboard settings. These YAML values are only the compiled-in defaults.
# =============================================================================

hv6_helios_client:
  id: hv6_helios
  zone_controller_id: hv6_zones
  config_store_id: hv6_config
  # time_id: ha_time  # Optional: wire an SNTP time component for epoch-based
  #                     valid_until and preheat window support.
