# =============================================================================
# Forecast Preload — on-device wind-aware per-zone preload ("Helios-lite")
# =============================================================================
# Fetches a 48 h Open-Meteo forecast over HTTPS and issues per-zone setpoint
# preload offsets through the existing Helios command path (all per-zone safety
# clamps apply). Auto-quiesces while an external Helios service is enabled.
#
# All HTTP I/O runs in a FreeRTOS task on Core 1 (same pattern as the Helios
# and Asgard components). Configured at runtime from the dashboard Forecast
# card (ForecastConfig + per-zone exposure fields in NVS).
# Contract: docs/forecast_preload.md
# =============================================================================

hv6_forecast:
  id: hv6_forecast_id
  zone_controller_id: hv6_zones
  config_store_id: hv6_config
