# Zone thermostat climate entities (one per zone)
# set_zone_setpoint(zone_index, temperature) propagates to the zone controller
# so Home Assistant climate entities, MQTT, and the hardware stay in sync.
climate:
  - platform: thermostat
    name: "Zone 1"
    id: climate_zone_1
    sensor: temp_zone_1
    min_heating_off_time: 0s
    min_heating_run_time: 0s
    min_idle_time: 0s
    default_preset: Home
    preset:
      - name: Home
        default_target_temperature_low: 21.0
      - name: Away
        default_target_temperature_low: 18.0
      - name: Sleep
        default_target_temperature_low: 19.0
    heat_action:
      - lambda: id(hv6_zones).set_zone_setpoint(0, id(climate_zone_1).target_temperature);
    idle_action:
      - lambda: id(hv6_zones).set_zone_setpoint(0, id(climate_zone_1).target_temperature);
    visual:
      min_temperature: 15
      max_temperature: 30
      temperature_step: 0.5

