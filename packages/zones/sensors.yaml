# 8 physical 1-Wire probe slots plus logical role sensors derived from runtime mapping.
# Probes are autodiscovered by bus index in the order ESPHome finds them.
sensor:
  - platform: dallas_temp
    one_wire_id: onewire_bus
    index: 0
    name: "Probe 1 Temperature"
    id: probe_temp_1
    entity_category: diagnostic
    update_interval: 2s
    filters:
      - sliding_window_moving_average:
          window_size: 3
          send_every: 1

  - platform: dallas_temp
    one_wire_id: onewire_bus
    index: 1
    name: "Probe 2 Temperature"
    id: probe_temp_2
    entity_category: diagnostic
    update_interval: 2s
    filters:
      - sliding_window_moving_average:
          window_size: 3
          send_every: 1

  - platform: dallas_temp
    one_wire_id: onewire_bus
    index: 2
    name: "Probe 3 Temperature"
    id: probe_temp_3
    entity_category: diagnostic
    update_interval: 2s
    filters:
      - sliding_window_moving_average:
          window_size: 3
          send_every: 1

  - platform: dallas_temp
    one_wire_id: onewire_bus
    index: 3
    name: "Probe 4 Temperature"
    id: probe_temp_4
    entity_category: diagnostic
    update_interval: 2s
    filters:
      - sliding_window_moving_average:
          window_size: 3
          send_every: 1

  - platform: dallas_temp
    one_wire_id: onewire_bus
    index: 4
    name: "Probe 5 Temperature"
    id: probe_temp_5
