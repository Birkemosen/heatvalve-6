      - sliding_window_moving_average:
          window_size: 3
          send_every: 1

  - platform: dallas_temp
    one_wire_id: onewire_bus
    index: 5
    name: "Probe 6 Temperature"
    id: probe_temp_6
    entity_category: diagnostic
    update_interval: 2s
    filters:
      - sliding_window_moving_average:
          window_size: 3
          send_every: 1

  - platform: dallas_temp
    one_wire_id: onewire_bus
    index: 6
    name: "Probe 7 Temperature"
    id: probe_temp_7
    entity_category: diagnostic
    update_interval: 2s
    filters:
      - sliding_window_moving_average:
          window_size: 3
          send_every: 1

  - platform: dallas_temp
    one_wire_id: onewire_bus
    index: 7
    name: "Probe 8 Temperature"
    id: probe_temp_8
    entity_category: diagnostic
    update_interval: 2s
    filters:
      - sliding_window_moving_average:
          window_size: 3
          send_every: 1

  - platform: template
    name: "Zone 1 Temperature"
    id: temp_zone_1
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    update_interval: 2s
    lambda: return id(hv6_zones).get_zone_temperature(0);

