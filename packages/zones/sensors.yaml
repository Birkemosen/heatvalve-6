# 8 physical 1-Wire probe slots plus logical role sensors derived from runtime mapping.
# Probe slots are discovered by index once, then rebound to persisted ROMs on boot.
sensor:
  - platform: dallas_temp
    one_wire_id: onewire_bus
    index: 0
    name: "Probe 1 Temperature"
    id: probe_temp_1
    entity_category: diagnostic
    update_interval: ${onewire_update_interval}
    resolution: ${onewire_resolution_bits}
    filters:
      - sliding_window_moving_average:
          window_size: 3
          send_every: 1

  - platform: dallas_temp
    one_wire_id: onewire_bus
    index: 1
    name: "Probe 2 Temperature"
    id: probe_temp_2
