text_sensor:
  - platform: template
    name: "Zone 1 State"
    id: zone_1_state
    update_interval: 5s
    lambda: |-
      auto snap = id(hv6_zones).get_zone_snapshot(0);
      return std::string(hv6::zone_state_to_string(snap.state));

