    optimistic: false
    lambda: |-
      return id(hv6_config).get_config().motor.auto_apply_learned_factors;
    turn_on_action:
      - lambda: |-
          auto cfg = id(hv6_config).get_config();
          cfg.motor.auto_apply_learned_factors = true;
          id(hv6_config).update_motor(cfg.motor);
          id(hv6_valves).reload_motor_config();
    turn_off_action:
      - lambda: |-
          auto cfg = id(hv6_config).get_config();
          cfg.motor.auto_apply_learned_factors = false;
