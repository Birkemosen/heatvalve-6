button:
  - platform: restart
    name: "Restart"

  - platform: template
    name: "Calibrate All Motors"
    on_press:
      - lambda: |-
          for (int z = 0; z < 6; z++) {
            id(hv6_valves).request_calibration(z);
          }

  - platform: template
    name: "Motor 1 Open Flow (100%)"
    icon: "mdi:valve-open"
    entity_category: config
    on_press:
      - lambda: |-
          if (!id(hv6_valves).are_drivers_enabled()) {
            ESP_LOGW("hv6_ui", "Motor 1 OPEN FLOW ignored: drivers are disabled");
            return;
          }
          id(hv6_valves).request_position(0, 100.0f);

  - platform: template
    name: "Motor 1 Close Flow (0%)"
    icon: "mdi:valve-closed"
    entity_category: config
    on_press:
      - lambda: |-
          if (!id(hv6_valves).are_drivers_enabled()) {
            ESP_LOGW("hv6_ui", "Motor 1 CLOSE FLOW ignored: drivers are disabled");
            return;
          }
          id(hv6_valves).request_position(0, 0.0f);

  - platform: template
    name: "Motor 1 Stop Now"
    icon: "mdi:hand-back-right-off"
    entity_category: config
    on_press:
      - lambda: id(hv6_valves).set_drivers_enabled(false);

  - platform: template
