number:
  - platform: template
    name: "Motor 1 Target Position"
    id: motor_1_target_position
    icon: "mdi:tune-vertical"
    entity_category: config
    unit_of_measurement: "%"
    min_value: 0
    max_value: 100
    step: 1
    optimistic: false
    lambda: |-
      return id(hv6_valves).get_position(0);
    set_action:
      - lambda: |-
          if (!id(hv6_valves).are_drivers_enabled()) {
            ESP_LOGW("hv6_ui", "Motor 1 target %.1f%% ignored: drivers are disabled", x);
            return;
          }
          id(hv6_valves).request_position(0, x);

select:
  - platform: template
    name: "Manifold Flow Probe"
    id: manifold_flow_probe_select
    entity_category: config
    optimistic: false
    options:
      - Probe 1
      - Probe 2
      - Probe 3
      - Probe 4
      - Probe 5
      - Probe 6
      - Probe 7
      - Probe 8
    lambda: |-
      int probe = id(hv6_zones).get_manifold_flow_probe();
      return std::string("Probe ") + std::to_string(probe + 1);
    set_action:
      - lambda: |-
          int probe = static_cast<int>(x[x.size() - 1] - '1');
          id(hv6_zones).set_manifold_flow_probe(probe);

