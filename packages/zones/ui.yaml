    id: zone_1_exterior_walls
    entity_category: config
    mode: text
    min_length: 0
    max_length: 7
    optimistic: false
    lambda: |-
      uint8_t w = id(hv6_zones).get_zone_exterior_walls(0);
      std::string s;
      if (w & hv6::ExteriorWall::NORTH) s += "N";
      if (w & hv6::ExteriorWall::EAST)  s += "E";
      if (w & hv6::ExteriorWall::SOUTH) s += "S";
      if (w & hv6::ExteriorWall::WEST)  s += "W";
      return s.empty() ? std::string("None") : s;
    set_action:
      - lambda: |-
          uint8_t w = 0;
