  - platform: template
    name: "I2C Scan"
    icon: "mdi:bus-alert"
    entity_category: diagnostic
    on_press:
      - lambda: id(hv6_valves).log_i2c_scan();

  - platform: template
    name: "Dump 1Wire Probe Diagnostics"
    id: dump_1wire_probe_diagnostics
    icon: "mdi:thermometer-lines"
    entity_category: diagnostic
    on_press:
      - lambda: |-
          auto log_probe = [](const char *tag, esphome::sensor::Sensor *s) {
            if (s == nullptr) {
              ESP_LOGW("hv6_onewire", "%s: sensor ptr=null", tag);
              return;
            }
            auto *d = static_cast<esphome::dallas_temp::DallasTemperatureSensor *>(s);
            auto addr = d->get_address_name();
            bool ok = s->has_state();
            if (ok) {
              ESP_LOGI("hv6_onewire", "%s: addr=%s has_state=1 value=%.2f", tag, addr.c_str(), s->state);
            } else {
              ESP_LOGW("hv6_onewire", "%s: addr=%s has_state=0 value=NaN", tag, addr.c_str());
            }
          };

          log_probe("Probe 1", id(probe_temp_1));
          log_probe("Probe 2", id(probe_temp_2));
          log_probe("Probe 3", id(probe_temp_3));
          log_probe("Probe 4", id(probe_temp_4));
          log_probe("Probe 5", id(probe_temp_5));
          log_probe("Probe 6", id(probe_temp_6));
          log_probe("Probe 7", id(probe_temp_7));
          log_probe("Probe 8", id(probe_temp_8));

  - platform: template
    name: "Reset 1Wire Probe Map Reboot"
    id: reset_1wire_probe_map_reboot
    icon: "mdi:source-branch-refresh"
    entity_category: diagnostic
    on_press:
      - lambda: |-
          id(probe_addr_1) = 0;
          id(probe_addr_2) = 0;
          id(probe_addr_3) = 0;
          id(probe_addr_4) = 0;
          id(probe_addr_5) = 0;
          id(probe_addr_6) = 0;
          id(probe_addr_7) = 0;
          id(probe_addr_8) = 0;
          id(probe_map_fail_cycles) = 0;
          ESP_LOGW("hv6_ui", "1-Wire probe map reset requested; rebooting for fresh probe discovery");
          App.safe_reboot();

  - platform: template
    name: "Erase HV6 NVS + Reboot"
    icon: "mdi:database-remove"
    entity_category: config
    disabled_by_default: false
    on_press:
      - lambda: |-
          id(hv6_valves).set_drivers_enabled(false);
          if (!id(hv6_config).erase_namespace_and_restart()) {
            ESP_LOGE("hv6_ui", "Failed to erase HV6 NVS namespace");
          }

