select:
  - platform: template
    name: "Motor Profile Default"
    id: motor_profile_default
    entity_category: config
    optimistic: false
    options:
      - Generic
      - "HmIP VdMot"
    lambda: |-
      switch (id(hv6_config).get_config().motor.default_profile) {
        case hv6::MotorProfile::GENERIC:
          return std::string("Generic");
        case hv6::MotorProfile::HMIP_VDMOT:
        default:
          return std::string("HmIP VdMot");
      }
    set_action:
      - lambda: |-
          auto cfg = id(hv6_config).get_config();
          cfg.motor.default_profile = (x == "Generic") ? hv6::MotorProfile::GENERIC : hv6::MotorProfile::HMIP_VDMOT;
          id(hv6_config).update_motor(cfg.motor);
          id(hv6_valves).reload_motor_config();

  - platform: template
    name: "Control Algorithm"
    id: control_algorithm_select
    entity_category: config
    optimistic: false
    options:
      - Tanh
      - Linear
      - PID
      - Adaptive
    lambda: |-
      switch (id(hv6_zones).get_control_algorithm()) {
        case hv6::ControlAlgorithm::LINEAR: return std::string("Linear");
        case hv6::ControlAlgorithm::PID: return std::string("PID");
        case hv6::ControlAlgorithm::ADAPTIVE: return std::string("Adaptive");
        case hv6::ControlAlgorithm::TANH:
        default: return std::string("Tanh");
      }
    set_action:
      - lambda: |-
          hv6::ControlAlgorithm algo = hv6::ControlAlgorithm::TANH;
          if (x == "Linear") algo = hv6::ControlAlgorithm::LINEAR;
          else if (x == "PID") algo = hv6::ControlAlgorithm::PID;
          else if (x == "Adaptive") algo = hv6::ControlAlgorithm::ADAPTIVE;
          id(hv6_zones).set_control_algorithm(algo);



  - platform: template
    name: "Zone Motor Profile"
    id: zone_motor_profile
    entity_category: config
    optimistic: false
    options: [Inherit, Generic, "HmIP VdMot"]
    lambda: |-
      uint8_t zi = id(ui_selected_zone_index);
      switch (id(hv6_config).get_config().zones[zi].motor_profile_override) {
        case hv6::MotorProfile::GENERIC: return std::string("Generic");
        case hv6::MotorProfile::HMIP_VDMOT: return std::string("HmIP VdMot");
        default: return std::string("Inherit");
      }
    set_action:
      - lambda: |-
          uint8_t zi = id(ui_selected_zone_index);
          auto cfg = id(hv6_config).get_config();
          cfg.zones[zi].motor_profile_override = (x == "Generic") ? hv6::MotorProfile::GENERIC : (x == "HmIP VdMot") ? hv6::MotorProfile::HMIP_VDMOT : hv6::MotorProfile::INHERIT;
          id(hv6_config).update_zone(zi, cfg.zones[zi]);
          id(hv6_valves).reload_motor_config();

  - platform: template
    name: "Manifold Type"
    id: manifold_type_select
    entity_category: config
    optimistic: false
    options:
      - "NO (Normally Open)"
      - "NC (Normally Closed)"
    lambda: |-
      return id(hv6_valves).get_manifold_type() == hv6::ManifoldType::NC
        ? std::string("NC (Normally Closed)")
        : std::string("NO (Normally Open)");
    set_action:
      - lambda: |-
          bool nc = x.find("NC") != std::string::npos;
          id(hv6_valves).set_manifold_type(nc ? hv6::ManifoldType::NC : hv6::ManifoldType::NO);

  - platform: template
    name: "Manifold Flow Probe"
    id: manifold_flow_probe_select
    entity_category: config
    optimistic: false
    options:
      - Probe 1
      - Probe 2
      - Probe 3
      - Probe 4
      - Probe 5
      - Probe 6
      - Probe 7
      - Probe 8
    lambda: |-
      int probe = id(hv6_zones).get_manifold_flow_probe();
      return std::string("Probe ") + std::to_string(probe + 1);
    set_action:
      - lambda: |-
          int probe = static_cast<int>(x[x.size() - 1] - '1');
          id(hv6_zones).set_manifold_flow_probe(probe);

  - platform: template
    name: "Manifold Return Probe"
    id: manifold_return_probe_select
    entity_category: config
    optimistic: false
    options:
      - Probe 1
      - Probe 2
      - Probe 3
      - Probe 4
      - Probe 5
      - Probe 6
      - Probe 7
      - Probe 8
    lambda: |-
      int probe = id(hv6_zones).get_manifold_return_probe();
      return std::string("Probe ") + std::to_string(probe + 1);
    set_action:
      - lambda: |-
          int probe = static_cast<int>(x[x.size() - 1] - '1');
          id(hv6_zones).set_manifold_return_probe(probe);

  - platform: template
    name: "Zone Probe"
    id: zone_probe
    entity_category: config
    optimistic: false
    options: [None, Probe 1, Probe 2, Probe 3, Probe 4, Probe 5, Probe 6, Probe 7, Probe 8]
    lambda: |-
      uint8_t zi = id(ui_selected_zone_index);
      int probe = id(hv6_zones).get_zone_probe(zi);
      if (probe < 0 || probe >= hv6::MAX_PROBES) {
        return std::string("None");
      }
      return std::string("Probe ") + std::to_string(probe + 1);
    set_action:
      - lambda: |-
          uint8_t zi = id(ui_selected_zone_index);
          int probe = hv6::PROBE_UNASSIGNED;
          if (x != "None") {
            int parsed = 0;
            if (sscanf(x.c_str(), "Probe %d", &parsed) == 1 && parsed >= 1 && parsed <= hv6::MAX_PROBES) {
              probe = parsed - 1;
            }
          }
          id(hv6_zones).set_zone_probe(zi, probe);

  - platform: template
    name: "Zone Pipe Type"
    id: zone_pipe_type
    entity_category: config
    optimistic: false
    options: ["PEX 16mm", "PEX 12mm", "PEX 14mm", "PEX 17mm", "PEX 18mm", "PEX 20mm", "ALUPEX 16mm", "ALUPEX 20mm", "Unknown"]
    lambda: |-
      uint8_t zi = id(ui_selected_zone_index);
      auto t = id(hv6_zones).get_zone_pipe_type(zi);
      if (t == hv6::PipeType::PEX_12X2) return std::string("PEX 12mm");
      if (t == hv6::PipeType::PEX_14X2) return std::string("PEX 14mm");
      if (t == hv6::PipeType::PEX_16X2) return std::string("PEX 16mm");
      if (t == hv6::PipeType::PEX_17X2) return std::string("PEX 17mm");
      if (t == hv6::PipeType::PEX_18X2) return std::string("PEX 18mm");
      if (t == hv6::PipeType::PEX_20X2) return std::string("PEX 20mm");
      if (t == hv6::PipeType::ALUPEX_16X2) return std::string("ALUPEX 16mm");
      if (t == hv6::PipeType::ALUPEX_20X2) return std::string("ALUPEX 20mm");
      return std::string("PEX 16mm");
    set_action:
      - lambda: |-
          uint8_t zi = id(ui_selected_zone_index);
          hv6::PipeType t = hv6::PipeType::PEX_16X2;
          if (x == "PEX 12mm") t = hv6::PipeType::PEX_12X2;
          else if (x == "PEX 14mm") t = hv6::PipeType::PEX_14X2;
          else if (x == "PEX 17mm") t = hv6::PipeType::PEX_17X2;
          else if (x == "PEX 18mm") t = hv6::PipeType::PEX_18X2;
          else if (x == "PEX 20mm") t = hv6::PipeType::PEX_20X2;
          else if (x == "ALUPEX 16mm") t = hv6::PipeType::ALUPEX_16X2;
          else if (x == "ALUPEX 20mm") t = hv6::PipeType::ALUPEX_20X2;
          id(hv6_zones).set_zone_pipe_type(zi, t);

  - platform: template
    name: "Zone Temp Source"
    id: zone_temp_source
    entity_category: config
    optimistic: false
    options: ["Local Probe", "Zigbee MQTT", "BLE Sensor"]
    lambda: |-
      uint8_t zi = id(ui_selected_zone_index);
      auto src = id(hv6_zones).get_zone_temp_source(zi);
      if (src == hv6::TempSource::MQTT_EXTERNAL) return std::string("Zigbee MQTT");
      if (src == hv6::TempSource::BLE_SENSOR) return std::string("BLE Sensor");
      return std::string("Local Probe");
    set_action:
      - lambda: |-
          uint8_t zi = id(ui_selected_zone_index);
          hv6::TempSource src = hv6::TempSource::LOCAL_PROBE;
          if (x == "Zigbee MQTT") src = hv6::TempSource::MQTT_EXTERNAL;
          else if (x == "BLE Sensor") src = hv6::TempSource::BLE_SENSOR;
          id(hv6_zones).set_zone_temp_source(zi, src);

  - platform: template
    name: "Zone Sync To"
    id: zone_sync_to
    entity_category: config
    icon: "mdi:link-variant"
    optimistic: false
    options: ["None", "Zone 1", "Zone 2", "Zone 3", "Zone 4", "Zone 5", "Zone 6"]
    lambda: |-
      uint8_t zi = id(ui_selected_zone_index);
      int8_t s = id(hv6_zones).get_zone_sync(zi);
      if (s < 0) return std::string("None");
      return std::string("Zone ") + std::to_string(s + 1);
    set_action:
      - lambda: |-
          uint8_t zi = id(ui_selected_zone_index);
          int8_t z = -1;
          if (x.size() >= 6 && x[0] == 'Z') z = static_cast<int8_t>(x[5] - '1');
          if (z == static_cast<int8_t>(zi)) z = -1;
          id(hv6_zones).set_zone_sync(zi, z);

