  - platform: template
    name: "Zone Exterior Walls"
    id: zone_exterior_walls
    entity_category: config
    mode: text
    min_length: 0
    max_length: 7
    optimistic: false
    lambda: |-
      uint8_t zi = id(ui_selected_zone_index);
      uint8_t w = id(hv6_zones).get_zone_exterior_walls(zi);
      std::string s;
      if (w & hv6::ExteriorWall::NORTH) s += "N";
      if (w & hv6::ExteriorWall::EAST)  s += "E";
      if (w & hv6::ExteriorWall::SOUTH) s += "S";
      if (w & hv6::ExteriorWall::WEST)  s += "W";
      return s.empty() ? std::string("None") : s;
    set_action:
      - lambda: |-
          uint8_t zi = id(ui_selected_zone_index);
          uint8_t w = 0;
          for (char c : x) {
            if (c == 'N' || c == 'n') w |= hv6::ExteriorWall::NORTH;
            if (c == 'E' || c == 'e') w |= hv6::ExteriorWall::EAST;
            if (c == 'S' || c == 's') w |= hv6::ExteriorWall::SOUTH;
            if (c == 'W' || c == 'w') w |= hv6::ExteriorWall::WEST;
          }
          id(hv6_zones).set_zone_exterior_walls(zi, w);

