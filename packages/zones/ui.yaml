text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "Connected SSID"
    mac_address:
      name: "MAC Address"

button:
  - platform: restart
    name: "Restart"

  - platform: template
    name: "Calibrate All Motors"
    on_press:
      - lambda: |-
          for (int z = 0; z < 6; z++) {
            id(hv6_valves).request_calibration(z);
          }

  - platform: template
    name: "Motor 1 Open (100%)"
    icon: "mdi:valve-open"
    entity_category: config
    on_press:
      - lambda: |-
          if (!id(hv6_valves).are_drivers_enabled()) {
            ESP_LOGW("hv6_ui", "Motor 1 OPEN ignored: drivers are disabled");
            return;
          }
          id(hv6_valves).request_position(0, 100.0f);

  - platform: template
    name: "Motor 1 Close (0%)"
    icon: "mdi:valve-closed"
    entity_category: config
    on_press:
      - lambda: |-
          if (!id(hv6_valves).are_drivers_enabled()) {
            ESP_LOGW("hv6_ui", "Motor 1 CLOSE ignored: drivers are disabled");
            return;
          }
          id(hv6_valves).request_position(0, 0.0f);

  - platform: template
    name: "Motor 1 Stop Now"
    icon: "mdi:hand-back-right-off"
    entity_category: config
    on_press:
      - lambda: id(hv6_valves).set_drivers_enabled(false);

  - platform: template
    name: "Motor 1 Self-Learn"
    icon: "mdi:brain"
    entity_category: config
    on_press:
      - lambda: |-
          if (!id(hv6_valves).are_drivers_enabled()) {
            ESP_LOGW("hv6_ui", "Motor 1 self-learn ignored: drivers are disabled");
            return;
          }
          id(hv6_valves).request_calibration(0);

switch:
  - platform: template
    name: "Motor Drivers Enabled"
    id: motor_drivers_enabled
    icon: "mdi:engine"
    entity_category: config
    optimistic: false
    lambda: |-
      return id(hv6_valves).are_drivers_enabled();
    turn_on_action:
      - lambda: id(hv6_valves).set_drivers_enabled(true);
    turn_off_action:
      - lambda: id(hv6_valves).set_drivers_enabled(false);

  - platform: template
    name: "Zone 1 Enabled"
    id: zone_1_enabled
    icon: "mdi:radiator"
    entity_category: config
    optimistic: false
    lambda: |-
