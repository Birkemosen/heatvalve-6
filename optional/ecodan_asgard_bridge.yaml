# ============================================
# Ecodan Asgard Bridge
# ============================================
# Multi-board aggregation + HTTP REST push to Asgard virtual thermostat.
# Only active when the "Ecodan Coordinator" switch is ON in the dashboard.
#
# PREREQUISITES:
#   - optional/mqtt_ecodan.yaml must be included (provides per-zone MQTT publishing
#     and local_derived_temp calculation)
#   - "Ecodan Coordinator" switch, "Asgard Reference Setpoint" number, and
#     "Asgard Host" text entity must exist (from core/settings.yaml)
#
# ARCHITECTURE:
#   Each heatvalve-6 board publishes:
#     floor_heating/controller_{id}/derived_temp
#     floor_heating/controller_{id}/total_area
#   The coordinator board subscribes to ALL boards' data via MQTT wildcards,
#   computes a system-wide area-weighted derived temperature, and pushes it
#   to the Asgard virtual thermostat via HTTP REST.
#
# MQTT topics subscribed:
#   floor_heating/controller_+/derived_temp
#   floor_heating/controller_+/total_area
#
# REST endpoint (Asgard):
#   POST http://{asgard_host}/number/Virtual%20Thermostat%20Input%20z1/set?value={derived_temp}

http_request:
  id: http_req
  useragent: "ESPHome/HeatValve-6"
  timeout: 10s

globals:
  # Remote board data (up to 4 remote boards)
  # Format: [controller_id] -> {derived_temp, total_area, last_update_ms}
  - id: ${id_prefix}remote_derived_temps
    type: float[4]
    restore_value: no
    initial_value: '{NAN, NAN, NAN, NAN}'
  - id: ${id_prefix}remote_total_areas
    type: float[4]
    restore_value: no
    initial_value: '{0, 0, 0, 0}'
  - id: ${id_prefix}remote_last_seen
    type: uint32_t[4]
    restore_value: no
    initial_value: '{0, 0, 0, 0}'
  
  # System-wide derived temperature (aggregated)
  - id: ${id_prefix}system_derived_temp
    type: float
    restore_value: no
    initial_value: '21.0'
  
  # Asgard push tracking
  - id: ${id_prefix}asgard_last_push_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: ${id_prefix}asgard_push_failures
    type: int
    restore_value: no
    initial_value: '0'

mqtt:
  on_message:
    # ============================================
    # Receive other boards' derived temperature
    # ============================================
    - topic: floor_heating/controller_+/derived_temp
      then:
        - lambda: |-
            std::string topic_str = topic;
            size_t start = topic_str.find("controller_") + 11;
            size_t end = topic_str.find("/", start);
            std::string ctrl_id = topic_str.substr(start, end - start);
            
            // Skip our own messages
            if (ctrl_id == "${controller_id}") return;
            
            // Map controller ID to slot (simple: use first char as index, offset by '1')
            int slot = ctrl_id[0] - '1';
            if (slot < 0 || slot >= 4) return;
            // Don't store in our own slot
            if (slot == (int)('${controller_id}'[0] - '1')) return;
            
            float val = atof(x.c_str());
            id(${id_prefix}remote_derived_temps)[slot] = val;
            id(${id_prefix}remote_last_seen)[slot] = millis();
            ESP_LOGD("asgard_bridge", "Remote controller %s derived_temp: %.1f°C",
                     ctrl_id.c_str(), val);

    # ============================================
    # Receive other boards' total area
    # ============================================
    - topic: floor_heating/controller_+/total_area
      then:
        - lambda: |-
            std::string topic_str = topic;
            size_t start = topic_str.find("controller_") + 11;
            size_t end = topic_str.find("/", start);
            std::string ctrl_id = topic_str.substr(start, end - start);
            
            if (ctrl_id == "${controller_id}") return;
            
            int slot = ctrl_id[0] - '1';
            if (slot < 0 || slot >= 4) return;
            if (slot == (int)('${controller_id}'[0] - '1')) return;
            
            id(${id_prefix}remote_total_areas)[slot] = atof(x.c_str());

sensor:
  - platform: template
    name: "System Derived Temperature"
    id: ${id_prefix}system_derived_temp_sensor
    icon: "mdi:thermostat"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    lambda: |-
      return id(${id_prefix}system_derived_temp);
    update_interval: 30s

  - platform: template
    name: "Asgard Push Failures"
    id: ${id_prefix}asgard_push_failures_sensor
    icon: "mdi:alert-circle"
    accuracy_decimals: 0
    lambda: |-
      return id(${id_prefix}asgard_push_failures);
    update_interval: 60s

interval:
  # ============================================
  # Coordinator: Aggregate + Push to Asgard (every 60s)
  # ============================================
  - interval: 60s
    then:
      - lambda: |-
          // Only run on the coordinator board
          if (!id(${id_prefix}ecodan_coordinator).state) return;

          float ref = id(${id_prefix}asgard_reference_setpoint).state;
          if (std::isnan(ref)) ref = 21.0f;

          // Gather local board data
          float local_derived = id(${id_prefix}local_derived_temp);
          float local_demand = ref - local_derived;
          float local_area = 0;
          if (id(${id_prefix}zone_1_state) >= 0) local_area += id(${id_prefix}zone_1_area).state;
          if (id(${id_prefix}zone_2_state) >= 0) local_area += id(${id_prefix}zone_2_area).state;
          if (id(${id_prefix}zone_3_state) >= 0) local_area += id(${id_prefix}zone_3_area).state;
          if (id(${id_prefix}zone_4_state) >= 0) local_area += id(${id_prefix}zone_4_area).state;
          if (id(${id_prefix}zone_5_state) >= 0) local_area += id(${id_prefix}zone_5_area).state;
          if (id(${id_prefix}zone_6_state) >= 0) local_area += id(${id_prefix}zone_6_area).state;

          float total_weighted_demand = local_demand * local_area;
          float total_area = local_area;

          // Aggregate remote boards
          uint32_t now = millis();
          for (int i = 0; i < 4; i++) {
            if (id(${id_prefix}remote_last_seen)[i] == 0) continue;
            if ((now - id(${id_prefix}remote_last_seen)[i]) > 300000) continue;

            float remote_derived = id(${id_prefix}remote_derived_temps)[i];
            float remote_area = id(${id_prefix}remote_total_areas)[i];
            if (std::isnan(remote_derived) || remote_area <= 0) continue;

            float remote_demand = ref - remote_derived;
            total_weighted_demand += remote_demand * remote_area;
            total_area += remote_area;
          }

          // Calculate system-wide derived temperature
          float system_demand = (total_area > 0) ? total_weighted_demand / total_area : 0.0f;
          float system_derived = ref - system_demand;
          if (system_derived < 10.0f) system_derived = 10.0f;
          if (system_derived > 30.0f) system_derived = 30.0f;

          id(${id_prefix}system_derived_temp) = system_derived;

          // Publish system derived temp via MQTT (for HA fallback)
          id(mqtt_client).publish("floor_heating/system/derived_temp",
                                  to_string(system_derived), 0, true);

          ESP_LOGI("asgard_bridge",
                   "System derived temp: %.1f°C (demand=%.2f, local_area=%.0f, total_area=%.0f)",
                   system_derived, system_demand, local_area, total_area);
      # Push to Asgard via HTTP REST (only if coordinator)
      - if:
          condition:
            lambda: |-
              return id(${id_prefix}ecodan_coordinator).state &&
                     !id(${id_prefix}asgard_host).state.empty();
          then:
            - http_request.post:
                url: !lambda |-
                  char url[256];
                  snprintf(url, sizeof(url),
                           "http://%s/number/Virtual%%20Thermostat%%20Input%%20z1/set?value=%.1f",
                           id(${id_prefix}asgard_host).state.c_str(),
                           id(${id_prefix}system_derived_temp));
                  return std::string(url);
                on_response:
                  then:
                    - lambda: |-
                        if (status_code >= 200 && status_code < 300) {
                          id(${id_prefix}asgard_push_failures) = 0;
                          id(${id_prefix}asgard_last_push_ms) = millis();
                          ESP_LOGI("asgard_bridge", "Pushed %.1f°C to Asgard (HTTP %d)",
                                   id(${id_prefix}system_derived_temp), status_code);
                        } else {
                          id(${id_prefix}asgard_push_failures)++;
                          ESP_LOGW("asgard_bridge", "Asgard push failed (HTTP %d), failures: %d",
                                   status_code, id(${id_prefix}asgard_push_failures));
                        }
                on_error:
                  then:
                    - lambda: |-
                        id(${id_prefix}asgard_push_failures)++;
                        ESP_LOGW("asgard_bridge", "Asgard push error, failures: %d",
                                 id(${id_prefix}asgard_push_failures));
