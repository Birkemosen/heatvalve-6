# ============================================
# Forecast / MPC-style correction (standalone)
# ============================================
# Adjusts effective heating demand using outdoor temp, wind (with direction),
# per-zone illuminance, and per-zone thermal model (response time + pre-heat).
#
# Per-zone model:
#   - Wind exposure (deg): direction the room's cold wall faces (0=N, 90=E, 180=S, 270=W).
#     Wind FROM the opposite direction hits that wall → extra loss + pre-heat.
#   - Response time (h): 3–12 h typical. Slow rooms need earlier pre-heat to hold temp later.
#
# Pre-heat: when wind will hit a zone, target is raised slightly so the room can
# "charge" and hold temperature when the loss arrives (response_time scales this).
#
# Override per-zone: z1_response_h, z1_exposure_deg, ... z8_* via include vars.
# Requires bthome_shelly_blu for illuminance. For outdoor+wind only use forecast_no_ble.yaml.

substitutions:
  forecast_t_ref: "20.0"
  forecast_k_outdoor: "0.04"
  forecast_k_wind: "0.03"
  forecast_k_preheat: "0.08"   # Pre-heat offset scale (°C per m/s per (response_h/3))
  forecast_k_solar: "0.6"
  forecast_illuminance_sat_lx: "500"
  forecast_correction_min: "-2.0"
  forecast_correction_max: "2.5"
  # Per-zone: response_time_hours (3–12), wind_exposure_deg (0–360, -1 = no direction)
  z1_response_h: "6"
  z1_exposure_deg: "0"
  z2_response_h: "6"
  z2_exposure_deg: "180"
  z3_response_h: "6"
  z3_exposure_deg: "270"
  z4_response_h: "6"
  z4_exposure_deg: "90"
  z5_response_h: "6"
  z5_exposure_deg: "-1"
  z6_response_h: "6"
  z6_exposure_deg: "-1"
  z7_response_h: "6"
  z7_exposure_deg: "-1"
  z8_response_h: "6"
  z8_exposure_deg: "-1"

