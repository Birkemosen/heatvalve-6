# ============================================
# Forecast without BLE (outdoor + wind + per-zone model)
# ============================================
# No illuminance. Per-zone wind exposure and response time + pre-heat as in forecast.yaml.

substitutions:
  forecast_t_ref: "20.0"
  forecast_k_outdoor: "0.04"
  forecast_k_wind: "0.03"
  forecast_k_preheat: "0.08"
  forecast_correction_min: "-2.0"
  forecast_correction_max: "2.5"
  z1_response_h: "6"
  z1_exposure_deg: "0"
  z2_response_h: "6"
  z2_exposure_deg: "180"
  z3_response_h: "6"
  z3_exposure_deg: "270"
  z4_response_h: "6"
  z4_exposure_deg: "90"
  z5_response_h: "6"
  z5_exposure_deg: "-1"
  z6_response_h: "6"
  z6_exposure_deg: "-1"
  z7_response_h: "6"
  z7_exposure_deg: "-1"
  z8_response_h: "6"
  z8_exposure_deg: "-1"

