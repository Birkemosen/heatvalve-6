text_sensor:
  - platform: template
    name: "BLE Scan Results"
    id: ${id_prefix}ble_scan_results
    update_interval: 30s
    lambda: return id(${id_prefix}ble_scan_json);
    entity_category: diagnostic
    web_server:
      sorting_group_id: sorting_group_status
