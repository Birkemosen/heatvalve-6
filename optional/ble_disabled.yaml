# ============================================
# BLE Disabled Compatibility Package
# ============================================
# Use this package instead of optional/ble_sensors.yaml when:
#   - ESP32 BLE stack needs to be disabled to save ~50KB RAM
#   - WiFi coexistence issues with BLE scanning
#   - Testing without actual BLE thermometers
#
# This package provides stub entities so dashboard and router bindings
# remain valid without actual BLE functionality. Values remain NAN until
# BLE is re-enabled.
#
# Usage in deployment file:
#   ble_sensors: !include ../optional/ble_disabled.yaml
#
# To enable full BLE functionality, switch to:
#   ble_sensors: !include ../optional/ble_sensors.yaml

# Keep BLE scan JSON cache available for dashboard API consumers.
globals:
  - id: ${id_prefix}ble_scan_json
    type: std::string
    initial_value: '"[]"'
    restore_value: false

# Keep BLE MAC assignment entities so dashboard bindings remain valid.
text:
  - platform: template
    name: "Zone 1 BLE MAC"
    id: ${id_prefix}zone_1_ble_mac
    mode: TEXT
    optimistic: true
    restore_value: true
    initial_value: ""
    entity_category: config
    web_server:
      sorting_group_id: sorting_group_zone_1

  - platform: template
    name: "Zone 2 BLE MAC"
    id: ${id_prefix}zone_2_ble_mac
    mode: TEXT
    optimistic: true
    restore_value: true
    initial_value: ""
    entity_category: config
    web_server:
      sorting_group_id: sorting_group_zone_2

  - platform: template
    name: "Zone 3 BLE MAC"
    id: ${id_prefix}zone_3_ble_mac
    mode: TEXT
    optimistic: true
    restore_value: true
    initial_value: ""
    entity_category: config
    web_server:
      sorting_group_id: sorting_group_zone_3

  - platform: template
    name: "Zone 4 BLE MAC"
    id: ${id_prefix}zone_4_ble_mac
    mode: TEXT
    optimistic: true
    restore_value: true
    initial_value: ""
    entity_category: config
    web_server:
      sorting_group_id: sorting_group_zone_4

  - platform: template
    name: "Zone 5 BLE MAC"
    id: ${id_prefix}zone_5_ble_mac
    mode: TEXT
    optimistic: true
    restore_value: true
    initial_value: ""
    entity_category: config
