# ============================================
# BLE Zone Temperature Sensors
# ============================================
sensor:
  - platform: template
    name: "Zone 1 BLE Temperature"
    id: ${id_prefix}ble_zone_1_temp_sensor
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 60s
    lambda: return id(${id_prefix}zone_1_temp_ble);
    filters:
      - filter_out: NAN
    web_server:
      sorting_group_id: sorting_group_zone_1

