# ============================================
# BLE Temperature Sensor Manager
# ============================================
# Runtime BLE discovery + assignment from dashboard.
#
# This uses passive BLE advertisement scanning (BTHome service UUID FCD2).
# It does NOT perform OS-style Bluetooth pairing; it maps sensor MAC addresses
# to zones and then consumes advertised temperatures.
#
# Supported protocols:
#   - BTHome v2 (Shelly BLU H&T, BLU Button, etc.)
#   - Future: Xiaomi MIBEACON (LYWSD03MMC, etc.)
#
# Requires core/zone_temperature_router.yaml so discovered BLE temperatures can
# feed the per-zone source router.

esphome:
  includes:
    - ../optional/parsers/bthome_parser.h
    - ../optional/ble_queue_parser.h

globals:
  - id: ${id_prefix}ble_scan_allowed
    type: bool
    restore_value: no
    initial_value: 'true'

# Start BLE scan when API connects (WiFi is stable at this point)
api:
  on_client_connected:
    then:
      - if:
          condition:
            lambda: 'return id(${id_prefix}ble_scan_allowed);'
          then:
            - logger.log:
                level: INFO
                format: "API connected - starting BLE scan"
            - esp32_ble_tracker.start_scan:
                id: ${id_prefix}ble_tracker
                continuous: false

ota:
  on_begin:
    then:
      - lambda: |-
          id(${id_prefix}ble_scan_allowed) = false;
      - esp32_ble_tracker.stop_scan:
          id: ${id_prefix}ble_tracker
      - logger.log:
          level: WARN
          format: "OTA begin - BLE scan paused"
  on_end:
    then:
      - lambda: |-
          id(${id_prefix}ble_scan_allowed) = true;
      - logger.log:
          level: INFO
          format: "OTA end - BLE scan re-enabled"
  on_error:
    then:
      - lambda: |-
          id(${id_prefix}ble_scan_allowed) = true;
      - logger.log:
          level: WARN
          format: "OTA error - BLE scan re-enabled"


# ============================================
# BLE Tracker - minimal config for testing coexistence
# ============================================

esp32_ble_tracker:
  id: ${id_prefix}ble_tracker
  scan_parameters:
    active: false     # Passive scan is enough for BTHome beacons and is friendlier to WiFi
    interval: 320ms   # Keep discovery cadence responsive
    window: 80ms      # Lower scan duty cycle to improve WiFi/BLE coexistence
  #    continuous: false  # CRITICAL: don't continuously scan
  
  on_ble_advertise:
    - then:
        - lambda: |-
            // Only log configured MACs to reduce noise
            const std::string mac = x.address_str();
            const std::string zone_macs[6] = {
              "${id_prefix}zone_1_ble_mac" ? id(${id_prefix}zone_1_ble_mac).state : "",
              "${id_prefix}zone_2_ble_mac" ? id(${id_prefix}zone_2_ble_mac).state : "",
              "${id_prefix}zone_3_ble_mac" ? id(${id_prefix}zone_3_ble_mac).state : "",
              "${id_prefix}zone_4_ble_mac" ? id(${id_prefix}zone_4_ble_mac).state : "",
              "${id_prefix}zone_5_ble_mac" ? id(${id_prefix}zone_5_ble_mac).state : "",
              "${id_prefix}zone_6_ble_mac" ? id(${id_prefix}zone_6_ble_mac).state : "",
            };
            
            bool is_configured = false;
            for (const auto &zm : zone_macs) {
              if (!zm.empty() && strcasecmp(zm.c_str(), mac.c_str()) == 0) {
                is_configured = true;
                break;
              }
            }
            
            // Look for BTHome service data (0xFCD2)
            for (auto &sd : x.get_service_datas()) {
              if (sd.uuid == esphome::esp32_ble::ESPBTUUID::from_uint16(0xFCD2)) {
                if (is_configured) {
                  // Log raw bytes for configured devices
                  std::string hex;
                  for (uint8_t b : sd.data) {
                    char buf[4];
                    snprintf(buf, sizeof(buf), "%02X ", b);
                    hex += buf;
                  }
                  ESP_LOGI("ble", "BTHome: %s '%s' RSSI=%d raw[%zu]: %s",
                    mac.c_str(), x.get_name().c_str(), x.get_rssi(), sd.data.size(), hex.c_str());
                }
                heatvalve_ble::ble_parser_instance().enqueue(
                  mac, x.get_name(), x.get_rssi(), sd.data);
                break;
              }
            }

# Process BLE queue periodically
interval:
  - interval: 60s
    then:
      - if:
          condition:
            lambda: 'return api::global_api_server->is_connected() && id(${id_prefix}ble_scan_allowed);'
          then:
            - esp32_ble_tracker.start_scan:
                id: ${id_prefix}ble_tracker
                continuous: false

  - interval: 1s
    then:
      - lambda: |-
          auto &parser = heatvalve_ble::ble_parser_instance();
          parser.process_budget(8, 6);

          const std::string zone_macs[6] = {
            id(${id_prefix}zone_1_ble_mac).state,
            id(${id_prefix}zone_2_ble_mac).state,
            id(${id_prefix}zone_3_ble_mac).state,
            id(${id_prefix}zone_4_ble_mac).state,
            id(${id_prefix}zone_5_ble_mac).state,
            id(${id_prefix}zone_6_ble_mac).state,
          };

          float *zone_temps[6] = {
            &id(${id_prefix}zone_1_temp_ble),
            &id(${id_prefix}zone_2_temp_ble),
            &id(${id_prefix}zone_3_temp_ble),
            &id(${id_prefix}zone_4_temp_ble),
            &id(${id_prefix}zone_5_temp_ble),
            &id(${id_prefix}zone_6_temp_ble),
          };

          for (int z = 0; z < 6; z++) {
            if (zone_macs[z].empty()) {
              continue;
            }
            float temp = parser.find_temp_for_mac(zone_macs[z]);
            if (!std::isnan(temp)) {
              *zone_temps[z] = temp;
            }
          }
          // NOTE: JSON is built lazily by the text_sensor, not here

# ============================================
# BLE Scratch Globals (zone temps)
# ============================================
# Manual BLE Scan Trigger
# ============================================
button:
  - platform: template
    name: "BLE Scan"
    id: ${id_prefix}ble_scan_button
    icon: "mdi:bluetooth-search"
    entity_category: config
    on_press:
      then:
        - if:
            condition:
              lambda: 'return id(${id_prefix}ble_scan_allowed);'
            then:
              - logger.log:
                  level: INFO
                  format: "Manual BLE scan triggered"
              - esp32_ble_tracker.start_scan:
                  id: ${id_prefix}ble_tracker
                  continuous: false
            else:
              - logger.log:
                  level: WARN
                  format: "Manual BLE scan ignored during OTA"

