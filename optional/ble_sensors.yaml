# ============================================
# BLE Scan Results text sensor (JSON list)
# ============================================
text_sensor:
  - platform: template
    name: "BLE Scan Results"
    id: ${id_prefix}ble_scan_results
    update_interval: 30s
    lambda: |-
      // Build JSON only when this sensor updates (every 30s)
      auto &parser = heatvalve_ble::ble_parser_instance();
      return parser.build_scan_json();
    entity_category: diagnostic
    web_server:
      sorting_group_id: sorting_group_status
