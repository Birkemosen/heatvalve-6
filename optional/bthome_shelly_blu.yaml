# ============================================
# Globals per BLE slot (temperature, humidity, battery)
# ============================================
globals:
  - id: ble_1_temp_val
    type: float
    restore_value: no
    initial_value: 'NAN'
  - id: ble_1_humidity_val
    type: float
    restore_value: no
    initial_value: 'NAN'
  - id: ble_1_battery_val
    type: int
    restore_value: no
    initial_value: '-1'
  - id: ble_1_illuminance_val
    type: float
    restore_value: no
    initial_value: 'NAN'
  - id: ble_2_temp_val
    type: float
    restore_value: no
    initial_value: 'NAN'
  - id: ble_2_humidity_val
    type: float
    restore_value: no
    initial_value: 'NAN'
  - id: ble_2_battery_val
    type: int
    restore_value: no
    initial_value: '-1'
  - id: ble_2_illuminance_val
    type: float
    restore_value: no
    initial_value: 'NAN'
  - id: ble_3_temp_val
    type: float
    restore_value: no
    initial_value: 'NAN'
  - id: ble_3_humidity_val
    type: float
    restore_value: no
    initial_value: 'NAN'
  - id: ble_3_battery_val
    type: int
    restore_value: no
    initial_value: '-1'
  - id: ble_3_illuminance_val
    type: float
    restore_value: no
    initial_value: 'NAN'
  - id: ble_4_temp_val
    type: float
    restore_value: no
    initial_value: 'NAN'
  - id: ble_4_humidity_val
    type: float
    restore_value: no
    initial_value: 'NAN'
  - id: ble_4_battery_val
    type: int
    restore_value: no
    initial_value: '-1'
  - id: ble_4_illuminance_val
    type: float
    restore_value: no
    initial_value: 'NAN'

# ============================================
# Template sensors (IDs match zone temperature_sensor)
# ============================================
sensor:
  - platform: template
    name: "${ble_1_name} Temperature"
    id: ${ble_1_temp_id}
    unit_of_measurement: "°C"
    accuracy_decimals: 2
    device_class: temperature
    state_class: measurement
    lambda: |-
      float v = id(ble_1_temp_val);
      return (v == v) ? v : 0.0f;  // NAN -> 0 for display
    update_interval: 5s

  - platform: template
    name: "${ble_1_name} Humidity"
    id: ble_1_humidity
    unit_of_measurement: "%"
    accuracy_decimals: 1
    device_class: humidity
    state_class: measurement
    lambda: |-
      float v = id(ble_1_humidity_val);
      return (v == v) ? v : 0.0f;
    update_interval: 5s

  - platform: template
    name: "${ble_1_name} Battery"
    id: ble_1_battery
    unit_of_measurement: "%"
    accuracy_decimals: 0
    device_class: battery
    state_class: measurement
    lambda: |-
      int v = id(ble_1_battery_val);
      return (v >= 0) ? (float)v : 0.0f;
    update_interval: 5s

  - platform: template
    name: "${ble_1_name} Illuminance"
    id: ble_1_illuminance
    unit_of_measurement: "lx"
    accuracy_decimals: 0
    device_class: illuminance
    state_class: measurement
    lambda: |-
      float v = id(ble_1_illuminance_val);
