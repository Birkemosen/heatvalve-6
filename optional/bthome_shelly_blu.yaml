# ============================================
# BTHome BLE sensors (Shelly BLU H&T Display)
# ============================================
# Enables standalone operation: read temperature/humidity from Shelly BLU H&T
# via BLE (BTHome v2). Sensor values are exposed as ESPHome sensors and
# optionally published to MQTT for storage in Home Assistant.
#
# Include with vars (example for 4 sensors):
#   bthome_shelly_blu: !include
#     file: heatvalve-6/optional/bthome_shelly_blu.yaml
#     vars:
#       ble_1_mac: "AA:BB:CC:DD:EE:01"
#       ble_1_temp_id: "living_temp"
#       ble_1_name: "Living Room"
#       ble_2_mac: "AA:BB:CC:DD:EE:02"
#       ble_2_temp_id: "corridor_temp"
#       ble_2_name: "Corridor"
#       # ble_3_mac, ble_4_mac ... (leave unset or set to "" to disable slot)
#
# For MQTT reporting to HA: enable an MQTT package (e.g. mqtt_ecodan) so
# that the board publishes BLE sensor values to:
#   floor_heating/controller_<id>/ble/<sensor_id>/temperature
#   floor_heating/controller_<id>/ble/<sensor_id>/humidity
#   floor_heating/controller_<id>/ble/<sensor_id>/battery

# Default vars (override via include vars)
substitutions:
  ble_1_mac: ""
  ble_1_temp_id: "ble_1_temp"
  ble_1_name: "BLE 1"
  ble_2_mac: ""
  ble_2_temp_id: "ble_2_temp"
  ble_2_name: "BLE 2"
  ble_3_mac: ""
  ble_3_temp_id: "ble_3_temp"
  ble_3_name: "BLE 3"
  ble_4_mac: ""
  ble_4_temp_id: "ble_4_temp"
  ble_4_name: "BLE 4"

# ============================================
# BLE Tracker (BTHome uses service UUID 0xFCD2)
# ============================================
# Helper to parse BTHome v2 payload into temp, humidity, battery (NAN/-1 if not present)
esp32_ble_tracker:
  scan_parameters:
    interval: 320ms
    window: 30ms
    active: false   # Passive scan to save sensor battery
  on_ble_service_data_advertise:
    # Slot 1
    - service_uuid: "D2FC"
      mac_address: "${ble_1_mac}"
      then:
        - lambda: |-
            if (x.size() < 2) return;
            size_t i = 1;
            float temp = NAN; float humidity = NAN; int battery = -1; float illuminance = NAN;
            while (i < x.size()) {
              uint8_t o = x[i++];
              if (o == 0x02 && i+2 <= x.size()) { int16_t r = (int16_t)(x[i]|(x[i+1]<<8)); temp = r*0.01f; i+=2; }
              else if (o == 0x03 && i+2 <= x.size()) { uint16_t r = x[i]|(x[i+1]<<8); humidity = r*0.01f; i+=2; }
              else if (o == 0x01 && i+1 <= x.size()) { battery = x[i]; i+=1; }
              else if (o == 0x05 && i+3 <= x.size()) { uint32_t r = x[i]|(x[i+1]<<8)|(x[i+2]<<16); illuminance = r*0.01f; i+=3; }
              else if (o==0x00||o==0x09||o==0x0F||o==0x10||o==0x11||(o>=0x15&&o<=0x2F)||o==0x46) i+=1;
              else if (o==0x08||o==0x0C||o==0x12||o==0x13||o==0x14||o==0x40||o==0x41||o==0x44||o==0x45||o==0x47||o==0x48||o==0x49||o==0x4A||o==0x57||o==0x58||o==0x5E||o==0x61||o==0x3F) i+=2;
              else if (o==0x04||o==0x0A||o==0x0B||o==0x42||o==0x4B) i+=3;
              else if (o==0x0D||o==0x0E||o==0x43||o==0x4D||o==0x4E||o==0x4F||o==0x50||o==0x55||o==0x5C||o==0x62||o==0x63||o==0xF1) i+=4;
              else if (o==0x3D||o==0x3E||o==0x4C||o==0x5A||o==0x5B||o==0x5D) i+=2;
              else if (o==0x06||o==0x07) i+=2;
              else if (o==0x59) i+=1;
              else break;
            }
            id(ble_1_temp_val) = temp; id(ble_1_humidity_val) = humidity; id(ble_1_battery_val) = battery; id(ble_1_illuminance_val) = illuminance;
    # Slot 2
    - service_uuid: "D2FC"
      mac_address: "${ble_2_mac}"
      then:
        - lambda: |-
            if (x.size() < 2) return;
            size_t i = 1;
            float temp = NAN; float humidity = NAN; int battery = -1; float illuminance = NAN;
            while (i < x.size()) {
              uint8_t o = x[i++];
              if (o == 0x02 && i+2 <= x.size()) { int16_t r = (int16_t)(x[i]|(x[i+1]<<8)); temp = r*0.01f; i+=2; }
              else if (o == 0x03 && i+2 <= x.size()) { uint16_t r = x[i]|(x[i+1]<<8); humidity = r*0.01f; i+=2; }
              else if (o == 0x01 && i+1 <= x.size()) { battery = x[i]; i+=1; }
              else if (o == 0x05 && i+3 <= x.size()) { uint32_t r = x[i]|(x[i+1]<<8)|(x[i+2]<<16); illuminance = r*0.01f; i+=3; }
              else if (o==0x00||o==0x09||o==0x0F||o==0x10||o==0x11||(o>=0x15&&o<=0x2F)||o==0x46) i+=1;
              else if (o==0x08||o==0x0C||o==0x12||o==0x13||o==0x14||o==0x40||o==0x41||o==0x44||o==0x45||o==0x47||o==0x48||o==0x49||o==0x4A||o==0x57||o==0x58||o==0x5E||o==0x61||o==0x3F) i+=2;
              else if (o==0x04||o==0x0A||o==0x0B||o==0x42||o==0x4B) i+=3;
              else if (o==0x0D||o==0x0E||o==0x43||o==0x4D||o==0x4E||o==0x4F||o==0x50||o==0x55||o==0x5C||o==0x62||o==0x63||o==0xF1) i+=4;
              else if (o==0x3D||o==0x3E||o==0x4C||o==0x5A||o==0x5B||o==0x5D) i+=2;
              else if (o==0x06||o==0x07) i+=2;
              else if (o==0x59) i+=1;
              else break;
            }
            id(ble_2_temp_val) = temp; id(ble_2_humidity_val) = humidity; id(ble_2_battery_val) = battery; id(ble_2_illuminance_val) = illuminance;
    # Slot 3
    - service_uuid: "D2FC"
      mac_address: "${ble_3_mac}"
      then:
        - lambda: |-
            if (x.size() < 2) return;
            size_t i = 1;
            float temp = NAN; float humidity = NAN; int battery = -1; float illuminance = NAN;
            while (i < x.size()) {
              uint8_t o = x[i++];
              if (o == 0x02 && i+2 <= x.size()) { int16_t r = (int16_t)(x[i]|(x[i+1]<<8)); temp = r*0.01f; i+=2; }
              else if (o == 0x03 && i+2 <= x.size()) { uint16_t r = x[i]|(x[i+1]<<8); humidity = r*0.01f; i+=2; }
              else if (o == 0x01 && i+1 <= x.size()) { battery = x[i]; i+=1; }
              else if (o == 0x05 && i+3 <= x.size()) { uint32_t r = x[i]|(x[i+1]<<8)|(x[i+2]<<16); illuminance = r*0.01f; i+=3; }
              else if (o==0x00||o==0x09||o==0x0F||o==0x10||o==0x11||(o>=0x15&&o<=0x2F)||o==0x46) i+=1;
              else if (o==0x08||o==0x0C||o==0x12||o==0x13||o==0x14||o==0x40||o==0x41||o==0x44||o==0x45||o==0x47||o==0x48||o==0x49||o==0x4A||o==0x57||o==0x58||o==0x5E||o==0x61||o==0x3F) i+=2;
              else if (o==0x04||o==0x0A||o==0x0B||o==0x42||o==0x4B) i+=3;
              else if (o==0x0D||o==0x0E||o==0x43||o==0x4D||o==0x4E||o==0x4F||o==0x50||o==0x55||o==0x5C||o==0x62||o==0x63||o==0xF1) i+=4;
              else if (o==0x3D||o==0x3E||o==0x4C||o==0x5A||o==0x5B||o==0x5D) i+=2;
              else if (o==0x06||o==0x07) i+=2;
              else if (o==0x59) i+=1;
              else break;
            }
            id(ble_3_temp_val) = temp; id(ble_3_humidity_val) = humidity; id(ble_3_battery_val) = battery; id(ble_3_illuminance_val) = illuminance;
    # Slot 4
    - service_uuid: "D2FC"
      mac_address: "${ble_4_mac}"
      then:
        - lambda: |-
            if (x.size() < 2) return;
            size_t i = 1;
            float temp = NAN; float humidity = NAN; int battery = -1; float illuminance = NAN;
            while (i < x.size()) {
              uint8_t o = x[i++];
              if (o == 0x02 && i+2 <= x.size()) { int16_t r = (int16_t)(x[i]|(x[i+1]<<8)); temp = r*0.01f; i+=2; }
              else if (o == 0x03 && i+2 <= x.size()) { uint16_t r = x[i]|(x[i+1]<<8); humidity = r*0.01f; i+=2; }
              else if (o == 0x01 && i+1 <= x.size()) { battery = x[i]; i+=1; }
              else if (o == 0x05 && i+3 <= x.size()) { uint32_t r = x[i]|(x[i+1]<<8)|(x[i+2]<<16); illuminance = r*0.01f; i+=3; }
              else if (o==0x00||o==0x09||o==0x0F||o==0x10||o==0x11||(o>=0x15&&o<=0x2F)||o==0x46) i+=1;
              else if (o==0x08||o==0x0C||o==0x12||o==0x13||o==0x14||o==0x40||o==0x41||o==0x44||o==0x45||o==0x47||o==0x48||o==0x49||o==0x4A||o==0x57||o==0x58||o==0x5E||o==0x61||o==0x3F) i+=2;
              else if (o==0x04||o==0x0A||o==0x0B||o==0x42||o==0x4B) i+=3;
              else if (o==0x0D||o==0x0E||o==0x43||o==0x4D||o==0x4E||o==0x4F||o==0x50||o==0x55||o==0x5C||o==0x62||o==0x63||o==0xF1) i+=4;
              else if (o==0x3D||o==0x3E||o==0x4C||o==0x5A||o==0x5B||o==0x5D) i+=2;
              else if (o==0x06||o==0x07) i+=2;
