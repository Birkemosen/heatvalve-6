# ============================================
# Adaptive Control Profile (Runtime Selectable)
# ============================================
# Unified control that switches between algorithms at runtime.
# Select "Tanh", "Linear", "PID" or "Fixed" from the dashboard
# or Home Assistant — no YAML edit or reflash needed.
#
# Required vars (from zones/adaptive.yaml):
#   zone_number, id, id_prefix, friendly_name, temperature_sensor
#   default_preset, preset_home_temp, preset_away_temp, preset_boost_temp
#   check_interval, zone_entities_internal
#
# Global prerequisites (include ONCE per device):
#   core/adaptive_settings.yaml  (tanh_steepness, linear_steepness, pid_kp/ki/kd)
#   core/settings.yaml           (comfort_band, minimum_valve_opening, etc.)

# ============================================
# Climate Thermostat
# ============================================
climate:
  - platform: thermostat
    id: ${id}_thermostat
    name: ${friendly_name}
    internal: ${zone_entities_internal}
    sensor: ${temperature_sensor}
    default_preset: ${default_preset}
    on_boot_restore_from: memory
    startup_delay: true
    preset:
      - name: HOME
        default_target_temperature_low: ${preset_home_temp}
        mode: HEAT
      - name: AWAY
        default_target_temperature_low: ${preset_away_temp}
        mode: HEAT
      - name: BOOST
        default_target_temperature_low: ${preset_boost_temp}
        mode: HEAT
    min_heating_off_time: 300s
    min_heating_run_time: 300s
    min_idle_time: 30s
    heat_action:
      - lambda: 'return;'
    idle_action:
      - lambda: 'return;'
    visual:
      min_temperature: 10 °C
      max_temperature: 30 °C
      temperature_step: 0.1 °C
    web_server:
      sorting_group_id: sorting_group_zone_${zone_number}

# ============================================
# Per-Zone Control Profile Selector
# ============================================
select:
  - platform: template
    name: "${friendly_name} Control Profile"
    id: ${id_prefix}zone_${zone_number}_profile
    icon: "mdi:tune"
    internal: ${zone_entities_internal}
    options:
      - "Tanh"
      - "Linear"
      - "PID"
      - "Fixed"
    initial_option: "Tanh"
    optimistic: true
    restore_value: true
    on_value:
      - lambda: |-
          // Reset PID state when switching profiles to avoid derivative kick
          id(${id_prefix}zone_${zone_number}_pid_integral) = 0.0f;
          id(${id_prefix}zone_${zone_number}_pid_prev_error) = 0.0f;
          id(${id_prefix}zone_${zone_number}_last_check_ms) = 0;
          ESP_LOGI("adaptive", "Zone ${zone_number} profile changed to: %s", x.c_str());
    web_server:
      sorting_group_id: sorting_group_zone_${zone_number}

# ============================================
# Per-Zone Fixed Position (for Fixed profile)
# ============================================
number:
  - platform: template
    name: "${friendly_name} Fixed Position"
    id: ${id_prefix}zone_${zone_number}_fixed_position
    icon: "mdi:valve"
    internal: ${zone_entities_internal}
    unit_of_measurement: "%"
    optimistic: true
    min_value: 0
    max_value: 100
    step: 5
    restore_value: true
    initial_value: 50
    entity_category: config
    web_server:
      sorting_group_id: sorting_group_zone_${zone_number}

# ============================================
# Per-Zone PID State Globals
# ============================================
globals:
  - id: ${id_prefix}zone_${zone_number}_pid_integral
    type: float
    initial_value: '0.0'

  - id: ${id_prefix}zone_${zone_number}_pid_prev_error
    type: float
    initial_value: '0.0'

  # Last check timestamp in milliseconds (for PID dt calculation)
  - id: ${id_prefix}zone_${zone_number}_last_check_ms
    type: uint32_t
    initial_value: '0'

# ============================================
# Unified Adaptive Check Script
# ============================================
script:
  - id: TH${zone_number}_check
    then:
      - lambda: |-
          // Resolve active profile: 0=Tanh, 1=Linear, 2=PID, 3=Fixed
          auto opt = id(${id_prefix}zone_${zone_number}_profile).active_index();
          int profile = opt.has_value() ? (int)opt.value() : 0;

          // ---- Check if thermostat is OFF ----
          if (id(${id}_thermostat).mode == CLIMATE_MODE_OFF) {
            if (id(CH${zone_number}_cover).position > 0) {
              auto call = id(CH${zone_number}_cover).make_call();
              call.set_position(0);
              call.perform();
              ESP_LOGD("adaptive", "CH${zone_number} OFF, closing valve");
            }
            id(${id_prefix}zone_${zone_number}_state) = 0;
            return;
          }

          // ---- Motor busy check (multiplexed design) ----
          if (id(motor_supervisor_ctrl).is_motor_busy()) {
            ESP_LOGD("adaptive", "CH${zone_number} skipped - motor busy");
            return;
          }

          // ---- Read temperatures ----
          float current_temp = id(${id}_thermostat).current_temperature;
          float target_temp  = id(${id}_thermostat).target_temperature_low;
          if (std::isnan(current_temp) || std::isnan(target_temp)) return;
          float diff_temp = target_temp - current_temp;

          // ---- Global parameters ----
          float comfort_band  = id(${id_prefix}comfort_band).state;
          float min_opening   = id(${id_prefix}minimum_valve_opening).state / 100.0f;
          float boost_factor  = id(${id_prefix}boost_factor).state / 100.0f;
          bool  bal_enabled   = id(${id_prefix}balancing_enabled).state;

          // ---- Classify zone state (shared by all profiles) ----
          bool was_overheated = id(${id_prefix}zone_${zone_number}_was_overheated);
          int new_state;

          if (diff_temp < -comfort_band) {
            new_state = 0;  // OVERHEATED
            id(${id_prefix}zone_${zone_number}_was_overheated) = true;
          } else if (was_overheated && diff_temp < 0) {
            new_state = 0;  // Hysteresis: stay overheated until at or above setpoint
          } else if (diff_temp <= comfort_band) {
            new_state = 1;  // SATISFIED
            id(${id_prefix}zone_${zone_number}_was_overheated) = false;
          } else {
            new_state = 2;  // DEMAND
            id(${id_prefix}zone_${zone_number}_was_overheated) = false;
          }
          id(${id_prefix}zone_${zone_number}_state) = new_state;

          // ---- Compute raw target position from selected algorithm ----
          float raw_position = 0.0f;

          if (new_state == 0) {
            // All profiles: close when overheated
            raw_position = 0.0f;

          } else if (profile == 3) {
            // ---- Fixed: user-defined constant position ----
            raw_position = id(${id_prefix}zone_${zone_number}_fixed_position).state / 100.0f;

          } else if (profile == 2) {
            // ---- PID: software PID in valve-position space ----
            uint32_t now  = millis();
            uint32_t last = id(${id_prefix}zone_${zone_number}_last_check_ms);
            // dt in minutes; clamp to 1 min on first run or after long gap (>1h)
            float dt = (last > 0 && (now - last) < 3600000UL)
                       ? (float)(now - last) / 60000.0f
                       : 1.0f;
            id(${id_prefix}zone_${zone_number}_last_check_ms) = now;

            float kp = id(${id_prefix}pid_kp).state;
            float ki = id(${id_prefix}pid_ki).state;
            float kd = id(${id_prefix}pid_kd).state;

            // Integral with anti-windup clamp (-0.5 to +10)
            float integral = id(${id_prefix}zone_${zone_number}_pid_integral) + diff_temp * dt;
            if (integral >  10.0f) integral =  10.0f;
            if (integral <  -0.5f) integral =  -0.5f;
            id(${id_prefix}zone_${zone_number}_pid_integral) = integral;

            float prev_err   = id(${id_prefix}zone_${zone_number}_pid_prev_error);
            float derivative = (dt > 0.0f) ? (diff_temp - prev_err) / dt : 0.0f;
            id(${id_prefix}zone_${zone_number}_pid_prev_error) = diff_temp;

            raw_position = kp * diff_temp + ki * integral + kd * derivative;

          } else if (profile == 1) {
            // ---- Linear: proportional to temperature error ----
            float steepness = id(${id_prefix}linear_steepness).state;
            raw_position = steepness * diff_temp;

          } else {
            // ---- Tanh: default smooth curve ----
            float steepness = id(${id_prefix}tanh_steepness).state;
            raw_position = tanh(steepness * diff_temp);
          }

          // Negative raw positions map to closed (can happen with PID)
          if (raw_position < 0.0f) raw_position = 0.0f;

          // ---- Apply hydraulic balancing / boost (skipped for Fixed) ----
          float target_position = raw_position;

          if (profile != 3) {
            float hyd_factor = id(${id_prefix}zone_${zone_number}_hydraulic_factor);
            if (bal_enabled && hyd_factor > 0.0f) {
              if (new_state == 1) {
                target_position = hyd_factor;  // SATISFIED: hold at balance point
              } else {
                target_position = raw_position * boost_factor;
                if (hyd_factor > target_position) target_position = hyd_factor;
              }
            } else {
              target_position = raw_position * boost_factor;
            }

            // Minimum opening when zone is active
            if (new_state != 0 && target_position < min_opening) {
              target_position = min_opening;
            }
          }

          // ---- Clamp to [0, 1] ----
          if (target_position > 1.0f) target_position = 1.0f;
          if (target_position < 0.0f) target_position = 0.0f;

          // ---- Apply only if change exceeds min movement threshold ----
          float min_move = id(${id_prefix}min_movement).state / 100.0f;
          if (fabsf(id(CH${zone_number}_cover).position - target_position) > min_move) {
            auto call = id(CH${zone_number}_cover).make_call();
            call.set_position(target_position);
            call.perform();
            ESP_LOGD("adaptive", "CH${zone_number} -> %.0f%% (profile=%d state=%d bal=%d)",
                     target_position * 100.0f, profile, new_state, (int)bal_enabled);
          }

# ============================================
# Periodic Check Interval
# ============================================
interval:
  - interval: ${check_interval}
    then:
      - script.execute: TH${zone_number}_check
