# ============================================
# HeatValve-6 - Example Config
# ============================================
# Complete 6-zone example for ESP32-S3 Super Mini
# with 6x DRV8215 I2C motor drivers.
#
# SETUP: Run this config from the repo root:
# heatvalve-6/
# |- config.yaml
# |- secrets.yaml
# |- boards/
# |- core/
# |- optional/
# |- zones/
# |- components/
#
# If you move this file outside the repo, update the relative include paths below.
#
# HARDWARE:
#   - ESP32-S3 Super Mini
#   - 6x DRV8215 I2C motor drivers (individual H-bridge per motor)
#   - 6x motor valves with current-based endstop detection
#
# For flashing: press BOOT button for 2-3 seconds before serial init
# After OTA update: press EN (reset) button to run firmware

# Temporary fix for ADC library (https://github.com/esphome/issues/issues/6455)
external_components:
  - source:
      type: local
      path: components
    components:
      - heatvalve_dashboard
      - drv8215

# ============================================
# General Configuration
# ============================================
substitutions:
  name: heatvalve-6
  friendly_name: "HeatValve-6"
  id_prefix: "heating_"
  zone_entities_internal: "false"  # set true to hide zone entities from web_server/API
  revision: "1.0.0"
   
  # Multi-controller configuration
  controller_id: "1"  # Change to "2" for second controller
  total_controllers: "2"  # Total number of controllers in the system
    
  #time
  TZ: "Europe/Zurich" #timezone
  reboot_days_of_week: "MON"
  reboot_hours: "5"
  reboot_minutes: "0"
  reboot_seconds: "0"
  onboot_valve_calibration_delay: "1min"
  
  # Valve maintenance (exercise valves to prevent sticking)
  # Set to "0s" to disable periodic maintenance
  valve_maintenance_interval: "7d"  # 7 days
  
  # DS18x20 sensors are auto-discovered on the 1-Wire bus.
  # Use the UI selects in the Settings group to map:
  #   - DS18x20 Select Input Sensor
  #   - DS18x20 Select Output Sensor
  #   - DS18x20 Select Extra Sensor
  
  adc_zero_calibration: "-0.075"
  pump_mac_address: "AA:BB:CC:DD:EE:FF"
  
  # INA219 current sensor I2C address (A0,A1 to GND = 0x40)
  ina219_address: 0x40
  
  # ============================================
  # CONTROL PROFILE
  # ============================================
  # NOTE: ESPHome does not support substitutions in !include paths.
  # To change control profile, manually replace the path in all zone includes below.
  # Options:
  #   zones/tanh.yaml   (default)
  #   zones/linear.yaml
  #   zones/pid.yaml
  #   zones/remote.yaml

# ============================================
# Web Server
# ============================================
web_server:
  port: 80
  version: 3
  log: false  # Disable for better performance
  sorting_groups:
    # Zone groups (one per zone)
    - id: sorting_group_zone_1
      name: "Zone 1: WC"
      sorting_weight: 10
    - id: sorting_group_zone_2
      name: "Zone 2: Storage"
      sorting_weight: 11
    - id: sorting_group_zone_3
      name: "Zone 3: Living Room"
      sorting_weight: 12
    - id: sorting_group_zone_4
      name: "Zone 4: Dining Room"
      sorting_weight: 13
    - id: sorting_group_zone_5
      name: "Zone 5: Kitchen"
      sorting_weight: 14
    - id: sorting_group_zone_6
      name: "Zone 6: Office"
      sorting_weight: 15
    - id: sorting_group_zone_7
      name: "Zone 7: Bedroom"
      sorting_weight: 16
    - id: sorting_group_zone_8
      name: "Zone 8: Bathroom"
      sorting_weight: 17
    # System groups
    - id: sorting_group_settings
      name: "Settings"
      sorting_weight: 80
    - id: sorting_group_status
      name: "Status"
      sorting_weight: 81
    - id: sorting_group_debug
      name: "Debug"
      sorting_weight: 90

# ============================================
# Dashboard (standalone web UI at /dashboard)
# ============================================
heatvalve_dashboard:
  # Zone climates (thermostats)
  climate_z1_id: wc_thermostat
  climate_z2_id: storage_thermostat
  climate_z3_id: living_thermostat
  climate_z4_id: dining_thermostat
  climate_z5_id: kitchen_thermostat
  climate_z6_id: office_thermostat
  # Zone covers (valves)
  cover_z1_id: CH1_cover
  cover_z2_id: CH2_cover
  cover_z3_id: CH3_cover
  cover_z4_id: CH4_cover
  cover_z5_id: CH5_cover
  cover_z6_id: CH6_cover
  # Room temperature sensors
  temp_z1_id: corridor_temp
  temp_z2_id: storage_temp
  temp_z3_id: living_temp
  temp_z4_id: living_temp
  temp_z5_id: living_temp
  temp_z6_id: office_temp
  # Heating circuit sensors
  input_temp_id: heating_dallas_input_temp
  output_temp_id: heating_dallas_output_temp
  extra_temp_id: heating_dallas_extra_temp
  # Status sensors
  avg_valve_position_id: heating_avg_valve_position
  active_zones_id: heating_active_zones_count
  wifi_signal_id: heating_wifi_signal_db
  # Text sensors
  controller_mode_id: heating_controller_mode
  system_status_id: heating_system_status
  uptime_id: heating_uptime_human
  # Switches
  sw_balancing_id: heating_balancing_enabled
  sw_standalone_id: heating_standalone_mode
  # Select
  sel_pipe_type_id: heating_pipe_type
  # Settings numbers
  num_min_valve_opening_id: heating_minimum_valve_opening
  num_comfort_band_id: heating_comfort_band
  num_maintenance_base_id: heating_maintenance_base
  num_demand_boost_id: heating_demand_boost
  num_boost_factor_id: heating_boost_factor
  num_min_movement_id: heating_min_movement
  num_pipe_spacing_id: heating_pipe_spacing
  # Zone area/max opening numbers
  num_zone_1_area_id: heating_zone_1_area
  num_zone_2_area_id: heating_zone_2_area
  num_zone_3_area_id: heating_zone_3_area
  num_zone_4_area_id: heating_zone_4_area
  num_zone_5_area_id: heating_zone_5_area
  num_zone_6_area_id: heating_zone_6_area
  num_zone_1_max_opening_id: heating_zone_1_max_opening
  num_zone_2_max_opening_id: heating_zone_2_max_opening
  num_zone_3_max_opening_id: heating_zone_3_max_opening
  num_zone_4_max_opening_id: heating_zone_4_max_opening
  num_zone_5_max_opening_id: heating_zone_5_max_opening
  num_zone_6_max_opening_id: heating_zone_6_max_opening

api:
  reboot_timeout: 30min

# ============================================
# WiFi Configuration
# ============================================
# Configure directly here or use: wifi: !include core/wifi.yaml
wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
  # Additional networks (optional):
  # - ssid: !secret wifi_ssid_2
  #   password: !secret wifi_password_2
  #   priority: 2
  ap:
    ssid: "UFH_Fallback"
    password: !secret fallback_password
  
  # WiFi optimization for hardware interference
  power_save_mode: none          # Disable power saving for better stability
  output_power: 17dB             # Reduce TX power (default 20dB) - try 15dB or 12dB if issues persist
  # fast_connect: true           # Skip scanning, connect faster (requires static IP)
  # enable_btm: false            # Disable BSS Transition Management
  # enable_rrm: false            # Disable Radio Resource Management

captive_portal:

ota:
  platform: esphome
  password: !secret ota_password

# ============================================
# Valve Maintenance
# ============================================
script:
  - id: valve_maintenance
    then:
      - logger.log: "Valve maintenance"
      - script.execute: calibrate_CH1_cover
      - delay: 300s
      - script.execute: calibrate_CH2_cover
      - delay: 300s
      - script.execute: calibrate_CH3_cover
      - delay: 300s
      - script.execute: calibrate_CH4_cover
      - delay: 300s
      - script.execute: calibrate_CH5_cover
      - delay: 300s
      - script.execute: calibrate_CH6_cover
      - delay: 300s

# ============================================
# Packages
# ============================================
packages:
  # Board (ESP32-S3 Super Mini only)
  board: !include boards/esp32-s3.yaml
  
  # Core infrastructure
  core_settings: !include core/settings.yaml
  logger: !include core/logger.yaml
  motor_driver: !include core/motor_driver.yaml  # DRV8215 I2C motor control
  time: !include core/time.yaml

  # ============================================
  # Optional: OLED 1.54" display (SSD1306 128x64, I2C)
  # Comment out if display is not fitted.
  # ============================================
  display: !include core/display.yaml
  switch_others: !include core/switch_others.yaml
  sensor_others: !include core/sensor_others.yaml
  onewire: !include core/onewire.yaml

  # ============================================
  # Threyr Advanced Control (closed-source, requires license)
  # See: https://github.com/birkemosen/heatvalve-6#threyr-advanced-control
  # ============================================
  # threyr: !include threyr.yaml

  # ============================================
  # Optional: Pump control via ESP-NOW
  # ============================================
  pump_control: !include
    file: optional/pump_control.yaml
    vars:
      pump_mac_address: ${pump_mac_address}
      circulation_check_interval: "24h"
      circulation_run_duration: "5min"

  # ============================================
  # Optional: MQTT Ecodan integration
  # ============================================
  # mqtt_ecodan: !include optional/mqtt_ecodan.yaml

  # ============================================
  # ZONES
  # ============================================
  # Control profile options (use same for all zones):
  #   zones/tanh.yaml   - Smooth tanh curve control
  #   zones/linear.yaml - Linear proportional control
  #   zones/pid.yaml    - PID control with auto-tune
  #   zones/remote.yaml - External/Home Assistant control
  #
  # Motor mapping (DRV8215 I2C):
  #   motor_number: 1-6 (maps to physical motor outputs)
  #     Motor 1: DRV8215 @ 0x30
  #     Motor 2: DRV8215 @ 0x31
  #     Motor 3: DRV8215 @ 0x32
  #     Motor 4: DRV8215 @ 0x33
  #     Motor 5: DRV8215 @ 0x34
  #     Motor 6: DRV8215 @ 0x35
  
  zone_1: !include
    file: zones/tanh.yaml
    # file: zones/linear.yaml
    # file: zones/pid.yaml
    # file: zones/remote.yaml
    vars:
      zone_number: "1"
      motor_number: "1"
      id: wc
      friendly_name: "WC"
      temperature_sensor: corridor_temp
      zone_area_default: "4"
      zone_max_opening_default: "90"
      default_preset: HOME
      preset_home_temp: "21 °C"
      preset_away_temp: "19 °C"
      preset_boost_temp: "23 °C"
      check_interval: "15min"
      tanh_steepness: "0.70"

  zone_2: !include
    file: zones/tanh.yaml
    # file: zones/linear.yaml
    # file: zones/pid.yaml
    # file: zones/remote.yaml
    vars:
      zone_number: "2"
      motor_number: "2"
      id: storage
      friendly_name: "Storage"
      temperature_sensor: storage_temp
      zone_area_default: "6"
      zone_max_opening_default: "90"
      default_preset: HOME
      preset_home_temp: "21 °C"
      preset_away_temp: "19 °C"
      preset_boost_temp: "23 °C"
      check_interval: "16min"
      tanh_steepness: "0.70"

  zone_3: !include
    file: zones/tanh.yaml
    # file: zones/linear.yaml
    # file: zones/pid.yaml
    # file: zones/remote.yaml
    vars:
      zone_number: "3"
      motor_number: "3"
      id: living
      friendly_name: "Living Room"
      temperature_sensor: living_temp
      zone_area_default: "25"
      zone_max_opening_default: "90"
      default_preset: HOME
      preset_home_temp: "21 °C"
      preset_away_temp: "19 °C"
      preset_boost_temp: "23 °C"
      check_interval: "17min"
      tanh_steepness: "0.70"

  zone_4: !include
    file: zones/tanh.yaml
    # file: zones/linear.yaml
    # file: zones/pid.yaml
    # file: zones/remote.yaml
    vars:
      zone_number: "4"
      motor_number: "4"
      id: dining
      friendly_name: "Dining Room"
      temperature_sensor: living_temp
      zone_area_default: "15"
      zone_max_opening_default: "90"
      default_preset: HOME
      preset_home_temp: "21 °C"
      preset_away_temp: "19 °C"
      preset_boost_temp: "23 °C"
      check_interval: "18min"
      tanh_steepness: "0.70"

  zone_5: !include
    file: zones/tanh.yaml
    # file: zones/linear.yaml
    # file: zones/pid.yaml
    # file: zones/remote.yaml
    vars:
      zone_number: "5"
      motor_number: "5"
      id: kitchen
      friendly_name: "Kitchen"
      temperature_sensor: living_temp
      zone_area_default: "12"
      zone_max_opening_default: "90"
      default_preset: HOME
      preset_home_temp: "21 °C"
      preset_away_temp: "19 °C"
      preset_boost_temp: "23 °C"
      check_interval: "15min"
      tanh_steepness: "0.70"

  zone_6: !include
    file: zones/tanh.yaml
    # file: zones/linear.yaml
    # file: zones/pid.yaml
    # file: zones/remote.yaml
    vars:
      zone_number: "6"
      motor_number: "6"
      id: office
      friendly_name: "Office"
      temperature_sensor: office_temp
      zone_area_default: "10"
      zone_max_opening_default: "90"
      default_preset: HOME
      preset_home_temp: "21 °C"
      preset_away_temp: "19 °C"
      preset_boost_temp: "23 °C"
      check_interval: "16min"
      tanh_steepness: "0.70"


# ============================================
# TEMPERATURE SENSORS
# ============================================
# Choose sensor type based on your setup.
# The sensor ID must match the zone's temperature_sensor variable.

sensor:
  # ============================================
  # Option 1: Home Assistant sensors (recommended)
  # ============================================
  - platform: homeassistant
    name: "Corridor Temperature"
    entity_id: sensor.corridor_temperature
    id: corridor_temp

  - platform: homeassistant
    name: "Storage Temperature"
    entity_id: sensor.storage_temperature
    id: storage_temp

  - platform: homeassistant
    name: "Living Room Temperature"
    entity_id: sensor.living_room_temperature
    id: living_temp

  - platform: homeassistant
    name: "Office Temperature"
    entity_id: sensor.office_temperature
    id: office_temp

  - platform: homeassistant
    name: "Bedroom Temperature"
    entity_id: sensor.bedroom_temperature
    id: bedroom_temp

  - platform: homeassistant
    name: "Bathroom Temperature"
    entity_id: sensor.bathroom_temperature
    id: bathroom_temp

  # ============================================
  # Option 2: Dallas/OneWire DS18B20 sensors
