# =============================================================================
# HeatValve-6 — Shared Base Configuration
# =============================================================================
# This file is the shared base configuration. The device entrypoint lives in
# configurations/heatvalve-6-ble.yaml and `!include`s this file plus the
# BLE-specific packages.
#
# Build/deploy via the Makefile (`make build`). Do NOT add
# `esp32_ble_tracker:` blocks here — they belong in the device entrypoint.
# =============================================================================

# =============================================================================
# Substitutions — All user-tunable settings in one place
# =============================================================================
substitutions:
  # Device identity (overridden per variant in entrypoint)
  device_name: heatvalve-6
  friendly_name: "HeatValve-6 UFH Controller"

  # GPIO pins — change to match your PCB revision
  pin_i2c_sda: GPIO8
  pin_i2c_scl: GPIO9
  pin_onewire: GPIO12
  pin_nsleep: "6"
  pin_nfault: "4"
  pin_rgb_status_led: GPIO48
  pin_adc_current: GPIO7

  # Network — fallback AP name when WiFi is unreachable
  fallback_ap_ssid: "HeatValve-6 Setup"

  # Control parameters — defaults (adjustable at runtime via HA)
  default_comfort_band: "0.5"        # °C dead-band around setpoint
  default_min_valve_opening: "25.0"  # % minimum total valve opening (heat-pump protection)
  default_maintenance_base: "15.0"   # % valve position when zone is satisfied (idle/minimal flow)
  default_demand_boost: "30.0"       # % added to calculated position when zone has demand

  # Zone controller timing
  zone_cycle_interval: 10s

  # 1-Wire timing — slower polling improves DS18B20 bus stability with many probes
  onewire_update_interval: 10s
  onewire_resolution_bits: "10"

esphome:
  name: ${device_name}
  name_add_mac_suffix: true
  friendly_name: ${friendly_name}
  comment: "Underfloor heating 6-zone valve controller"
  project:
    name: birkemosen.heatvalve-6
    version: ${firmware_version}
  on_boot:
    - priority: 800
      then:
      - logger.log: "HeatValve-6 booting..."
      - lambda: |-
          // Apply persisted DS18B20 ROM map early so probe slots stay stable across reboots.
          if (id(probe_addr_1) != 0) id(probe_temp_1)->set_address(id(probe_addr_1));
          if (id(probe_addr_2) != 0) id(probe_temp_2)->set_address(id(probe_addr_2));
          if (id(probe_addr_3) != 0) id(probe_temp_3)->set_address(id(probe_addr_3));
          if (id(probe_addr_4) != 0) id(probe_temp_4)->set_address(id(probe_addr_4));
          if (id(probe_addr_5) != 0) id(probe_temp_5)->set_address(id(probe_addr_5));
          if (id(probe_addr_6) != 0) id(probe_temp_6)->set_address(id(probe_addr_6));
          if (id(probe_addr_7) != 0) id(probe_temp_7)->set_address(id(probe_addr_7));
          if (id(probe_addr_8) != 0) id(probe_temp_8)->set_address(id(probe_addr_8));

# WiFi provisioning over USB (Improv protocol) — works with ESPHome Web Installer
improv_serial:

# mDNS discovery is disabled in both variants. Repeated allocator failures
# on ESP32-S3 N4R2 in this deployment make it unreliable; OTA/discovery uses
# explicit hostnames or the discover_devices.py helper instead.
mdns:
  disabled: true

# =============================================================================
# Packages — Platform, network, hardware, zones (radio NOT included here)
# =============================================================================
packages:
  # Version
  version:      !include version.yaml
  # Board
  board:        !include packages/board/esp32-s3.yaml
  # Network (radio-agnostic only — wifi/api/ota/helios are in every variant)
  wifi:         !include packages/network/wifi.yaml
  api:          !include packages/network/api.yaml
  ota:          !include packages/network/ota.yaml
  helios:       !include packages/network/helios.yaml
  asgard:       !include packages/network/asgard.yaml
  forecast:     !include packages/network/forecast.yaml
  # Hardware
  i2c:          !include packages/hardware/i2c.yaml
  onewire:      !include packages/hardware/onewire.yaml
  motors:       !include packages/hardware/motors.yaml
  led:          !include packages/hardware/led.yaml
  display:      !include packages/hardware/display.yaml
  hw_sensors:   !include packages/hardware/sensors.yaml
  # Zones
  zone_sensors: !include packages/zones/sensors.yaml
  climate:      !include packages/zones/climate.yaml
  ui:           !include packages/zones/ui.yaml
  dashboard:    !include packages/zones/hv6_dashboard.yaml

# =============================================================================
# External Components — Custom hardware drivers
# =============================================================================
external_components:
  - source:
      type: local
      path: ../components
    components:
      - hv6_valve_controller
      - hv6_zone_controller
      - hv6_config_store
      - hv6_dashboard
      - hv6_helios_client
      - hv6_asgard_bridge
      - hv6_forecast

# =============================================================================
# Logger
# =============================================================================
logger:
  level: DEBUG
  logs:
    component: ERROR
    climate: WARN
    sensor: WARN
    light: ERROR
    script: ERROR
    dallas.temp.sensor: INFO
    gpio.one_wire: INFO
    hv6_onewire: INFO
    text_sensor: WARN   # suppress text-sensor state-change noise (IP/SSID/zone state)

# =============================================================================
# Control Parameters — Tune these for your heating system
# =============================================================================
globals:
  # Persisted ROM map for Probe 1..8 (auto-learned once, then reused every boot).
  - id: probe_addr_1
    type: uint64_t
    restore_value: true
    initial_value: '0'
  - id: probe_addr_2
    type: uint64_t
    restore_value: true
    initial_value: '0'
  - id: probe_addr_3
    type: uint64_t
    restore_value: true
    initial_value: '0'
  - id: probe_addr_4
    type: uint64_t
    restore_value: true
    initial_value: '0'
  - id: probe_addr_5
    type: uint64_t
    restore_value: true
    initial_value: '0'
  - id: probe_addr_6
    type: uint64_t
    restore_value: true
    initial_value: '0'
  - id: probe_addr_7
    type: uint64_t
    restore_value: true
    initial_value: '0'
  - id: probe_addr_8
    type: uint64_t
    restore_value: true
    initial_value: '0'
  # Per-probe consecutive-miss counters (watchdog). Not persisted.
  - id: probe_fail_cycles
    type: int[8]
    restore_value: no
    initial_value: '{0, 0, 0, 0, 0, 0, 0, 0}'

  - id: global_comfort_band
    type: float
    restore_value: true
    initial_value: "${default_comfort_band}"
  - id: global_min_valve_opening
    type: float
    restore_value: true
    initial_value: "${default_min_valve_opening}"
  - id: global_maintenance_base
    type: float
    restore_value: true
    initial_value: "${default_maintenance_base}"
  - id: global_demand_boost
    type: float
    restore_value: true
    initial_value: "${default_demand_boost}"

interval:
  # Resource diagnostics: per-task stack headroom (min free since boot).
  # Complements the debug component's heap/loop-time sensors below.
  - interval: 300s
    then:
      - lambda: |-
          static const char *const task_names[] = {
            "hv6_valve", "hv6_ripple", "hv6_zone", "hv6_helios", "hv6_asgard", "hv6_forecast", "hv6_nvs", "loopTask"
          };
          for (const char *name : task_names) {
            TaskHandle_t handle = xTaskGetHandle(name);
            if (handle == nullptr) continue;
            ESP_LOGD("hv6_diag", "Task %-10s stack headroom: %5u bytes",
                     name, (unsigned) uxTaskGetStackHighWaterMark(handle));
          }

  - interval: 30s
    then:
      - lambda: |-
          uint64_t *slots[8] = {
            &id(probe_addr_1), &id(probe_addr_2), &id(probe_addr_3), &id(probe_addr_4),
            &id(probe_addr_5), &id(probe_addr_6), &id(probe_addr_7), &id(probe_addr_8)
          };
          decltype(id(probe_temp_1)) probes[8] = {
            id(probe_temp_1), id(probe_temp_2), id(probe_temp_3), id(probe_temp_4),
            id(probe_temp_5), id(probe_temp_6), id(probe_temp_7), id(probe_temp_8)
          };

          // --- Watchdog: per-probe consecutive-miss counters --------------------
          // A slot counts as missing when its sensor never published or reads NAN.
          int mapped = 0, missing = 0;
          for (int i = 0; i < 8; i++) {
            if (*slots[i] == 0) { id(probe_fail_cycles)[i] = 0; continue; }
            mapped++;
            const bool ok = probes[i]->has_state() && !std::isnan(probes[i]->state);
            if (ok) { id(probe_fail_cycles)[i] = 0; } else { missing++; id(probe_fail_cycles)[i]++; }
          }

          if (mapped >= 2 && missing == mapped) {
            // Every mapped probe is unavailable at once → almost certainly a
            // 1-Wire bus fault, not a stale ROM map. Resetting would wipe a
            // valid map, so keep it and wait for the bus to recover.
            ESP_LOGE("hv6_onewire", "All %d mapped probes missing — suspected 1-Wire bus fault; keeping ROM map", mapped);
          } else if (mapped >= 4 && missing >= 2) {
            // Map reset must stay atomic: a partially cleared map would make
            // index-based fallback assign a ROM another slot already owns.
            int persistent = 0;
            for (int i = 0; i < 8; i++) {
              if (id(probe_fail_cycles)[i] >= 4) {
                persistent++;
                ESP_LOGW("hv6_onewire", "Probe %d ROM 0x%016llx missing for %d cycles",
                         i + 1, (unsigned long long) *slots[i], id(probe_fail_cycles)[i]);
              }
            }
            if (persistent >= 2) {
              ESP_LOGW("hv6_onewire",
                       "Probe map stale (%d/%d mapped probes persistently missing) — resetting map and rebooting. "
                       "Re-verify zone probe assignments after relearn.", persistent, mapped);
              for (int i = 0; i < 8; i++) { *slots[i] = 0; id(probe_fail_cycles)[i] = 0; }
              App.safe_reboot();
              return;
            }
          }

          // --- Auto-learn any unmapped probe slots, persist discovered ROMs -----
          auto parse_addr = [](const std::string &s) -> uint64_t {
            if (s.empty()) return 0;
            return strtoull(s.c_str(), nullptr, 16);
          };
          auto addr_exists = [&](uint64_t v) -> bool {
            if (v == 0) return false;
            for (int i = 0; i < 8; i++)
              if (*slots[i] == v) return true;
            return false;
          };

          int learned = 0;
          for (int i = 0; i < 8; i++) {
            if (*slots[i] != 0) continue;
            const uint64_t found = parse_addr(probes[i]->get_address_name());
            if (found == 0) continue;
            if (addr_exists(found)) {
              ESP_LOGW("hv6_onewire", "Skip Probe %d learn: duplicate ROM 0x%016llx", i + 1, (unsigned long long) found);
              continue;
            }
            *slots[i] = found;
            learned++;
            ESP_LOGI("hv6_onewire", "Learned Probe %d ROM 0x%016llx", i + 1, (unsigned long long) found);
          }

          if (learned > 0) {
            int now_mapped = 0;
            for (int i = 0; i < 8; i++)
              if (*slots[i] != 0) now_mapped++;
            ESP_LOGI("hv6_onewire", "Persistent probe map updated: %d/8 mapped", now_mapped);
          }

# =============================================================================
# Custom Component Configuration — Device-specific hardware
# =============================================================================

# NVS config store (zone settings, motor calibration)
hv6_config_store:
  id: hv6_config

# Valve controller — edit motor_addresses to match your PCB wiring
hv6_valve_controller:
  id: hv6_valves
  config_store_id: hv6_config
  i2c_id: i2c_bus
  nsleep_pin: ${pin_nsleep}
  nfault_pin: ${pin_nfault}
  ipropi_pin: 7
  motor_addresses: [0x30, 0x31, 0x32, 0x33, 0x34, 0x35]

# Zone controller
hv6_zone_controller:
  id: hv6_zones
  config_store_id: hv6_config
  valve_controller_id: hv6_valves
  cycle_interval: ${zone_cycle_interval}
  probe_sensors:
    - probe_temp_1
    - probe_temp_2
    - probe_temp_3
    - probe_temp_4
    - probe_temp_5
    - probe_temp_6
    - probe_temp_7
    - probe_temp_8

debug:
  update_interval: 10s

# -----------------------------------------------------------------------------
# Runtime diagnostics
#
# Exposed so we can observe resource pressure (loop time spikes, heap
# exhaustion, fragmentation). Visible in HA and the custom dashboard.
# Keep update intervals slow \u2014 these are watch-dogs, not trend graphs.
# -----------------------------------------------------------------------------
sensor:
  - platform: debug
    free:
      name: "Free heap"
    block:
      name: "Largest free block"
    loop_time:
      name: "Loop time (max ms over interval)"
    psram:
      name: "Free PSRAM"
