# =============================================================================
# HeatValve-6 — Device Configuration
# =============================================================================
# Edit this file to configure device identity, hardware wiring, and control
# parameters. Everything else lives in packages/ and rarely needs touching.
# =============================================================================

# =============================================================================
# Substitutions — All user-tunable settings in one place
# =============================================================================
substitutions:
  # Device identity
  device_name: heatvalve-6
  friendly_name: "HeatValve-6 UFH Controller"

  # GPIO pins — change to match your PCB revision
  pin_i2c_sda: GPIO8
  pin_i2c_scl: GPIO9
  pin_onewire: GPIO12
  pin_nsleep: "2"
  pin_nfault: "7"
  pin_status_led: GPIO48
  pin_adc_current: GPIO1

  # Network — fallback AP name when WiFi is unreachable
  fallback_ap_ssid: "HeatValve-6 Setup"

  # Control parameters — defaults (adjustable at runtime via HA or MQTT)
  default_comfort_band: "0.5"        # °C dead-band around setpoint
  default_min_valve_opening: "25.0"  # % minimum total valve opening (heat-pump protection)
  default_maintenance_base: "45.0"   # % valve position when zone is satisfied
  default_demand_boost: "30.0"       # % added to calculated position when zone has demand

  # Zone controller timing
  zone_cycle_interval: 10s

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: "Underfloor heating 6-zone valve controller"
  on_boot:
    priority: 600
    then:
      - logger.log: "HeatValve-6 booting..."

# =============================================================================
# WIFI Manual IP
# =============================================================================
#wifi:
#  manual_ip:
#    static_ip: 192.168.1.2
#    gatewway: 192.168.1.1
#    subnet: 255.255.255.0

# =============================================================================
# Packages — Platform and zone configuration
# =============================================================================
packages:
  # Board
  board:        !include packages/board/esp32-s3.yaml
  # Network
  wifi:         !include packages/network/wifi.yaml
  api:          !include packages/network/api.yaml
  mqtt:         !include packages/network/mqtt.yaml
  ota:          !include packages/network/ota.yaml
  # Hardware
  i2c:          !include packages/hardware/i2c.yaml
  onewire:      !include packages/hardware/onewire.yaml
  motors:       !include packages/hardware/motors.yaml
  led:          !include packages/hardware/led.yaml
  display:      !include packages/hardware/display.yaml
  hw_sensors:   !include packages/hardware/sensors.yaml
  # Zones
  zone_sensors: !include packages/zones/sensors.yaml
  climate:      !include packages/zones/climate.yaml
  ui:           !include packages/zones/ui.yaml

# =============================================================================
# External Components — Custom hardware drivers
# =============================================================================
external_components:
  - source:
      type: local
      path: components
    components:
      - hv6_valve_controller
      - hv6_zone_controller
      - hv6_config_store

# =============================================================================
# Logger
# =============================================================================
logger:
  level: DEBUG
  logs:
    component: ERROR

# =============================================================================
# Control Parameters — Tune these for your heating system
# =============================================================================
globals:
  - id: global_comfort_band
    type: float
    restore_value: true
    initial_value: "${default_comfort_band}"
  - id: global_min_valve_opening
    type: float
    restore_value: true
    initial_value: "${default_min_valve_opening}"
  - id: global_maintenance_base
    type: float
    restore_value: true
    initial_value: "${default_maintenance_base}"
  - id: global_demand_boost
    type: float
    restore_value: true
    initial_value: "${default_demand_boost}"

# =============================================================================
# Custom Component Configuration — Device-specific hardware
# =============================================================================

# NVS config store (zone settings, motor calibration)
hv6_config_store:
  id: hv6_config

# Valve controller — edit motor_addresses to match your PCB wiring
hv6_valve_controller:
  id: hv6_valves
  config_store_id: hv6_config
  i2c_id: i2c_bus
  nsleep_pin: ${pin_nsleep}
  nfault_pin: ${pin_nfault}
  ipropi_pin: 1
  current_sense: motor_current_adc
  motor_addresses: [0x30, 0x31, 0x32, 0x35, 0x33, 0x34]

# Zone controller
hv6_zone_controller:
  id: hv6_zones
  config_store_id: hv6_config
  valve_controller_id: hv6_valves
  cycle_interval: ${zone_cycle_interval}
  probe_sensors:
    - probe_temp_1
    - probe_temp_2
    - probe_temp_3
    - probe_temp_4
    - probe_temp_5
    - probe_temp_6
    - probe_temp_7
    - probe_temp_8
