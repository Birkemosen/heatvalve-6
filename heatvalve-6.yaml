# ============================================
# Hydraulic Balancer (free, no license required)
# ============================================
# Computes per-zone hydraulic factors from pipe lengths,
# pipe types, floor types, and floor cover thickness.
# Factors are written to per-zone globals and used by the
# adaptive control scripts when "Hydraulic Balancing" is enabled.
heatvalve_balancer:
  update_interval: 5min
  # Zone climates
  climate_z1_id: wc_thermostat
  climate_z2_id: storage_thermostat
  climate_z3_id: living_thermostat
  climate_z4_id: dining_thermostat
  climate_z5_id: kitchen_thermostat
  climate_z6_id: office_thermostat
  # Settings
  comfort_band_id: heating_comfort_band
  maintenance_base_id: heating_maintenance_base
  # Per-zone areas
  zone_1_area_id: heating_zone_1_area
  zone_2_area_id: heating_zone_2_area
  zone_3_area_id: heating_zone_3_area
  zone_4_area_id: heating_zone_4_area
  zone_5_area_id: heating_zone_5_area
  zone_6_area_id: heating_zone_6_area
  # Per-zone pipe spacings
  zone_1_pipe_spacing_id: heating_zone_1_pipe_spacing
  zone_2_pipe_spacing_id: heating_zone_2_pipe_spacing
  zone_3_pipe_spacing_id: heating_zone_3_pipe_spacing
  zone_4_pipe_spacing_id: heating_zone_4_pipe_spacing
  zone_5_pipe_spacing_id: heating_zone_5_pipe_spacing
  zone_6_pipe_spacing_id: heating_zone_6_pipe_spacing
  # Per-zone pipe types
  zone_1_pipe_type_id: heating_zone_1_pipe_type
  zone_2_pipe_type_id: heating_zone_2_pipe_type
  zone_3_pipe_type_id: heating_zone_3_pipe_type
  zone_4_pipe_type_id: heating_zone_4_pipe_type
  zone_5_pipe_type_id: heating_zone_5_pipe_type
  zone_6_pipe_type_id: heating_zone_6_pipe_type
  # Per-zone floor types
  zone_1_floor_type_id: heating_zone_1_floor_type
  zone_2_floor_type_id: heating_zone_2_floor_type
  zone_3_floor_type_id: heating_zone_3_floor_type
  zone_4_floor_type_id: heating_zone_4_floor_type
  zone_5_floor_type_id: heating_zone_5_floor_type
  zone_6_floor_type_id: heating_zone_6_floor_type
  # Per-zone floor cover thicknesses
  zone_1_floor_cover_thickness_id: heating_zone_1_floor_cover_thickness
  zone_2_floor_cover_thickness_id: heating_zone_2_floor_cover_thickness
  zone_3_floor_cover_thickness_id: heating_zone_3_floor_cover_thickness
  zone_4_floor_cover_thickness_id: heating_zone_4_floor_cover_thickness
  zone_5_floor_cover_thickness_id: heating_zone_5_floor_cover_thickness
  zone_6_floor_cover_thickness_id: heating_zone_6_floor_cover_thickness
  # Per-zone hydraulic factor output globals
  hyd_factor_z1_id: heating_zone_1_hydraulic_factor
  hyd_factor_z2_id: heating_zone_2_hydraulic_factor
  hyd_factor_z3_id: heating_zone_3_hydraulic_factor
  hyd_factor_z4_id: heating_zone_4_hydraulic_factor
  hyd_factor_z5_id: heating_zone_5_hydraulic_factor
  hyd_factor_z6_id: heating_zone_6_hydraulic_factor

api:
  reboot_timeout: 30min

# ============================================
# WiFi Configuration
# ============================================
# Configure directly here or use: wifi: !include core/wifi.yaml
wifi:
  networks:
    - ssid: ${wifi_ssid}
      password: ${wifi_password}
  # Additional networks (optional):
  # - ssid: !secret wifi_ssid_2
  #   password: !secret wifi_password_2
  #   priority: 2
  ap:
    ssid: "UFH_Fallback"
    password: ${fallback_password}
  
  # WiFi optimization for hardware interference
  power_save_mode: none          # Disable power saving for better stability
  output_power: 17dB             # Reduce TX power (default 20dB) - try 15dB or 12dB if issues persist
  # fast_connect: true           # Skip scanning, connect faster (requires static IP)
  # enable_btm: false            # Disable BSS Transition Management
  # enable_rrm: false            # Disable Radio Resource Management

captive_portal:

ota:
  platform: esphome
  password: ${ota_password}

# ============================================
# Valve Maintenance
# ============================================
script:
  - id: valve_maintenance
    then:
      - logger.log: "Valve maintenance"
      - script.execute: calibrate_CH1_cover
      - delay: 300s
      - script.execute: calibrate_CH2_cover
      - delay: 300s
      - script.execute: calibrate_CH3_cover
      - delay: 300s
      - script.execute: calibrate_CH4_cover
      - delay: 300s
      - script.execute: calibrate_CH5_cover
      - delay: 300s
      - script.execute: calibrate_CH6_cover
      - delay: 300s

# ============================================
# Packages
# ============================================
packages:
  # Board (ESP32-S3 Super Mini only)
  board: !include boards/esp32-s3.yaml
  
  # Core infrastructure
  core_settings: !include core/settings.yaml
  adaptive_settings: !include core/adaptive_settings.yaml  # Runtime control algorithm tuning
  logger: !include core/logger.yaml
  motor_driver: !include core/motor_driver.yaml  # DRV8215 I2C motor control
  time: !include core/time.yaml

  # ============================================
  # Optional: OLED 1.54" display (SSD1306 128x64, I2C)
  # Comment out if display is not fitted.
  # ============================================
  display: !include core/display.yaml
  switch_others: !include core/switch_others.yaml
  sensor_others: !include core/sensor_others.yaml
  onewire: !include core/onewire.yaml

  # ============================================
  # Optional: Pump control via ESP-NOW
  # Disabled for boards with onboard pump relay control.
  # ============================================
  # pump_control: !include
  #   file: optional/pump_control.yaml
  #   vars:
  #     pump_mac_address: ${pump_mac_address}
  #     circulation_check_interval: "24h"
  #     circulation_run_duration: "5min"

  # ============================================
  # Optional: MQTT Ecodan integration
  # ============================================
  # mqtt_ecodan: !include optional/mqtt_ecodan.yaml

  # ============================================
  # ZONES (Runtime Adaptive Control)
  # ============================================
  # All zones use adaptive.yaml which allows runtime profile switching
  # via dashboard or Home Assistant (Tanh/Linear/PID/Fixed).
  # No reflash needed to change control algorithm!
  #
  # Algorithm tuning parameters are in core/adaptive_settings.yaml:
  #   - Tanh Steepness, Linear Steepness, PID Kp/Ki/Kd
  #
  # For compile-time fixed profiles (smaller binary), use instead:
  #   zones/tanh.yaml, zones/linear.yaml, zones/pid.yaml, zones/remote.yaml
  #
  # Motor mapping (DRV8215 I2C):
  #   motor_number: 1-6 (maps to physical motor outputs)
  #     Motor 1: DRV8215 @ 0x30
  #     Motor 2: DRV8215 @ 0x31
  #     Motor 3: DRV8215 @ 0x32
  #     Motor 4: DRV8215 @ 0x33
  #     Motor 5: DRV8215 @ 0x34
  #     Motor 6: DRV8215 @ 0x35
  
  zone_1: !include
    file: zones/adaptive.yaml
    vars:
      zone_number: "1"
      motor_number: "1"
      id: wc
      friendly_name: "WC"
      temperature_sensor: zone_1_temp
      zone_area_default: "4"
      zone_max_opening_default: "90"
      default_preset: HOME
      preset_home_temp: "21 °C"
      preset_away_temp: "19 °C"
      preset_boost_temp: "23 °C"
      check_interval: "15min"

  zone_2: !include
    file: zones/adaptive.yaml
    vars:
      zone_number: "2"
      motor_number: "2"
      id: storage
      friendly_name: "Storage"
      temperature_sensor: zone_2_temp
      zone_area_default: "6"
      zone_max_opening_default: "90"
      default_preset: HOME
      preset_home_temp: "21 °C"
      preset_away_temp: "19 °C"
      preset_boost_temp: "23 °C"
      check_interval: "16min"

  zone_3: !include
    file: zones/adaptive.yaml
    vars:
      zone_number: "3"
      motor_number: "3"
      id: living
      friendly_name: "Living Room"
      temperature_sensor: zone_3_temp
      zone_area_default: "25"
      zone_max_opening_default: "90"
      default_preset: HOME
      preset_home_temp: "21 °C"
      preset_away_temp: "19 °C"
      preset_boost_temp: "23 °C"
      check_interval: "17min"

  zone_4: !include
    file: zones/adaptive.yaml
    vars:
      zone_number: "4"
      motor_number: "4"
      id: dining
      friendly_name: "Dining Room"
      temperature_sensor: zone_4_temp
      zone_area_default: "15"
      zone_max_opening_default: "90"
      default_preset: HOME
      preset_home_temp: "21 °C"
      preset_away_temp: "19 °C"
      preset_boost_temp: "23 °C"
      check_interval: "18min"

  zone_5: !include
    file: zones/adaptive.yaml
    vars:
      zone_number: "5"
      motor_number: "5"
      id: kitchen
      friendly_name: "Kitchen"
      temperature_sensor: zone_5_temp
      zone_area_default: "12"
      zone_max_opening_default: "90"
      default_preset: HOME
      preset_home_temp: "21 °C"
      preset_away_temp: "19 °C"
      preset_boost_temp: "23 °C"
      check_interval: "15min"

  zone_6: !include
    file: zones/adaptive.yaml
    vars:
      zone_number: "6"
      motor_number: "6"
      id: office
      friendly_name: "Office"
      temperature_sensor: zone_6_temp
      zone_area_default: "10"
      zone_max_opening_default: "90"
      default_preset: HOME
      preset_home_temp: "21 °C"
      preset_away_temp: "19 °C"
      preset_boost_temp: "23 °C"
      check_interval: "16min"


# ============================================
# TEMPERATURE SENSORS
# ============================================
# Temperature source producers are NOT defined here.
# Include the router plus one or more source packages in your deployment entrypoint:
#
#   zone_temperature_router: !include core/zone_temperature_router.yaml
#
#   For Home Assistant sensors:
#     ha_sensors: !include core/ha_sensors.yaml
#
#   For MQTT sensors (standalone, no HA required):
#     mqtt_sensors: !include core/mqtt_sensor_overrides.yaml
#
#   For BLE sensors (Bluetooth thermometers):
#     ble_sensors: !include optional/ble_sensors.yaml
#     (then assign BLE MACs via the dashboard BLE tab)
#
# Zones and the dashboard consume the router proxy IDs
# `zone_1_temp` .. `zone_6_temp`.
