# ============================================
# Deployment Reference Template
# ============================================
# This file documents the shared configuration used by all deployments.
# It is NOT directly includable due to ESPHome's YAML processing limitations.
# Instead, copy these sections into each deployment file.
#
# NOTE: ESPHome doesn't support YAML merge (<<: !include) syntax.
# Each deployment file must contain its own external_components section.

# ---- Copy this to each deployment file ----
external_components:
  - source:
      type: local
      path: ../components
    components:
      - heatvalve_dashboard
      - heatvalve_balancer
      - drv8215
      - motor_supervisor

