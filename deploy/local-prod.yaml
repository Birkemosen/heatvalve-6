# Repo-local production deployment entrypoint
# Run from repo root: esphome run deploy/local-prod.yaml

external_components:
  - source:
      type: local
      path: ../components
    components:
      - heatvalve_dashboard
      - drv8215
      - motor_supervisor

substitutions:
  name: heatvalve-6
  friendly_name: "HeatValve-6"
  zone_entities_internal: "false"

  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  fallback_password: !secret fallback_password
  ota_password: !secret ota_password

packages:
  base: !include ../heatvalve-6.yaml
