# ============================================
# Production Deployment
# ============================================
# Run from repo root: esphome run deploy/local-prod.yaml
#
# Features:
#   - Zone entities exposed to API (for Home Assistant integration)
#   - BLE sensors enabled
#   - MQTT enabled for sensor publishing
#   - HA sensors + MQTT overrides for temperature sources

# External components (shared across all deployments - see deploy/_base.yaml for reference)
external_components:
  - source:
      type: local
      path: ../components
    components:
      - heatvalve_dashboard
      - heatvalve_balancer
      - drv8215
      - motor_supervisor

substitutions:
  name: heatvalve-6
  friendly_name: "HeatValve-6"
  zone_entities_internal: "false"
  temperature_source_default: "HA"
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  fallback_password: !secret fallback_password
  ota_password: !secret ota_password

mqtt:
  broker: !secret mqtt_broker
  port: !secret mqtt_port
  username: !secret mqtt_user
  password: !secret mqtt_password
  discovery: false

packages:
  base: !include ../heatvalve-6.yaml
  zone_temperature_router: !include ../core/zone_temperature_router.yaml
  ha_sensors: !include ../core/ha_sensors.yaml
  mqtt_sensors: !include ../core/mqtt_sensor_overrides.yaml
  ble_sensors: !include ../optional/ble_sensors.yaml
