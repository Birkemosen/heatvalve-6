# ESPHome Server entrypoint (no local clone required)
# Copy to /config/<device>.yaml and adjust substitutions as needed.

substitutions:
  name: heatvalve-6-stue
  friendly_name: "HeatValve-6"
  id_prefix: "heating_"
  zone_entities_internal: "false"

  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  fallback_password: !secret fallback_password
  ota_password: !secret ota_password

external_components:
  - source:
      type: git
      url: https://github.com/birkemosen/heatvalve-6
      ref: main
      path: components
    components:
      - heatvalve_dashboard
      - drv8215
      - motor_supervisor
    refresh: 1d

packages:
  remote_template:
    url: https://github.com/birkemosen/heatvalve-6
    ref: main
    refresh: 1d
    files:
      - heatvalve-6.yaml
