# ============================================
# Development Deployment
# ============================================
# Run from repo root: esphome run deploy/local-dev.yaml
#
# Features:
#   - Zone entities hidden from API (zone_entities_internal: true)
#   - BLE sensors enabled
#   - MQTT disabled (for debugging without network complexity)
#   - Extended calibration delay for development

# External components (shared across all deployments - see deploy/_base.yaml for reference)
external_components:
  - source:
      type: local
      path: ../components
    components:
      - heatvalve_dashboard
      - heatvalve_balancer
      - drv8215
      - motor_supervisor

substitutions:
  name: heatvalve-6-dev
  friendly_name: "HeatValve-6"
  zone_entities_internal: "true"
  temperature_source_default: "HA"
  onboot_valve_calibration_delay: "10min"
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  fallback_password: !secret fallback_password
  ota_password: !secret ota_password

mqtt:
  broker: !secret mqtt_broker
  port: !secret mqtt_port
  client_id: ${name}
  username: !secret mqtt_user
  password: !secret mqtt_password
  discovery: false

packages:
  base: !include ../heatvalve-6.yaml
  zone_temperature_router: !include ../core/zone_temperature_router.yaml
  ha_sensors: !include ../core/ha_sensors.yaml
  mqtt_sensors: !include ../core/mqtt_sensor_overrides.yaml
  ble_sensors: !include ../optional/ble_sensors.yaml

# Optional fixed IP for local debugging.
wifi:
  # Pin to one AP/BSSID to avoid roaming/handshake retries across same-SSID radios.
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password

  #manual_ip:
  #  static_ip: 192.168.20.57
  #  gateway: 192.168.20.1
  #  subnet: 255.255.255.0
  
  # WiFi optimization for BLE coexistence (alpha2go style)
  output_power: 8.5dB              # Reduced TX power for BLE coexistence

# Disable captive_portal to free RAM for BLE
captive_portal: !remove