# Repo-local development deployment entrypoint
# Run from repo root: esphome run deploy/local-dev.yaml

external_components:
  - source:
      type: local
      path: ../components
    components:
      - heatvalve_dashboard
      - drv8215
      - motor_supervisor

substitutions:
  name: heatvalve-6-dev
  friendly_name: "HeatValve-6"
  zone_entities_internal: "true"

  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  fallback_password: !secret fallback_password
  ota_password: !secret ota_password

packages:
  base: !include ../heatvalve-6.yaml

# Optional fixed IP for local debugging.
wifi:
  manual_ip:
    static_ip: 192.168.20.56
    gateway: 192.168.20.1
    subnet: 255.255.255.0
