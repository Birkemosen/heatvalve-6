# DRV8215 motor-1 only manual test profile
# Run from repo root: esphome run deploy/drv8215-motor1-manual.yaml

esphome:
  name: ${name}
  friendly_name: HeatValve DRV8215 M1 Manual Test

external_components:
  - source:
      type: local
      path: ../components
    components:
      - drv8215

substitutions:
  name: heatvalve-6-drv8215-m1

  # Pin mapping from attached ESP32-S3 Supermini schematic
  # nFAULT_BUS -> GPIO4, nSLEEP_BUS -> GPIO6, IPROPI -> GPIO7
  motor_nsleep_pin: GPIO6
  motor_nfault_pin: GPIO4
  motor_ipropi_pin: GPIO7
  i2c_sda_pin: GPIO8
  i2c_scl_pin: GPIO9
  drv_m1_addr: "0x30"

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

i2c:
  id: i2c_bus
  sda: ${i2c_sda_pin}
  scl: ${i2c_scl_pin}
  scan: true

logger:
  level: INFO

api:
  reboot_timeout: 30min

ota:
  platform: esphome
  password: !secret ota_password

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.20.56
    gateway: 192.168.20.1
    subnet: 255.255.255.0
  ap:
    ssid: "UFH_Fallback"
    password: !secret fallback_password
  power_save_mode: none

captive_portal:

web_server:
  port: 80
  version: 3

packages:
  drv8215_test_motor1_manual: !include ../core/drv8215_test_motor1_manual.yaml
