    name: "Minimum Valve Opening"
    id: ${id_prefix}minimum_valve_opening
    icon: "mdi:valve"
    unit_of_measurement: "%"
    optimistic: true
    min_value: 0
    max_value: 50
    step: 5
    restore_value: true
    initial_value: 25
    entity_category: config
    web_server:
      sorting_group_id: sorting_group_settings

