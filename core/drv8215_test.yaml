# DRV8215 I2C hardware test (no zones/endstop/current logic)
# Purpose: verify I2C communication, motor direction, stall detection, IPROPI readings.
#
# All controls visible in web UI. Select motor port, then use buttons to test.

globals:
  - id: drv_selected_motor
    type: int
    initial_value: '1'

  - id: drv_addresses
    type: uint8_t[6]
    initial_value: '{0x30, 0x31, 0x32, 0x33, 0x34, 0x35}'

  - id: motor_turning
    type: bool
    initial_value: 'false'

switch:
  - platform: gpio
    name: "DRV nSLEEP (GPIO${motor_nsleep_pin})"
    id: drv_nsleep
    pin:
      number: ${motor_nsleep_pin}
    restore_mode: ALWAYS_OFF

number:
  - platform: template
    name: "DRV Motor Port (1-6)"
    id: drv_motor_port
    min_value: 1
    max_value: 6
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 1
    icon: mdi:numeric
    on_value:
      then:
        - lambda: |-
            id(drv_selected_motor) = (int) roundf(x);
            if (id(drv_selected_motor) < 1) id(drv_selected_motor) = 1;
            if (id(drv_selected_motor) > 6) id(drv_selected_motor) = 6;
            ESP_LOGI("drvtest", "Selected motor port: %d (addr: 0x%02X)",
              id(drv_selected_motor), id(drv_addresses)[id(drv_selected_motor)-1]);

sensor:
  - platform: adc
    name: "IPROPI Voltage"
    id: drv_ipropi_voltage
    pin: ${motor_ipropi_pin}
    attenuation: 11db
    update_interval: 100ms
    accuracy_decimals: 3
    unit_of_measurement: "V"

  - platform: template
    name: "IPROPI Current (mA)"
    id: drv_ipropi_current
    update_interval: 200ms
    accuracy_decimals: 1
    unit_of_measurement: "mA"
    lambda: |-
      float v = id(drv_ipropi_voltage).state;
      if (isnan(v)) return 0.0f;
      return v / 0.032984f;

binary_sensor:
  - platform: gpio
    name: "DRV nFAULT"
    id: drv_nfault
    pin:
      number: ${motor_nfault_pin}
      mode: INPUT
      inverted: true
    on_press:
      then:
        - logger.log:
            format: "nFAULT ASSERTED (fault detected)"
            level: WARN
            tag: drvtest

script:
  - id: drv_i2c_scan
    then:
      - lambda: |-
          ESP_LOGI("drvtest", "=== I2C Scan for DRV8215 ===");
          auto bus = App.get_i2c_bus(0);
          if (!bus) {
            ESP_LOGE("drvtest", "I2C bus not available!");
            return;
          }
          for (int i = 0; i < 6; i++) {
            uint8_t addr = id(drv_addresses)[i];
            uint8_t reg = 0x00;
            uint8_t data = 0;
            bool ok = bus->write(addr, &reg, 1) && bus->read(addr, &data, 1);
            if (ok) {
              ESP_LOGI("drvtest", "Motor %d @ 0x%02X: FOUND (FAULT_STATUS=0x%02X)", i+1, addr, data);
            } else {
              ESP_LOGW("drvtest", "Motor %d @ 0x%02X: NOT FOUND", i+1, addr);
            }
          }

  - id: drv_init_all
    then:
      - switch.turn_on: drv_nsleep
      - delay: 1ms
      - lambda: |-
          ESP_LOGI("drvtest", "=== Initializing all DRV8215 ===");
          auto bus = App.get_i2c_bus(0);
          if (!bus) return;

          for (int i = 0; i < 6; i++) {
            uint8_t addr = id(drv_addresses)[i];
            uint8_t wb[2];

            // CONFIG4: PMODE=1, I2C_BC=1, EN=0, PH=0
            wb[0] = 0x0D; wb[1] = 0x0C;
            bus->write(addr, wb, 2);

            // CONFIG3: IMODE=00, SMODE=1, INT_VREF=1, OCP=1, TSD=1
            wb[0] = 0x0C; wb[1] = 0x33;
            bus->write(addr, wb, 2);

            // CONFIG0: EN_STALL=1
            wb[0] = 0x09; wb[1] = 0x20;
            bus->write(addr, wb, 2);

            // RC_CTRL0: CS_GAIN_SEL=110b
            wb[0] = 0x11; wb[1] = 0x06;
            bus->write(addr, wb, 2);

            ESP_LOGI("drvtest", "Motor %d @ 0x%02X: init OK", i+1, addr);
          }

  - id: drv_stop_selected
    then:
      - lambda: |-
          int m = id(drv_selected_motor);
          uint8_t addr = id(drv_addresses)[m-1];
          auto bus = App.get_i2c_bus(0);
          if (!bus) return;
          uint8_t wb[2] = {0x0D, 0x0C};  // Coast: EN=0
          bus->write(addr, wb, 2);
          id(motor_turning) = false;
          ESP_LOGI("drvtest", "Motor %d STOPPED (coast)", m);

  - id: drv_stop_all
    then:
      - lambda: |-
          auto bus = App.get_i2c_bus(0);
          if (!bus) return;
          for (int i = 0; i < 6; i++) {
            uint8_t addr = id(drv_addresses)[i];
            uint8_t wb[2] = {0x0D, 0x0C};
            bus->write(addr, wb, 2);
          }
          id(motor_turning) = false;
          ESP_LOGI("drvtest", "ALL motors stopped");

  - id: drv_forward_selected
    then:
      - lambda: |-
          int m = id(drv_selected_motor);
          uint8_t addr = id(drv_addresses)[m-1];
          auto bus = App.get_i2c_bus(0);
          if (!bus) return;
          // CONFIG4: PMODE=1, I2C_BC=1, EN=1, PH=1 → forward
          uint8_t wb[2] = {0x0D, 0x0F};
          bus->write(addr, wb, 2);
          id(motor_turning) = true;
          ESP_LOGI("drvtest", "Motor %d FORWARD (open)", m);

  - id: drv_reverse_selected
    then:
      - lambda: |-
          int m = id(drv_selected_motor);
          uint8_t addr = id(drv_addresses)[m-1];
          auto bus = App.get_i2c_bus(0);
          if (!bus) return;
          // CONFIG4: PMODE=1, I2C_BC=1, EN=1, PH=0 → reverse
          uint8_t wb[2] = {0x0D, 0x0E};
          bus->write(addr, wb, 2);
          id(motor_turning) = true;
          ESP_LOGI("drvtest", "Motor %d REVERSE (close)", m);

  - id: drv_read_fault
    then:
      - lambda: |-
          int m = id(drv_selected_motor);
          uint8_t addr = id(drv_addresses)[m-1];
          auto bus = App.get_i2c_bus(0);
          if (!bus) return;
          uint8_t reg = 0x00;
          uint8_t data = 0;
          bus->write(addr, &reg, 1);
          bus->read(addr, &data, 1);
          ESP_LOGI("drvtest", "Motor %d FAULT_STATUS=0x%02X (FAULT=%d STALL=%d OCP=%d TSD=%d)",
            m, data,
            (data >> 7) & 1,
            (data >> 5) & 1,
            (data >> 4) & 1,
            (data >> 2) & 1);

  - id: drv_selected_cycle_10s
    then:
      - script.execute: drv_stop_all
      - delay: 100ms
      - lambda: |-
          ESP_LOGI("drvtest", "=== CYCLE START: Motor %d ===", id(drv_selected_motor));

      # Forward 10s
      - script.execute: drv_forward_selected
      - delay: 10s

      # Stop 10s
      - script.execute: drv_stop_selected
      - lambda: ESP_LOGI("drvtest", "--- STOP 10s ---");
      - delay: 10s

      # Reverse 10s
      - script.execute: drv_reverse_selected
      - delay: 10s

      - script.execute: drv_stop_all
      - lambda: ESP_LOGI("drvtest", "=== CYCLE DONE ===");

button:
  - platform: template
    name: "DRV I2C Scan"
    icon: mdi:magnify
    on_press:
      - script.execute: drv_i2c_scan

  - platform: template
    name: "DRV Init All"
    icon: mdi:cog
    on_press:
      - script.execute: drv_init_all

  - platform: template
    name: "DRV Forward (Open)"
    icon: mdi:arrow-up
    on_press:
      - script.execute: drv_forward_selected

  - platform: template
    name: "DRV Reverse (Close)"
    icon: mdi:arrow-down
    on_press:
      - script.execute: drv_reverse_selected

  - platform: template
    name: "DRV Stop Selected"
    icon: mdi:stop
    on_press:
      - script.execute: drv_stop_selected

  - platform: template
    name: "DRV STOP ALL"
    icon: mdi:stop-circle
    on_press:
      - script.execute: drv_stop_all

  - platform: template
    name: "DRV Read Fault"
    icon: mdi:alert-circle
    on_press:
      - script.execute: drv_read_fault

  - platform: template
    name: "DRV Cycle 10/10/10"
    icon: mdi:play
    on_press:
      - script.execute: drv_selected_cycle_10s
