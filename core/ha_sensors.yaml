# ============================================
# Home Assistant Temperature Source Inputs
# ============================================
# These sensors feed the runtime zone-temperature router.
# Zone 3, 4, and 5 intentionally share the living-room source by default,
# matching the previous fixed wiring.

sensor:
  - platform: homeassistant
    name: "Corridor Temperature HA Source"
    id: ${id_prefix}corridor_temp_ha_source
    internal: true
    entity_id: sensor.corridor_temperature
    on_value:
      - lambda: |-
          id(${id_prefix}zone_1_temp_ha) = x;

  - platform: homeassistant
    name: "Storage Temperature HA Source"
    id: ${id_prefix}storage_temp_ha_source
    internal: true
    entity_id: sensor.storage_temperature
    on_value:
      - lambda: |-
          id(${id_prefix}zone_2_temp_ha) = x;

  - platform: homeassistant
    name: "Living Room Temperature HA Source"
    id: ${id_prefix}living_temp_ha_source
    internal: true
    entity_id: sensor.living_room_temperature
    on_value:
      - lambda: |-
          id(${id_prefix}zone_3_temp_ha) = x;
          id(${id_prefix}zone_4_temp_ha) = x;
          id(${id_prefix}zone_5_temp_ha) = x;

  - platform: homeassistant
    name: "Office Temperature HA Source"
    id: ${id_prefix}office_temp_ha_source
    internal: true
    entity_id: sensor.office_temperature
    on_value:
      - lambda: |-
          id(${id_prefix}zone_6_temp_ha) = x;
