one_wire:
  - platform: gpio
    setup_priority: 1000 #https://github.com/esphome/issues/issues/5983
    pin: ${onewire_pin}
    id: ${id_prefix}dallas_bus

globals:
  - id: ${id_prefix}dallas_idx_input
    type: int
    restore_value: true
    initial_value: '1'
  - id: ${id_prefix}dallas_idx_output
    type: int
    restore_value: true
    initial_value: '2'
  - id: ${id_prefix}dallas_idx_extra
    type: int
    restore_value: true
    initial_value: '3'

# ============================================
# 1-Wire Scan Button & Results
# ============================================
button:
  - platform: template
    name: "Scan 1-Wire Bus"
    icon: mdi:magnify
    entity_category: diagnostic
    on_press:
      - lambda: |-
          // Search for devices
          auto devices = id(${id_prefix}dallas_bus).get_devices();

          std::string result = "";
          int count = 0;

          for (auto &device : devices) {
            count++;
            char addr[32];
            sprintf(addr, "0x%016llX", device);
            if (count > 1) result += "\n";
            result += std::to_string(count) + ": " + addr;
          }

          auto idx_label = [](int idx) -> std::string {
            if (idx <= 0) return "None";
            return std::string("DS18x20 - ") + std::to_string(idx - 1);
          };

          if (count == 0) {
            result = "No devices found";
          } else {
            result = "Found " + std::to_string(count) + " device(s):\n" + result;
          }

          result += "\n\nRole mapping:";
          result += "\nInput: " + idx_label(id(${id_prefix}dallas_idx_input));
          result += "\nOutput: " + idx_label(id(${id_prefix}dallas_idx_output));
          result += "\nExtra: " + idx_label(id(${id_prefix}dallas_idx_extra));

          id(${id_prefix}onewire_scan_result).publish_state(result);
          ESP_LOGI("onewire", "%s", result.c_str());
    id: ${id_prefix}dallas_bus_test_bt
    web_server:
      sorting_group_id: sorting_group_debug

text_sensor:
  - platform: template
    name: "1-Wire Scan Result"
    id: ${id_prefix}onewire_scan_result
    icon: mdi:chip
    entity_category: diagnostic
    web_server:
      sorting_group_id: sorting_group_debug

select:
  - platform: template
    name: "DS18x20 Select Input Sensor"
    id: ${id_prefix}dallas_sel_input
    optimistic: true
    restore_value: true
    initial_option: "DS18x20 - 0"
    entity_category: config
    options:
      - "None"
      - "DS18x20 - 0"
      - "DS18x20 - 1"
      - "DS18x20 - 2"
      - "DS18x20 - 3"
      - "DS18x20 - 4"
      - "DS18x20 - 5"
      - "DS18x20 - 6"
      - "DS18x20 - 7"
    set_action:
      - lambda: |-
          int new_idx = id(${id_prefix}dallas_sel_input).index_of(x).value_or(0);
          id(${id_prefix}dallas_idx_input) = new_idx;

          if (new_idx == 0) return;

          if (id(${id_prefix}dallas_idx_output) == new_idx) {
            id(${id_prefix}dallas_idx_output) = 0;
            id(${id_prefix}dallas_sel_output).publish_state("None");
          }
          if (id(${id_prefix}dallas_idx_extra) == new_idx) {
            id(${id_prefix}dallas_idx_extra) = 0;
            id(${id_prefix}dallas_sel_extra).publish_state("None");
          }
    web_server:
      sorting_group_id: sorting_group_settings

  - platform: template
    name: "DS18x20 Select Output Sensor"
    id: ${id_prefix}dallas_sel_output
    optimistic: true
