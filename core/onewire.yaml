            id(${id_prefix}dallas_idx_input) = 0;
            id(${id_prefix}dallas_sel_input).publish_state("None");
          }
          if (id(${id_prefix}dallas_idx_extra) == new_idx) {
            id(${id_prefix}dallas_idx_extra) = 0;
