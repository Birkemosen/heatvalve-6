# ============================================
# Adaptive Control Algorithm Settings
# ============================================
# Global tuning parameters shared across all zones when using
# adaptive (runtime-selectable) control profiles.
#
# Include this ONCE in your device config alongside core/settings.yaml:
#   adaptive_settings: !include core/adaptive_settings.yaml
#
# These parameters are exposed as dashboard number sliders and
# persist across reboots via NVS.

number:
  # ---- Tanh algorithm ----
  - platform: template
    name: "Tanh Steepness"
    id: ${id_prefix}tanh_steepness
    icon: "mdi:chart-bell-curve"
    unit_of_measurement: ""
    optimistic: true
    min_value: 0.1
    max_value: 3.0
    step: 0.05
    restore_value: true
    initial_value: 0.70
    entity_category: config
    web_server:
      sorting_group_id: sorting_group_settings

  # ---- Linear algorithm ----
  - platform: template
    name: "Linear Steepness"
    id: ${id_prefix}linear_steepness
    icon: "mdi:chart-line"
    unit_of_measurement: ""
    optimistic: true
    min_value: 0.05
    max_value: 1.0
    step: 0.05
    restore_value: true
    initial_value: 0.25
    entity_category: config
    web_server:
      sorting_group_id: sorting_group_settings

  # ---- PID algorithm ----
  # Proportional gain: immediate response to error
  - platform: template
    name: "PID Kp"
    id: ${id_prefix}pid_kp
    icon: "mdi:alpha-p-circle"
    unit_of_measurement: ""
    optimistic: true
    min_value: 0.0
    max_value: 2.0
    step: 0.02
    restore_value: true
    initial_value: 0.40
    entity_category: config
    web_server:
      sorting_group_id: sorting_group_settings

  # Integral gain: accumulated error over time (in 1/minutes)
  - platform: template
    name: "PID Ki"
    id: ${id_prefix}pid_ki
    icon: "mdi:alpha-i-circle"
    unit_of_measurement: ""
    optimistic: true
    min_value: 0.0
    max_value: 0.5
    step: 0.005
    restore_value: true
    initial_value: 0.02
    entity_category: config
    web_server:
      sorting_group_id: sorting_group_settings

  # Derivative gain: rate of change (in minutes)
  - platform: template
    name: "PID Kd"
    id: ${id_prefix}pid_kd
    icon: "mdi:alpha-d-circle"
    unit_of_measurement: ""
    optimistic: true
    min_value: 0.0
    max_value: 5.0
    step: 0.1
    restore_value: true
    initial_value: 0.5
    entity_category: config
    web_server:
      sorting_group_id: sorting_group_settings
