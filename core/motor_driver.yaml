# ============================================
# Test Buttons
# ============================================
button:
  - platform: template
    name: "Test Motor 1 Open"
    icon: mdi:arrow-up
    on_press:
      - cover.open: CH1_cover
    entity_category: diagnostic
    web_server:
      sorting_group_id: sorting_group_debug

  - platform: template
    name: "Test Motor 1 Close"
    icon: mdi:arrow-down
    on_press:
      - cover.close: CH1_cover
    entity_category: diagnostic
    web_server:
      sorting_group_id: sorting_group_debug

  - platform: template
    name: "Stop All Motors"
    icon: mdi:stop
    on_press:
      - script.execute: motor_stop_all
    entity_category: diagnostic
    web_server:
      sorting_group_id: sorting_group_debug

  - platform: template
    name: "Acknowledge Motor Fault Latch"
    icon: mdi:shield-check
    on_press:
      - lambda: |-
          id(motor_supervisor_ctrl).acknowledge_fault_latch();
    entity_category: diagnostic
    web_server:
      sorting_group_id: sorting_group_debug

# ============================================
# Motor Control Scripts
# ============================================
script:
  - id: motor_stop_all
    then:
      - lambda: |-
          id(motor_supervisor_ctrl).stop_all();
      - script.execute: led_update_status
      - logger.log:
          format: "All motors stopped (coast)"
          level: INFO
          tag: drv8215

  # Initialize all DRV8215 chips after boot
  - id: drv8215_init
    then:
      - switch.turn_on: motor_nsleep
      - delay: 1ms  # tWAKE ~410µs
      - lambda: |-
          ESP_LOGI("drv8215", "Initializing 6x DRV8215...");
          id(motor_drv_1)->init();
          id(motor_drv_2)->init();
          id(motor_drv_3)->init();
          id(motor_drv_4)->init();
          id(motor_drv_5)->init();
          id(motor_drv_6)->init();
          ESP_LOGI("drv8215", "All 6 DRV8215 initialized");

  # Start motor with specified number and direction
  - id: motor_start
    parameters:
      motor_num: int
      direction: int
    then:
      # Ensure nSLEEP is HIGH (all chips awake)
      - switch.turn_on: motor_nsleep
      - delay: 1ms
      - lambda: |-
          if (id(motor_supervisor_ctrl).start_motor(motor_num, direction)) {
            id(led_status_motor).execute();
          } else {
            ESP_LOGW("drv8215", "Motor start rejected (motor=%d direction=%d)", motor_num, direction);
            id(led_update_status).execute();
          }

  - id: motor_presence_test
    parameters:
      motor_num: int
      direction: int
    then:
      - switch.turn_on: motor_nsleep
      - delay: 1ms
      - lambda: |-
          if (id(motor_supervisor_ctrl).start_presence_test(motor_num, direction)) {
            ESP_LOGI("drv8215", "Presence test started (motor=%d direction=%d)", motor_num, direction);
            id(led_status_motor).execute();
          } else {
            ESP_LOGW("drv8215", "Presence test rejected (motor=%d direction=%d)", motor_num, direction);
            id(led_update_status).execute();
          }

  # Stop specific motor and update mean current
  - id: motor_stop
    parameters:
      motor_num: int
    then:
      - lambda: |-
          id(motor_supervisor_ctrl).stop_motor(motor_num);
          id(led_update_status).execute();
