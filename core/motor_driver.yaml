# ============================================
# HeatValve-6 Rev.2 : DRV8215 Motor Driver (6x I2C H-Bridge)
# ============================================
# I2C-controlled motor driver for 6 motors using 6x DRV8215.
# Each motor has its own dedicated H-bridge with integrated:
#   - IPROPI current sensing (3 gain settings)
#   - Hardware stall detection
#   - Speed/voltage regulation
#
# Current sensing inspired by VdMot Controller (Lenti84):
# https://github.com/Lenti84/VdMot_Controller
#
# IMPORTANT: Only ONE motor should run at a time (shared IPROPI).
#
# Motor mapping (I2C 7-bit addresses, formula: 0x30 + A1×3 + A0, GND=0/Hi-Z=1/VCC=2):
#   Motor 1: DRV8215 @ 0x30 (A1=GND,  A0=GND)
#   Motor 2: DRV8215 @ 0x31 (A1=GND,  A0=Hi-Z)
#   Motor 3: DRV8215 @ 0x32 (A1=GND,  A0=VCC)
#   Motor 4: DRV8215 @ 0x35 (A1=Hi-Z, A0=VCC)
#   Motor 5: DRV8215 @ 0x33 (A1=Hi-Z, A0=GND)
#   Motor 6: DRV8215 @ 0x34 (A1=Hi-Z, A0=Hi-Z)
#
# DRV8215 Register Map (key registers):
#   0x00: FAULT_STATUS (R)  - FAULT, STALL, OCP, OVP, TSD, NPOR
#   0x09: CONFIG0 (RW)      - EN_STALL, CLR_FLT, DUTY_CTRL
#   0x0C: CONFIG3 (RW)      - IMODE, SMODE, INT_VREF, TBLANK, TDEG
#   0x0D: CONFIG4 (RW)      - PMODE, I2C_BC, I2C_EN_IN1, I2C_PH_IN2
#   0x11: RC_CTRL0 (RW)     - CS_GAIN_SEL[2:0]

# ============================================
# DRV8215 Component Instances (one per motor)
# ============================================
drv8215:
  - id: motor_drv_1
    address: ${drv8215_addr_motor1}
    motor_num: 1
  - id: motor_drv_2
    address: ${drv8215_addr_motor2}
    motor_num: 2
  - id: motor_drv_3
    address: ${drv8215_addr_motor3}
    motor_num: 3
  - id: motor_drv_4
    address: ${drv8215_addr_motor4}
    motor_num: 4
  - id: motor_drv_5
    address: ${drv8215_addr_motor5}
    motor_num: 5
  - id: motor_drv_6
    address: ${drv8215_addr_motor6}
    motor_num: 6

# ============================================
# Motor Supervisor (C++ FSM / timing / PWM / fault handling)
# ============================================
motor_supervisor:
  id: motor_supervisor_ctrl
  motor_1_id: motor_drv_1
  motor_2_id: motor_drv_2
  motor_3_id: motor_drv_3
  motor_4_id: motor_drv_4
  motor_5_id: motor_drv_5
  motor_6_id: motor_drv_6
  ipropi_voltage_id: ${id_prefix}motor_ipropi_voltage
  nfault_id: motor_nfault
  current_factor_high_id: ${id_prefix}current_factor_high
  low_current_threshold_id: ${id_prefix}low_current_threshold_ma
  low_current_window_ms_id: ${id_prefix}low_current_window_ms
  max_runtime_seconds_id: ${id_prefix}motor_max_run_seconds
  pwm_boost_ms_id: ${id_prefix}motor_pwm_boost_ms
  pwm_hold_duty_percent_id: ${id_prefix}motor_pwm_hold_duty_percent
  pwm_period_ms_id: ${id_prefix}motor_pwm_period_ms
  calibration_min_travel_ms_id: ${id_prefix}calibration_min_travel_ms
  calibration_max_retries_id: ${id_prefix}calibration_max_retries
  relearn_after_movements_id: ${id_prefix}relearn_after_movements
  relearn_after_hours_id: ${id_prefix}relearn_after_hours
  drift_relearn_threshold_percent_id: ${id_prefix}drift_relearn_threshold_percent
  presence_test_duration_ms_id: ${id_prefix}presence_test_duration_ms

# ============================================
# nSLEEP Control (shared, wakes all DRV8215)
# ============================================
switch:
  - platform: gpio
    name: "Motor nSLEEP"
    id: motor_nsleep
    pin:
      number: ${motor_nsleep_pin}
    internal: true
    restore_mode: ALWAYS_OFF  # All DRV8215 in sleep at boot

# ============================================
# nFAULT Input (wired-OR from all DRV8215)
# ============================================
binary_sensor:
  - platform: gpio
    name: "Motor nFAULT"
    id: motor_nfault
    pin:
      number: ${motor_nfault_pin}
      mode: INPUT
      inverted: true  # nFAULT is active LOW
    internal: true
    filters:
      - delayed_on: 1ms

  - platform: template
    name: "Motor Endstop"
    id: motor_endstop_sensor
    icon: "mdi:stop-circle"
    entity_category: diagnostic
    lambda: |-
      return id(motor_supervisor_ctrl).endstop_event();
    web_server:
      sorting_group_id: sorting_group_debug

  - platform: template
    name: "Motor Turning"
    id: motor_turning_sensor
    icon: "mdi:rotate-3d-variant"
    entity_category: diagnostic
    lambda: |-
      return id(motor_supervisor_ctrl).is_motor_turning();
    web_server:
      sorting_group_id: sorting_group_debug

  - platform: template
    name: "Motor Fault"
    id: motor_fault_sensor
    icon: "mdi:alert-circle"
    entity_category: diagnostic
    lambda: |-
      return id(motor_supervisor_ctrl).fault_event();
    web_server:
      sorting_group_id: sorting_group_debug

  - platform: template
    name: "Motor Fault Latched"
    id: motor_fault_latched_sensor
    icon: "mdi:alert-octagon"
    entity_category: diagnostic
    lambda: |-
      return id(motor_supervisor_ctrl).has_fault_latch();
    web_server:
      sorting_group_id: sorting_group_debug

text_sensor:
  - platform: template
    name: "Motor Fault Code"
    id: ${id_prefix}motor_fault_code
    icon: "mdi:alert"
    update_interval: 250ms
    entity_category: diagnostic
    lambda: |-
      return {id(motor_supervisor_ctrl).get_current_fault_name()};
    web_server:
      sorting_group_id: sorting_group_debug

  - platform: template
    name: "Motor Fault Latch Code"
    id: ${id_prefix}motor_fault_latch_code
    icon: "mdi:alert-octagon"
    update_interval: 1s
    entity_category: diagnostic
    lambda: |-
      return {id(motor_supervisor_ctrl).get_latched_fault_name()};
    web_server:
      sorting_group_id: sorting_group_debug

# ============================================
# IPROPI ADC Current Sensing
# ============================================
sensor:
  - platform: adc
    name: "Motor IPROPI Voltage"
    id: ${id_prefix}motor_ipropi_voltage
    pin: ${motor_ipropi_pin}
    attenuation: 12db
    update_interval: 50ms
    accuracy_decimals: 3
    unit_of_measurement: "V"
    entity_category: diagnostic
    internal: true

  - platform: template
    name: "Motor Current"
    id: ${id_prefix}motor_current_ma
    icon: "mdi:current-ac"
    unit_of_measurement: "mA"
    accuracy_decimals: 1
    update_interval: 100ms
    entity_category: diagnostic
    lambda: |-
      return id(motor_supervisor_ctrl).get_current_filtered();
    web_server:
      sorting_group_id: sorting_group_debug

  - platform: template
    name: "Motor Mean Current"
    id: ${id_prefix}motor_mean_current
    icon: "mdi:current-ac"
    unit_of_measurement: "mA"
    accuracy_decimals: 1
    update_interval: 1s
    entity_category: diagnostic
    lambda: |-
      return id(motor_supervisor_ctrl).get_current_motor_mean_current();
    web_server:
      sorting_group_id: sorting_group_debug

  - platform: template
    name: "Motor Fault Code ID"
    id: ${id_prefix}motor_fault_code_id
    icon: "mdi:counter"
    unit_of_measurement: "id"
    accuracy_decimals: 0
    update_interval: 250ms
    entity_category: diagnostic
    lambda: |-
      return id(motor_supervisor_ctrl).get_current_fault_code();
    web_server:
      sorting_group_id: sorting_group_debug

  - platform: template
    name: "Motor Fault Raw"
    id: ${id_prefix}motor_fault_raw
    icon: "mdi:code-braces"
    unit_of_measurement: "raw"
    accuracy_decimals: 0
    update_interval: 250ms
    entity_category: diagnostic
    lambda: |-
      return id(motor_supervisor_ctrl).get_current_fault_raw();
    web_server:
      sorting_group_id: sorting_group_debug

  - platform: template
    name: "Motor Latched Fault Motor"
    id: ${id_prefix}motor_latched_fault_motor
    icon: "mdi:numeric"
    unit_of_measurement: "motor"
    accuracy_decimals: 0
    update_interval: 1s
    entity_category: diagnostic
    lambda: |-
      if (!id(motor_supervisor_ctrl).has_fault_latch()) {
        return 0;
      }
      return id(motor_supervisor_ctrl).get_latched_fault_motor();
    web_server:
      sorting_group_id: sorting_group_debug

# ============================================
